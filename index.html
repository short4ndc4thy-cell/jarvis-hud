<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>XR HUD (Head-Locked, WebGL, Reliable)</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
  #ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    gap: 12px;
    color: rgba(0,229,255,.92);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    text-align: center;
    padding: 20px;
    background: radial-gradient(ellipse at center, rgba(0,229,255,.05), rgba(0,0,0,.65));
  }
  #ui h1 { margin:0; font-size: 16px; letter-spacing: .14em; }
  #ui p { margin:0; max-width: 980px; font-size: 12px; line-height: 1.35; opacity:.9; }
  #btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button {
    appearance: none;
    background: rgba(0,0,0,.35);
    border: 1px solid rgba(0,229,255,.65);
    color: rgba(0,229,255,.95);
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: 800;
    letter-spacing: .12em;
    cursor: pointer;
  }
  button:hover { background: rgba(0,229,255,.10); }
  button:disabled { opacity:.35; cursor: not-allowed; }

  #log {
    width: min(980px, 92vw);
    height: 210px;
    border: 1px solid rgba(0,229,255,.25);
    border-radius: 12px;
    background: rgba(0,0,0,.40);
    padding: 10px;
    overflow:auto;
    font-size: 12px;
    line-height: 1.35;
    white-space: pre-wrap;
  }

  #mirror {
    position: fixed;
    right: 10px; bottom: 10px;
    width: 260px; height: 130px;
    border: 1px solid rgba(0,229,255,.22);
    border-radius: 12px;
    background: rgba(0,0,0,.35);
    display:none;
    z-index: 9999;
  }

  #hud2d { display:none; }
</style>
</head>
<body>

<div id="ui">
  <h1>XR HUD · HEAD-LOCKED · WEBGL</h1>
  <p>
    This draws the HUD <b>inside</b> XR as a transparent textured quad that is <b>locked to your head</b>.
    If your runtime provides passthrough, you’ll see passthrough with a HUD.
    If you see passthrough only, it’s not “offscreen” anymore, it’s a rendering/runtime issue (logged below).
  </p>
  <div id="btns">
    <button id="enter">ENTER AR</button>
    <button id="exit" disabled>EXIT</button>
    <button id="perm">MOTION PERMISSION</button>
    <button id="toggleMirror">TOGGLE HUD MIRROR</button>
  </div>
  <div id="log"></div>
</div>

<canvas id="mirror" width="260" height="130"></canvas>
<canvas id="hud2d" width="1024" height="512"></canvas>

<script>
/* =========================
   LOGGING
========================= */
const logEl = document.getElementById('log');
function log(msg) {
  const t = new Date().toISOString().slice(11, 19);
  logEl.textContent += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}
function warn(msg){ log(`WARN: ${msg}`); }
function die(msg){ log(`ERROR: ${msg}`); }

/* =========================
   UI
========================= */
const enterBtn = document.getElementById('enter');
const exitBtn  = document.getElementById('exit');
const permBtn  = document.getElementById('perm');
const mirrorBtn = document.getElementById('toggleMirror');
const mirrorCanvas = document.getElementById('mirror');
const mirrorCtx = mirrorCanvas.getContext('2d');

const hudCanvas = document.getElementById('hud2d');
const hudCtx = hudCanvas.getContext('2d', { alpha: true });

let mirrorOn = false;

/* =========================
   STATE
========================= */
let xrSession = null;
let xrRefSpace = null;

let gl = null;
let xrLayer = null;

let program = null;
let vbo = null;
let ibo = null;
let tex = null;

let lastHudUpload = 0;

// HUD inputs
let hasOrientation = false;
let headingDeg = 0;
let rollDeg = 0;
let pitchDeg = 0;
let lat = null, lon = null;
let speedMS = 0;

/* =========================
   SECURITY + XR CHECKS
========================= */
function isSecureContextEnough() {
  return location.protocol === 'https:' || location.hostname === 'localhost';
}
async function xrSupport() {
  if (!navigator.xr) return { ok:false, why:'navigator.xr missing' };
  try {
    const ok = await navigator.xr.isSessionSupported('immersive-ar');
    return ok ? { ok:true, why:'immersive-ar supported' } : { ok:false, why:'immersive-ar NOT supported' };
  } catch (e) {
    return { ok:false, why:`isSessionSupported failed: ${e.message}` };
  }
}

/* =========================
   OPTIONAL SENSORS
========================= */
function onOrient(e) {
  hasOrientation = true;
  const h = (e.webkitCompassHeading != null)
    ? e.webkitCompassHeading
    : (e.alpha != null ? (360 - e.alpha) : null);
  if (h != null && Number.isFinite(h)) headingDeg = ((h % 360) + 360) % 360;
  if (e.beta != null) pitchDeg = e.beta;
  if (e.gamma != null) rollDeg = e.gamma;
}
async function requestMotionPermission() {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const p = await DeviceOrientationEvent.requestPermission();
      if (p !== 'granted') { warn('Motion permission denied.'); return; }
    }
    window.addEventListener('deviceorientation', onOrient, true);
    log('Motion listener active.');
  } catch(e) {
    warn(`Motion permission error: ${e.message}`);
  }
}
function startGeo() {
  if (!navigator.geolocation) { warn('Geolocation unavailable.'); return; }
  navigator.geolocation.watchPosition(
    (pos) => {
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      speedMS = pos.coords.speed || 0;
    },
    () => warn('Geolocation denied/failed.'),
    { enableHighAccuracy:true, maximumAge:2000 }
  );
}

/* =========================
   2D HUD DRAWING
========================= */
function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
function pad3(n){ return String(Math.round(n)).padStart(3,'0'); }
function dirFromHeading(h) {
  const d = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(h/22.5) % 16];
}
function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.arcTo(x+w, y, x+w, y+h, rr);
  ctx.arcTo(x+w, y+h, x, y+h, rr);
  ctx.arcTo(x, y+h, x, y, rr);
  ctx.arcTo(x, y, x+w, y, rr);
  ctx.closePath();
}
function corner(ctx, x, y, s, which) {
  ctx.beginPath();
  if (which === 'tl') { ctx.moveTo(x, y+s); ctx.lineTo(x, y); ctx.lineTo(x+s, y); }
  if (which === 'tr') { ctx.moveTo(x, y+s); ctx.lineTo(x, y); ctx.lineTo(x-s, y); }
  if (which === 'bl') { ctx.moveTo(x, y-s); ctx.lineTo(x, y); ctx.lineTo(x+s, y); }
  if (which === 'br') { ctx.moveTo(x, y-s); ctx.lineTo(x, y); ctx.lineTo(x-s, y); }
  ctx.stroke();
}
function drawHud2D(nowMs) {
  const w = hudCanvas.width, h = hudCanvas.height;
  hudCtx.clearRect(0,0,w,h);

  // Panel background
  hudCtx.save();
  hudCtx.globalAlpha = 0.88;
  const g = hudCtx.createLinearGradient(0,0,w,0);
  g.addColorStop(0, 'rgba(0,229,255,0.12)');
  g.addColorStop(0.5,'rgba(0,0,0,0.02)');
  g.addColorStop(1, 'rgba(0,229,255,0.12)');
  hudCtx.fillStyle = g;
  roundRect(hudCtx, 18, 18, w-36, h-36, 22);
  hudCtx.fill();
  hudCtx.restore();

  // Frame + corners
  hudCtx.save();
  hudCtx.strokeStyle = 'rgba(0,229,255,0.70)';
  hudCtx.lineWidth = 2.5;
  roundRect(hudCtx, 18, 18, w-36, h-36, 22);
  hudCtx.stroke();
  hudCtx.lineWidth = 3;
  corner(hudCtx, 18, 18, 34, 'tl');
  corner(hudCtx, w-18, 18, 34, 'tr');
  corner(hudCtx, 18, h-18, 34, 'bl');
  corner(hudCtx, w-18, h-18, 34, 'br');
  hudCtx.restore();

  // Text glow
  hudCtx.save();
  hudCtx.fillStyle = 'rgba(0,229,255,0.95)';
  hudCtx.shadowColor = 'rgba(0,229,255,0.55)';
  hudCtx.shadowBlur = 12;

  const d = new Date();
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;

  hudCtx.font = '900 34px ui-monospace, Menlo, Consolas, monospace';
  hudCtx.fillText('JARVIS HUD', 52, 74);

  hudCtx.font = '900 48px ui-monospace, Menlo, Consolas, monospace';
  hudCtx.fillText(timeStr, 52, 132);

  const hdg = headingDeg;
  const dir = dirFromHeading(hdg);

  hudCtx.font = '900 58px ui-monospace, Menlo, Consolas, monospace';
  hudCtx.fillText(`${dir} ${pad3(hdg)}°`, 52, 210);

  // Crosshair
  hudCtx.shadowBlur = 0;
  hudCtx.strokeStyle = 'rgba(0,229,255,0.80)';
  hudCtx.lineWidth = 2;
  hudCtx.beginPath();
  hudCtx.moveTo(w/2 - 18, h/2);
  hudCtx.lineTo(w/2 + 18, h/2);
  hudCtx.moveTo(w/2, h/2 - 18);
  hudCtx.lineTo(w/2, h/2 + 18);
  hudCtx.stroke();

  // Speed + coords
  const kmh = speedMS * 3.6;
  hudCtx.fillStyle = 'rgba(118,255,3,0.95)';
  hudCtx.shadowColor = 'rgba(118,255,3,0.60)';
  hudCtx.shadowBlur = 12;
  hudCtx.font = '900 42px ui-monospace, Menlo, Consolas, monospace';
  hudCtx.fillText(`${Number.isFinite(kmh) ? kmh.toFixed(1) : '--'} km/h`, w-385, 92);

  hudCtx.shadowBlur = 0;
  hudCtx.fillStyle = 'rgba(0,229,255,0.90)';
  hudCtx.font = '800 20px ui-monospace, Menlo, Consolas, monospace';
  hudCtx.fillText(`LAT ${lat != null ? lat.toFixed(6) : '--.------'}`, w-385, 130);
  hudCtx.fillText(`LON ${lon != null ? lon.toFixed(6) : '--.------'}`, w-385, 156);

  // Threat (simple placeholder)
  const threat = clamp(5 + (kmh > 20 ? 10 : 0), 0, 100);
  hudCtx.fillStyle = 'rgba(0,229,255,0.25)';
  hudCtx.fillRect(w-385, 186, 320, 14);
  hudCtx.fillStyle = threat < 20 ? 'rgba(118,255,3,0.90)' : 'rgba(0,229,255,0.90)';
  hudCtx.fillRect(w-385, 186, 320*(threat/100), 14);
  hudCtx.fillStyle = 'rgba(0,229,255,0.90)';
  hudCtx.fillText(`THREAT ${Math.round(threat)}%`, w-385, 226);

  if (!hasOrientation) {
    hudCtx.fillStyle = 'rgba(255,109,0,0.95)';
    hudCtx.font = '900 18px ui-monospace, Menlo, Consolas, monospace';
    hudCtx.fillText('MOTION NOT GRANTED (PRESS MOTION PERMISSION)', 52, h-26);
  } else {
    hudCtx.fillStyle = 'rgba(0,229,255,0.70)';
    hudCtx.font = '800 18px ui-monospace, Menlo, Consolas, monospace';
    hudCtx.fillText(`ROLL ${rollDeg.toFixed(1)}°  PITCH ${pitchDeg.toFixed(1)}°`, 52, h-26);
  }

  // Scanlines
  hudCtx.save();
  hudCtx.globalAlpha = 0.08;
  hudCtx.fillStyle = '#00e5ff';
  for (let y=0; y<h; y+=4) hudCtx.fillRect(18, y, w-36, 1);
  hudCtx.restore();

  hudCtx.restore();
}

/* =========================
   COLUMN-MAJOR MAT4 (WebGL/WebXR compatible)
========================= */
function mat4Identity() {
  const m = new Float32Array(16);
  m[0]=1; m[5]=1; m[10]=1; m[15]=1;
  return m;
}
function mat4Mul(a,b) {
  // column-major, out = a * b
  const out = new Float32Array(16);
  const a00=a[0], a01=a[1], a02=a[2], a03=a[3];
  const a10=a[4], a11=a[5], a12=a[6], a13=a[7];
  const a20=a[8], a21=a[9], a22=a[10],a23=a[11];
  const a30=a[12],a31=a[13],a32=a[14],a33=a[15];

  let b0,b1,b2,b3;

  // 1st column
  b0=b[0]; b1=b[1]; b2=b[2]; b3=b[3];
  out[0]=a00*b0 + a10*b1 + a20*b2 + a30*b3;
  out[1]=a01*b0 + a11*b1 + a21*b2 + a31*b3;
  out[2]=a02*b0 + a12*b1 + a22*b2 + a32*b3;
  out[3]=a03*b0 + a13*b1 + a23*b2 + a33*b3;

  // 2nd column
  b0=b[4]; b1=b[5]; b2=b[6]; b3=b[7];
  out[4]=a00*b0 + a10*b1 + a20*b2 + a30*b3;
  out[5]=a01*b0 + a11*b1 + a21*b2 + a31*b3;
  out[6]=a02*b0 + a12*b1 + a22*b2 + a32*b3;
  out[7]=a03*b0 + a13*b1 + a23*b2 + a33*b3;

  // 3rd column
  b0=b[8]; b1=b[9]; b2=b[10]; b3=b[11];
  out[8]=a00*b0 + a10*b1 + a20*b2 + a30*b3;
  out[9]=a01*b0 + a11*b1 + a21*b2 + a31*b3;
  out[10]=a02*b0 + a12*b1 + a22*b2 + a32*b3;
  out[11]=a03*b0 + a13*b1 + a23*b2 + a33*b3;

  // 4th column
  b0=b[12]; b1=b[13]; b2=b[14]; b3=b[15];
  out[12]=a00*b0 + a10*b1 + a20*b2 + a30*b3;
  out[13]=a01*b0 + a11*b1 + a21*b2 + a31*b3;
  out[14]=a02*b0 + a12*b1 + a22*b2 + a32*b3;
  out[15]=a03*b0 + a13*b1 + a23*b2 + a33*b3;

  return out;
}
function mat4Translate(x,y,z) {
  const m = mat4Identity();
  m[12]=x; m[13]=y; m[14]=z;
  return m;
}
function mat4Scale(x,y,z) {
  const m = mat4Identity();
  m[0]=x; m[5]=y; m[10]=z;
  return m;
}

/* =========================
   WEBGL SHADERS
========================= */
function compileShader(gl, type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const info = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    throw new Error(info || 'Shader compile failed');
  }
  return sh;
}
function createProgram(gl, vsSrc, fsSrc) {
  const vs = compileShader(gl, gl.VERTEX_SHADER, vsSrc);
  const fs = compileShader(gl, gl.FRAGMENT_SHADER, fsSrc);
  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  gl.deleteShader(vs);
  gl.deleteShader(fs);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    const info = gl.getProgramInfoLog(p);
    gl.deleteProgram(p);
    throw new Error(info || 'Program link failed');
  }
  return p;
}

function initGLResources() {
  const vsSrc = `
    attribute vec3 aPos;
    attribute vec2 aUV;
    uniform mat4 uMVP;
    varying vec2 vUV;
    void main() {
      vUV = aUV;
      gl_Position = uMVP * vec4(aPos, 1.0);
    }
  `;
  const fsSrc = `
    precision mediump float;
    varying vec2 vUV;
    uniform sampler2D uTex;
    void main() {
      vec4 c = texture2D(uTex, vUV);
      gl_FragColor = c; // keep alpha
    }
  `;
  program = createProgram(gl, vsSrc, fsSrc);
  program.aPos = gl.getAttribLocation(program, 'aPos');
  program.aUV  = gl.getAttribLocation(program, 'aUV');
  program.uMVP = gl.getUniformLocation(program, 'uMVP');
  program.uTex = gl.getUniformLocation(program, 'uTex');

  // Quad (two triangles), centered at origin
  const verts = new Float32Array([
    // x, y, z,    u, v
    -0.5, -0.5,  0.0,  0.0, 1.0,
     0.5, -0.5,  0.0,  1.0, 1.0,
     0.5,  0.5,  0.0,  1.0, 0.0,
    -0.5,  0.5,  0.0,  0.0, 0.0,
  ]);
  const inds = new Uint16Array([0,1,2, 0,2,3]);

  vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  ibo = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, inds, gl.STATIC_DRAW);

  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, hudCanvas.width, hudCanvas.height, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);

  gl.useProgram(program);
  gl.uniform1i(program.uTex, 0);

  log('WebGL resources ready.');
}

/* =========================
   HUD TEXTURE UPLOAD
========================= */
function uploadHudTexture(nowMs) {
  if (nowMs - lastHudUpload < 33) return; // ~30 fps
  lastHudUpload = nowMs;

  drawHud2D(nowMs);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);

  gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hudCanvas);

  if (mirrorOn) {
    mirrorCtx.clearRect(0,0,mirrorCanvas.width, mirrorCanvas.height);
    mirrorCtx.drawImage(hudCanvas, 0, 0, mirrorCanvas.width, mirrorCanvas.height);
  }
}

/* =========================
   XR RENDER LOOP (HEAD-LOCKED)
========================= */
function drawXRFrame(time, frame) {
  if (!xrSession) return;
  xrSession.requestAnimationFrame(drawXRFrame);

  const pose = frame.getViewerPose(xrRefSpace);
  if (!pose) return;

  uploadHudTexture(time);

  gl.bindFramebuffer(gl.FRAMEBUFFER, xrLayer.framebuffer);

  // Quest can be picky: force these states
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.CULL_FACE);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  // transparent clear so passthrough shows
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(program);

  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);

  const stride = 5 * 4;
  gl.enableVertexAttribArray(program.aPos);
  gl.vertexAttribPointer(program.aPos, 3, gl.FLOAT, false, stride, 0);

  gl.enableVertexAttribArray(program.aUV);
  gl.vertexAttribPointer(program.aUV, 2, gl.FLOAT, false, stride, 3*4);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);

  // Build a truly head-locked model matrix using the viewer pose matrix.
  // Model = viewerPose * translate(offset) * scale(size)
  const viewerM = pose.transform.matrix; // Float32Array(16), column-major
  const offsetM = mat4Mul(mat4Translate(0.0, -0.10, -1.10), mat4Scale(1.30, 0.65, 1.0));
  const modelM  = mat4Mul(viewerM, offsetM);

  for (const view of pose.views) {
    const vp = xrLayer.getViewport(view);
    gl.viewport(vp.x, vp.y, vp.width, vp.height);

    const projM = view.projectionMatrix;                 // column-major
    const viewM = view.transform.inverse.matrix;         // column-major
    const mvp   = mat4Mul(projM, mat4Mul(viewM, modelM));

    gl.uniformMatrix4fv(program.uMVP, false, mvp);
    gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
  }
}

/* =========================
   XR SESSION CONTROL
========================= */
async function enterAR() {
  if (xrSession) return;

  if (!isSecureContextEnough()) {
    warn('Not HTTPS (or localhost). WebXR AR often requires HTTPS.');
  }

  const s = await xrSupport();
  if (!s.ok) { die(s.why); return; }
  log(s.why);

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local'],
      optionalFeatures: ['local-floor']
    });

    log(`XR environmentBlendMode: ${xrSession.environmentBlendMode}`);
    if (xrSession.environmentBlendMode === 'opaque') {
      warn('Blend mode is opaque. Passthrough will likely be black or not true MR.');
    }

    enterBtn.disabled = true;
    exitBtn.disabled  = false;

    // XR-compatible WebGL
    const xrCanvas = document.createElement('canvas');
    gl = xrCanvas.getContext('webgl', {
      xrCompatible: true,
      alpha: true,
      antialias: true,
      premultipliedAlpha: true
    });
    if (!gl) throw new Error('Failed to create WebGL context.');

    xrLayer = new XRWebGLLayer(xrSession, gl, { alpha: true });
    xrSession.updateRenderState({ baseLayer: xrLayer });

    try {
      xrRefSpace = await xrSession.requestReferenceSpace('local-floor');
      log('ReferenceSpace: local-floor');
    } catch {
      xrRefSpace = await xrSession.requestReferenceSpace('local');
      log('ReferenceSpace: local');
    }

    initGLResources();

    xrSession.addEventListener('end', () => {
      log('XR ended.');
      cleanupXR();
      document.getElementById('ui').style.display = 'flex';
      enterBtn.disabled = false;
      exitBtn.disabled  = true;
    });

    // Hide HTML UI so it doesn’t block your view. HUD is inside XR now.
    document.getElementById('ui').style.display = 'none';

    // Kick render loop
    xrSession.requestAnimationFrame(drawXRFrame);

  } catch(e) {
    die(`enterAR failed: ${e.message}`);
    cleanupXR();
  }
}

async function exitAR() {
  if (!xrSession) return;
  try { await xrSession.end(); }
  catch(e){ warn(`xrSession.end failed: ${e.message}`); }
}

function cleanupXR() {
  try {
    if (gl) {
      if (tex) gl.deleteTexture(tex);
      if (vbo) gl.deleteBuffer(vbo);
      if (ibo) gl.deleteBuffer(ibo);
      if (program) gl.deleteProgram(program);
    }
  } catch {}

  tex = null; vbo = null; ibo = null; program = null;
  xrLayer = null;
  gl = null;
  xrRefSpace = null;
  xrSession = null;
}

/* =========================
   UI WIRING
========================= */
enterBtn.addEventListener('click', enterAR);
exitBtn.addEventListener('click', exitAR);
permBtn.addEventListener('click', requestMotionPermission);

mirrorBtn.addEventListener('click', () => {
  mirrorOn = !mirrorOn;
  mirrorCanvas.style.display = mirrorOn ? 'block' : 'none';
  log(mirrorOn ? 'HUD mirror ON (shows the texture source)' : 'HUD mirror OFF');
});

/* =========================
   BOOT
========================= */
(async function boot(){
  log(`Origin: ${location.origin}`);
  log(`Secure: ${isSecureContextEnough() ? 'yes' : 'no'}`);
  if (!navigator.xr) warn('navigator.xr missing.');

  startGeo();

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    window.addEventListener('deviceorientation', onOrient, true);
    log('Motion listener active (no permission API).');
  } else {
    log('Press MOTION PERMISSION if you want compass-ish heading on supported platforms.');
  }

  drawHud2D(performance.now());

  const s = await xrSupport();
  if (!s.ok) {
    enterBtn.disabled = true;
    die(s.why);
    warn('On Quest: open in Meta/Oculus Browser, and serve over HTTPS.');
  } else {
    log('Ready: immersive-ar supported.');
  }
})();
</script>
