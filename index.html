<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest 3 VR HUD</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
#launchScreen {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center, #020d0d 0%, #000 100%);
  z-index:999;
}
#launchScreen h1 {
  font:900 1rem/1 'Courier New',monospace; letter-spacing:.35em;
  color:#00e5ff; text-shadow:0 0 20px #00e5ff88; margin-bottom:.4rem;
  text-transform:uppercase;
}
#launchScreen p {
  font:.62rem/1 'Courier New',monospace; letter-spacing:.18em;
  color:#00e5ff44; margin-bottom:2.2rem; text-transform:uppercase;
}
#enterBtn {
  font:.7rem/1 'Courier New',monospace; letter-spacing:.22em;
  color:#00e5ff; border:1px solid #00e5ff55; background:transparent;
  padding:.65rem 2rem; cursor:pointer; text-transform:uppercase;
  transition:all .2s; text-shadow:0 0 10px #00e5ff66;
}
#enterBtn:hover { background:#00e5ff12; border-color:#00e5ff; }
#enterBtn:disabled { opacity:.3; cursor:default; }
#statusMsg {
  font:.55rem/1 'Courier New',monospace; letter-spacing:.14em;
  color:#00e5ff44; margin-top:1rem; text-transform:uppercase;
}
/* The main renderer canvas fills the window */
canvas#vrCanvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>

<div id="launchScreen">
  <h1>⬡ TACTICAL HUD v3.0</h1>
  <p>Quest 3 · WebXR Immersive-VR · Canvas HUD</p>
  <button id="enterBtn" onclick="enterVR()">◈ ENTER VR</button>
  <div id="statusMsg">Checking WebXR support…</div>
</div>

<!-- Three.js renderer target -->
<canvas id="vrCanvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════════════
//  CONSTANTS & TUNING
// ═══════════════════════════════════════════════════════════════════
const BASE_FOV        = 75;          // degrees, non-zoomed
const HUD_Z           = -1.05;       // metres in front of camera
const ZOOM_LEVELS     = [1,2,4,8,10];
const ZOOM_DURATION   = 220;         // ms for zoom transition
const FOV_MIN         = 8;           // safety clamp
const FOV_MAX         = 90;
const MAX_HOVER_DIST  = 40;          // metres
const MAX_LOCK_DIST   = 80;
const MAX_OCCL_FRAMES = 30;          // frames before lock lost by occlusion
const SMOOTH_ORI      = 0.10;        // slerp alpha when zoomed
const SMOOTH_POS      = 0.07;        // lerp alpha when zoomed
const BBOX_SMOOTH     = 0.18;        // screen bbox lerp
const WEATHER_MS      = 10*60*1000;
const AQI_MS          = 30*60*1000;

// HUD canvas logical resolution (will be scaled by devicePixelRatio)
const HUD_LW = 1920;
const HUD_LH = 1080;

// ═══════════════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════════════
const T = {
  main   : '#00e5ff',
  dim    : '#00e5ff66',
  dimmer : '#00e5ff33',
  accent : '#76ff03',
  warn   : '#ff6d00',
  danger : '#ff1744',
  lock   : '#ff4444',
  good   : '#76ff03',
};

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
const S = {
  // zoom
  zoomIndex:0, zoomFactor:1, zoomTarget:1,
  zoomStart:0, currentFov:BASE_FOV,

  // smoothed pose (only used when zoom > 1)
  smoothPos: new THREE.Vector3(),
  smoothQuat: new THREE.Quaternion(),
  poseReady: false,

  // targeting
  hoverHit: null,       // THREE.Intersection or null
  lockTarget: null,     // THREE.Mesh or null
  occludeFrames: 0,
  lockLostTimer: 0,
  bboxS: {x:0,y:0,w:0,h:0},   // smoothed screen bbox
  bboxInit: false,

  // reticle anim
  reticleR: 14,
  lockAng: 0,

  // env / clock
  geoLat: null, geoLon: null,
  weatherFetched: 0,
  aqiFetched: 0,
  clock: { h:'--', m:'--', s:'--', date:'--- -- ----' },
  weather: { temp:'--°', cond:'------', wind:'-- KM/H', hum:'--%', sun:'↑-- ↓--' },
  aqi: { val:'--', label:'------', color:T.dim },
  pollen: { val:'--', label:'------', color:T.dim },
  area: '', street:'',
  gpsLabel: '● GPS ACQUIRING',

  // heading (compass)
  headingTarget: null,
  headingSmooth: null,

  // speed / odo
  speedKmh: 0,
  odoM: 0,

  // flash registry  key → expiry timestamp
  flashes: {},

  // XR
  inVR: false,
  xrSession: null,

  // input
  prevTrigger: false,
  prevBtnA: false,

  // breadcrumbs for minimap
  crumbs: [],
};

// ═══════════════════════════════════════════════════════════════════
//  THREE.JS RENDERER
// ═══════════════════════════════════════════════════════════════════
const canvas3d = document.getElementById('vrCanvas');
const renderer = new THREE.WebGLRenderer({ canvas:canvas3d, antialias:true, alpha:false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);

// Fog for depth
scene.fog = new THREE.Fog(0x05080f, 40, 120);

// Camera
const camera = new THREE.PerspectiveCamera(BASE_FOV, window.innerWidth/window.innerHeight, 0.05, 200);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// ═══════════════════════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x1a2a3a, 2.0));
const sun = new THREE.DirectionalLight(0x6688cc, 1.4);
sun.position.set(8, 14, 6);
scene.add(sun);
const rimLight = new THREE.PointLight(0x00e5ff, 0.4, 30);
rimLight.position.set(-5, 4, -5);
scene.add(rimLight);

// ═══════════════════════════════════════════════════════════════════
//  SCENE — SELECTABLE TARGETS
// ═══════════════════════════════════════════════════════════════════
const selectables = [];
const targetDefs = [
  { name:'ALPHA-1', pos:[  0, 1.6,  -8], geo: new THREE.BoxGeometry(1.2,1.2,1.2),          color:0x0d3d66 },
  { name:'BETA-2',  pos:[  5, 1.2, -12], geo: new THREE.SphereGeometry(0.85,20,20),         color:0x3d0d55 },
  { name:'GAMMA-3', pos:[ -4, 2.0, -16], geo: new THREE.CylinderGeometry(.5,.5,2.2,14),     color:0x0d3d1a },
  { name:'DELTA-4', pos:[  2, 0.8,  -6], geo: new THREE.BoxGeometry(.9,.9,.9),               color:0x3d2800 },
  { name:'OMEGA-5', pos:[ -6, 1.8, -22], geo: new THREE.SphereGeometry(1.3,20,20),           color:0x003344 },
  { name:'SIGMA-6', pos:[  8, 2.5, -18], geo: new THREE.ConeGeometry(.7,2,12),               color:0x2d0d0d },
];
targetDefs.forEach(d => {
  const mat = new THREE.MeshStandardMaterial({
    color: d.color, metalness:0.7, roughness:0.25, emissive:0x000000
  });
  const mesh = new THREE.Mesh(d.geo, mat);
  mesh.position.set(...d.pos);
  mesh.userData.hudName = d.name;
  mesh.userData.origEmissive = new THREE.Color(0);
  scene.add(mesh);
  selectables.push(mesh);
});

// Grid floor
const grid = new THREE.GridHelper(100, 50, 0x0a2030, 0x061018);
scene.add(grid);

// Ambient floating particles
for (let i = 0; i < 120; i++) {
  const s = 0.03 + Math.random()*0.05;
  const pm = new THREE.Mesh(
    new THREE.BoxGeometry(s,s,s),
    new THREE.MeshBasicMaterial({ color:0x00e5ff, transparent:true, opacity:0.15+Math.random()*0.2 })
  );
  pm.position.set((Math.random()-.5)*60, .3+Math.random()*5, (Math.random()-.5)*60);
  pm.userData.floatSeed = Math.random()*Math.PI*2;
  scene.add(pm);
}

// ═══════════════════════════════════════════════════════════════════
//  HUD CANVAS — HIGH RESOLUTION
// ═══════════════════════════════════════════════════════════════════
// We match Quest 3's per-eye resolution (approx 1832×1920), scaled by DPR.
// On desktop we use window size. The key: HUD canvas is always at least
// devicePixelRatio × logical size so text is crisp.
const DPR = window.devicePixelRatio || 1;
const hudCanvas = document.createElement('canvas');
// Physical pixel count = logical * DPR for crispness
hudCanvas.width  = Math.round(HUD_LW * DPR);
hudCanvas.height = Math.round(HUD_LH * DPR);
const hud = hudCanvas.getContext('2d', { alpha:true });
// Scale context so all drawing uses logical coordinates
hud.scale(DPR, DPR);

// THREE texture from HUD canvas
const hudTex = new THREE.CanvasTexture(hudCanvas);
hudTex.minFilter = THREE.LinearFilter;   // no mipmap blur
hudTex.magFilter = THREE.LinearFilter;
hudTex.generateMipmaps = false;          // critical for crispness

// HUD plane — parented to camera so it moves with head
const hudPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(1, 1),
  new THREE.MeshBasicMaterial({
    map: hudTex,
    transparent: true,
    depthTest: false,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.NormalBlending,
  })
);
hudPlane.renderOrder = 9999;
camera.add(hudPlane);

function resizeHudPlane() {
  // Fit the plane to exactly fill the current FOV at distance HUD_Z
  const aspect = camera.aspect || (window.innerWidth/window.innerHeight);
  const fovRad = THREE.MathUtils.degToRad(S.currentFov);
  const planeH = 2 * Math.abs(HUD_Z) * Math.tan(fovRad / 2);
  const planeW = planeH * aspect;
  hudPlane.scale.set(planeW, planeH, 1);
  hudPlane.position.set(0, 0, HUD_Z);
}
resizeHudPlane();

// ═══════════════════════════════════════════════════════════════════
//  RAYCASTER
// ═══════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const _fwd = new THREE.Vector3();
const _box3 = new THREE.Box3();
const _v3   = new THREE.Vector3();

// ═══════════════════════════════════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════════════════════════════════
function cycleZoom() {
  S.zoomIndex = (S.zoomIndex + 1) % ZOOM_LEVELS.length;
  S.zoomTarget = ZOOM_LEVELS[S.zoomIndex];
  S.zoomStart  = performance.now();
  flash('zoom');
}

function easeInOut(t) { return t<0.5 ? 2*t*t : 1-(-2*t+2)**2/2; }

function updateZoom(now) {
  const t = Math.min(1, (now - S.zoomStart) / ZOOM_DURATION);
  const e = easeInOut(t);
  S.zoomFactor = S.zoomFactor + (S.zoomTarget - S.zoomFactor) * e;
  if (t >= 1) S.zoomFactor = S.zoomTarget;
  S.currentFov = THREE.MathUtils.clamp(BASE_FOV / S.zoomFactor, FOV_MIN, FOV_MAX);
  camera.fov = S.currentFov;
  camera.updateProjectionMatrix();
  resizeHudPlane();
}

// ═══════════════════════════════════════════════════════════════════
//  POSE SMOOTHING (only when zoomed > 1)
// ═══════════════════════════════════════════════════════════════════
function smoothPose() {
  if (!S.poseReady) {
    S.smoothPos.copy(camera.position);
    S.smoothQuat.copy(camera.quaternion);
    S.poseReady = true;
    return;
  }
  if (S.zoomFactor > 1.0) {
    S.smoothPos.lerp(camera.position, SMOOTH_POS);
    S.smoothQuat.slerp(camera.quaternion, SMOOTH_ORI);
  } else {
    S.smoothPos.copy(camera.position);
    S.smoothQuat.copy(camera.quaternion);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  RAYCAST / HOVER / LOCK
// ═══════════════════════════════════════════════════════════════════
function doRaycast() {
  _fwd.set(0, 0, -1).applyQuaternion(camera.quaternion);
  raycaster.set(camera.position, _fwd);
  raycaster.far = MAX_HOVER_DIST;
  const hits = raycaster.intersectObjects(selectables, false);
  S.hoverHit = hits.length > 0 ? hits[0] : null;

  // Update emissive highlight
  selectables.forEach(m => {
    const isHover = S.hoverHit && S.hoverHit.object === m;
    const isLocked = S.lockTarget === m;
    const target = isLocked ? new THREE.Color(0.3,0,0) :
                   isHover  ? new THREE.Color(0,0.12,0.18) :
                               new THREE.Color(0,0,0);
    m.material.emissive.lerp(target, 0.15);
  });

  // Lock validity check
  if (S.lockTarget) {
    const lt = S.lockTarget;
    const dist = camera.position.distanceTo(lt.position);
    if (dist > MAX_LOCK_DIST || !scene.getObjectById(lt.id)) {
      releaseLock(); return;
    }
    // Occlusion check
    const toTgt = _v3.subVectors(lt.position, camera.position);
    const len = toTgt.length();
    const oRay = new THREE.Raycaster(camera.position, toTgt.clone().normalize(), 0.1, len - 0.3);
    const oHits = oRay.intersectObjects(selectables, false);
    const occluded = oHits.length > 0 && oHits[0].object !== lt;
    S.occludeFrames = occluded ? S.occludeFrames + 1 : 0;
    if (S.occludeFrames > MAX_OCCL_FRAMES) releaseLock();
  }
}

function releaseLock() {
  S.lockTarget = null;
  S.occludeFrames = 0;
  S.bboxInit = false;
  S.lockLostTimer = performance.now() + 2200;
  flash('lockLost');
}

function tryLock() {
  if (S.lockTarget) { releaseLock(); return; }
  if (S.hoverHit) {
    S.lockTarget = S.hoverHit.object;
    S.occludeFrames = 0;
    S.bboxInit = false;
    flash('lock');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  BBOX PROJECTION
// ═══════════════════════════════════════════════════════════════════
function projectBbox(mesh) {
  _box3.setFromObject(mesh);
  const corners = [
    [_box3.min.x,_box3.min.y,_box3.min.z],[_box3.max.x,_box3.min.y,_box3.min.z],
    [_box3.min.x,_box3.max.y,_box3.min.z],[_box3.max.x,_box3.max.y,_box3.min.z],
    [_box3.min.x,_box3.min.y,_box3.max.z],[_box3.max.x,_box3.min.y,_box3.max.z],
    [_box3.min.x,_box3.max.y,_box3.max.z],[_box3.max.x,_box3.max.y,_box3.max.z],
  ];
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity, anyValid=false;
  // Project into logical HUD coords (0-HUD_LW, 0-HUD_LH)
  for (const c of corners) {
    _v3.set(c[0],c[1],c[2]);
    _v3.project(camera);
    if (_v3.z > 1) continue;
    const sx = (_v3.x  * .5 + .5) * HUD_LW;
    const sy = (-_v3.y * .5 + .5) * HUD_LH;
    minX = Math.min(minX, sx); maxX = Math.max(maxX, sx);
    minY = Math.min(minY, sy); maxY = Math.max(maxY, sy);
    anyValid = true;
  }
  if (!anyValid) return null;
  return { x:minX, y:minY, w:maxX-minX, h:maxY-minY };
}

function getSmoothBbox(raw) {
  if (!S.bboxInit) { S.bboxS = {...raw}; S.bboxInit = true; return {...raw}; }
  S.bboxS.x += (raw.x - S.bboxS.x) * BBOX_SMOOTH;
  S.bboxS.y += (raw.y - S.bboxS.y) * BBOX_SMOOTH;
  S.bboxS.w += (raw.w - S.bboxS.w) * BBOX_SMOOTH;
  S.bboxS.h += (raw.h - S.bboxS.h) * BBOX_SMOOTH;
  return {...S.bboxS};
}

// ═══════════════════════════════════════════════════════════════════
//  FLASH SYSTEM
// ═══════════════════════════════════════════════════════════════════
function flash(key, dur=350) { S.flashes[key] = performance.now() + dur; }
function flashAlpha(key) {
  const exp = S.flashes[key];
  if (!exp) return 0;
  const rem = exp - performance.now();
  if (rem <= 0) { delete S.flashes[key]; return 0; }
  return rem / 350;
}
function flashColor(baseHex, key) {
  const a = flashAlpha(key);
  if (a < 0.01) return baseHex;
  return lerpHex(baseHex, '#ffffff', a * 0.8);
}

function lerpHex(c1, c2, t) {
  const p = s => parseInt(s,16);
  const r1=p(c1.slice(1,3)), g1=p(c1.slice(3,5)), b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)), g2=p(c2.slice(3,5)), b2=p(c2.slice(5,7));
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════════
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function p2(n) { return String(n).padStart(2,'0'); }

function updateClock() {
  const n = new Date();
  S.clock.h    = p2(n.getHours());
  S.clock.m    = p2(n.getMinutes());
  S.clock.s    = p2(n.getSeconds());
  S.clock.date = `${DAYS[n.getDay()]} ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(updateClock, 500);
updateClock();

// ═══════════════════════════════════════════════════════════════════
//  GEOLOCATION
// ═══════════════════════════════════════════════════════════════════
let lastGeoLat=null, lastGeoLon=null, lastSpeedPos=null, lastSpeedTime=null;
const speedSamples=[];

function haversineM(a,b,c,d) {
  const R=6371000, dLat=(c-a)*Math.PI/180, dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function startGeo() {
  if (!navigator.geolocation) { S.gpsLabel='● GPS UNAVAILABLE'; return; }
  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    S.geoLat = lat; S.geoLon = lon;
    S.gpsLabel = '● GPS LOCKED';

    // Speed + odo
    const now = Date.now();
    if (lastSpeedPos) {
      const dist = haversineM(lastSpeedPos.lat, lastSpeedPos.lon, lat, lon);
      const dt = (now - lastSpeedTime) / 1000;
      if (dt > 0.3) {
        const spd = pos.coords.speed != null ? pos.coords.speed*3.6 : (dist/dt)*3.6;
        speedSamples.push(spd);
        if (speedSamples.length > 4) speedSamples.shift();
        S.speedKmh = speedSamples.reduce((a,b)=>a+b)/speedSamples.length;
        if (S.speedKmh < 0.5) S.speedKmh = 0;
        if (dist > 2) S.odoM += dist;
      }
    }
    lastSpeedPos = {lat,lon}; lastSpeedTime = now;

    // Breadcrumbs for minimap
    if (!S.crumbs.length || haversineM(S.crumbs[S.crumbs.length-1].lat, S.crumbs[S.crumbs.length-1].lon, lat, lon) > 4) {
      S.crumbs.push({lat,lon});
      if (S.crumbs.length > 300) S.crumbs.shift();
    }

    const moved = lastGeoLat==null || Math.abs(lat-lastGeoLat)>.0005 || Math.abs(lon-lastGeoLon)>.0005;
    lastGeoLat=lat; lastGeoLon=lon;

    const now2 = performance.now();
    if (now2 - S.weatherFetched > WEATHER_MS || moved && S.weatherFetched===0) fetchWeather();
    if (now2 - S.aqiFetched    > AQI_MS    || moved && S.aqiFetched===0)    fetchAQI();
    if (moved) reverseGeocode();
  },
  () => { S.gpsLabel='● GPS ERROR'; },
  { enableHighAccuracy:true, maximumAge:0, timeout:20000 }
  );
}
startGeo();

// ═══════════════════════════════════════════════════════════════════
//  REVERSE GEOCODE
// ═══════════════════════════════════════════════════════════════════
let geocodeTimer;
function reverseGeocode() {
  clearTimeout(geocodeTimer);
  geocodeTimer = setTimeout(async () => {
    if (!S.geoLat) return;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S.geoLat.toFixed(4)}&lon=${S.geoLon.toFixed(4)}&format=json&zoom=16`, {headers:{'Accept-Language':'en'}});
      const d = await r.json();
      const addr = d.address || {};
      S.street = (addr.road||addr.pedestrian||addr.path||'').toUpperCase();
      const city = addr.city||addr.town||addr.village||'';
      const area = addr.neighbourhood||addr.suburb||addr.city_district||city||addr.state||'';
      S.area = (area&&city&&area!==city ? area+', '+city : area||city||'').toUpperCase();
      flash('geo');
    } catch(_) {}
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
//  WEATHER
// ═══════════════════════════════════════════════════════════════════
const WMO_CODES = {
  0:'CLEAR',1:'MOSTLY CLR',2:'PARTLY CLD',3:'OVERCAST',
  45:'FOG',48:'ICING FOG',
  51:'LT DRIZZLE',53:'DRIZZLE',55:'HVY DRIZZLE',
  61:'LT RAIN',63:'RAIN',65:'HVY RAIN',
  71:'LT SNOW',73:'SNOW',75:'HVY SNOW',
  80:'SHOWERS',81:'SHOWERS',82:'HVY SHOWERS',
  95:'STORM',96:'STORM/HAIL',99:'STORM/HAIL',
};

async function fetchWeather() {
  if (!S.geoLat) return;
  S.weatherFetched = performance.now();
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${S.geoLat.toFixed(4)}&longitude=${S.geoLon.toFixed(4)}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=sunrise,sunset&timezone=auto&forecast_days=1`;
    const d = await (await fetch(url)).json();
    const c = d.current;
    S.weather.temp = `${Math.round(c.temperature_2m)}°C`;
    S.weather.cond = WMO_CODES[c.weather_code] || `CODE${c.weather_code}`;
    S.weather.wind = `${Math.round(c.wind_speed_10m)} KM/H`;
    S.weather.hum  = `${c.relative_humidity_2m}%`;
    if (d.daily) {
      const sr = d.daily.sunrise[0].split('T')[1].slice(0,5);
      const ss = d.daily.sunset[0].split('T')[1].slice(0,5);
      S.weather.sun = `↑${sr} ↓${ss}`;
    }
    flash('weather');
  } catch(_) {}
}

async function fetchAQI() {
  if (!S.geoLat) return;
  S.aqiFetched = performance.now();
  try {
    const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${S.geoLat.toFixed(4)}&longitude=${S.geoLon.toFixed(4)}&current=european_aqi,us_aqi,grass_pollen,birch_pollen,mugwort_pollen`;
    const d = await (await fetch(url)).json();
    const c = d.current;
    const aqiVal = c.european_aqi ?? c.us_aqi ?? null;
    if (aqiVal != null) {
      const {label,color} = aqiBucket(aqiVal);
      S.aqi = { val:String(Math.round(aqiVal)), label, color };
    }
    const pollens = [
      {n:'GRASS',  v:c.grass_pollen},
      {n:'BIRCH',  v:c.birch_pollen},
      {n:'MUGWORT',v:c.mugwort_pollen},
    ].filter(x => x.v != null);
    if (pollens.length) {
      const top = pollens.reduce((a,b)=>b.v>a.v?b:a);
      const {label,color} = pollenBucket(top.v);
      S.pollen = { val:String(Math.round(top.v)), label:`${label} ${top.n}`, color };
    }
    flash('aqi');
  } catch(_) {}
}

function aqiBucket(v) {
  if (v<=25) return {label:'GOOD',      color:T.good};
  if (v<=50) return {label:'FAIR',      color:T.good};
  if (v<=75) return {label:'MODERATE',  color:T.warn};
  if (v<=100)return {label:'POOR',      color:T.warn};
  if (v<=150)return {label:'VERY POOR', color:T.danger};
  return             {label:'HAZARDOUS',color:T.danger};
}
function pollenBucket(v) {
  if (v<=10)return {label:'LOW',       color:T.good};
  if (v<=30)return {label:'MODERATE',  color:T.warn};
  if (v<=50)return {label:'HIGH',      color:T.warn};
  return           {label:'VERY HIGH', color:T.danger};
}

// ═══════════════════════════════════════════════════════════════════
//  HEADING (compass)
// ═══════════════════════════════════════════════════════════════════
(function startHeading() {
  function applyOrient(e) {
    let hdg = null;
    if (e.webkitCompassHeading != null) hdg = e.webkitCompassHeading;
    else if (e.absolute && e.alpha != null) hdg = (360 - e.alpha + 360) % 360;
    if (hdg != null) S.headingTarget = hdg;
  }
  if ('ondeviceorientationabsolute' in window)
    window.addEventListener('deviceorientationabsolute', applyOrient, true);
  window.addEventListener('deviceorientation', applyOrient, true);
})();

function updateHeading() {
  if (S.headingTarget == null) return;
  if (S.headingSmooth == null) { S.headingSmooth = S.headingTarget; return; }
  let diff = S.headingTarget - S.headingSmooth;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  S.headingSmooth = (S.headingSmooth + diff * 0.1 + 360) % 360;
}

// ═══════════════════════════════════════════════════════════════════
//  MINIMAP TILE CACHE
// ═══════════════════════════════════════════════════════════════════
const tileCache = {};
const MAP_ZOOM = 17;

function lon2tf(lo,z){return(lo+180)/360*Math.pow(2,z);}
function lat2tf(la,z){return(1-Math.log(Math.tan(la*Math.PI/180)+1/Math.cos(la*Math.PI/180))/Math.PI)/2*Math.pow(2,z);}

function getTile(tx,ty,z) {
  const key=`${z}/${tx}/${ty}`;
  if (tileCache[key]) return tileCache[key];
  const e={img:new Image(),loaded:false};
  e.img.crossOrigin='anonymous';
  e.img.onload=()=>{e.loaded=true;};
  e.img.src=`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`;
  tileCache[key]=e; return e;
}

function llToPx(pLat,pLon,pxPerM) {
  return {
    x: (pLon-S.geoLon)*111320*Math.cos(S.geoLat*Math.PI/180)*pxPerM,
    y:-(pLat-S.geoLat)*111320*pxPerM,
  };
}

//  HUD DRAWING UTILITIES
// ═══════════════════════════════════════════════════════════════════
// All coordinates in LOGICAL pixels (HUD_LW × HUD_LH)

const LW = HUD_LW;
const LH = HUD_LH;
const cx = LW/2;
const cy = LH/2;

function cls() { hud.clearRect(0, 0, LW, LH); }

function setFont(size, weight='700', fam="'Courier New',monospace") {
  hud.font = `${weight} ${size}px ${fam}`;
}
function txt(str, x, y, col=T.main, alpha=1, align='left') {
  hud.save();
  hud.globalAlpha = alpha;
  hud.fillStyle = col;
  hud.textAlign = align;
  hud.textBaseline = 'alphabetic';
  hud.fillText(str, x, y);
  hud.restore();
}
function line(x1,y1,x2,y2,col=T.main,alpha=1,lw=1.5) {
  hud.save(); hud.globalAlpha=alpha; hud.strokeStyle=col; hud.lineWidth=lw;
  hud.beginPath(); hud.moveTo(x1,y1); hud.lineTo(x2,y2); hud.stroke(); hud.restore();
}
function rect(x,y,w,h,col,alpha=1) {
  hud.save(); hud.globalAlpha=alpha; hud.fillStyle=col;
  hud.fillRect(x,y,w,h); hud.restore();
}
function strokeRect(x,y,w,h,col,alpha=1,lw=1.5) {
  hud.save(); hud.globalAlpha=alpha; hud.strokeStyle=col; hud.lineWidth=lw;
  hud.strokeRect(x,y,w,h); hud.restore();
}
function panel(x,y,w,h,col=T.main) {
  rect(x,y,w,h,'rgba(2,10,18,0.72)');
  strokeRect(x,y,w,h,col,0.18,1);
}

// ── 1. SCANLINE + VIGNETTE ──────────────────────────────────────
let sweepY = 0;
function drawScanlines() {
  // Subtle horizontal scanlines
  for (let y=0; y<LH; y+=4) {
    hud.save(); hud.globalAlpha=0.022; hud.strokeStyle=T.main; hud.lineWidth=1;
    hud.beginPath(); hud.moveTo(0,y); hud.lineTo(LW,y); hud.stroke(); hud.restore();
  }
  // Moving sweep
  sweepY += 0.8; if (sweepY > LH+40) sweepY=-40;
  const sg = hud.createLinearGradient(0,sweepY-20,0,sweepY+20);
  sg.addColorStop(0,'transparent'); sg.addColorStop(.5,T.main); sg.addColorStop(1,'transparent');
  hud.save(); hud.globalAlpha=0.055; hud.strokeStyle=sg; hud.lineWidth=2;
  hud.beginPath(); hud.moveTo(0,sweepY); hud.lineTo(LW,sweepY); hud.stroke(); hud.restore();
}

// ── 2. FRAME CORNERS ────────────────────────────────────────────
function drawCorners() {
  const m=28, c=22, col=T.main, a=0.35, lw=1.5;
  [[m,m,1,1],[LW-m,m,-1,1],[m,LH-m,1,-1],[LW-m,LH-m,-1,-1]].forEach(([x,y,sx,sy])=>{
    hud.save(); hud.strokeStyle=col; hud.globalAlpha=a; hud.lineWidth=lw;
    hud.beginPath(); hud.moveTo(x,y+sy*c); hud.lineTo(x,y); hud.lineTo(x+sx*c,y); hud.stroke(); hud.restore();
  });
}

// ── 3. COMPASS BAR (top centre) ────────────────────────────────
function drawCompass() {
  const bw=440, bh=32, bx=cx-bw/2, by=14;
  panel(bx,by,bw,bh);

  const hdg = S.headingSmooth ?? 0;
  const pxPerDeg = bw/80;
  const CARD = {0:'N',45:'NE',90:'E',135:'SE',180:'S',225:'SW',270:'W',315:'NW'};

  // Clip to bar
  hud.save();
  hud.beginPath(); hud.rect(bx+1,by+1,bw-2,bh-2); hud.clip();

  for (let d=-120; d<=120+360; d+=5) {
    const offset = (d-hdg)*pxPerDeg;
    if (offset < -bw/2-20 || offset > bw/2+20) continue;
    const px = cx + offset;
    const dNorm = ((d%360)+360)%360;
    const isCard = CARD[dNorm] !== undefined;
    const isMajor = d%10===0;
    const tickH = isCard ? bh*.52 : isMajor ? bh*.32 : bh*.14;
    hud.save();
    hud.strokeStyle = dNorm===0 ? T.accent : T.main;
    hud.lineWidth = isCard ? 1.5 : 0.7;
    hud.globalAlpha = isCard ? 0.9 : isMajor ? 0.35 : 0.12;
    hud.beginPath(); hud.moveTo(px,by+bh); hud.lineTo(px,by+bh-tickH); hud.stroke();
    if (isCard) {
      setFont(10,'900'); hud.fillStyle = dNorm===0?T.accent:T.main;
      hud.globalAlpha = dNorm===0?1:0.7; hud.textAlign='center'; hud.textBaseline='top';
      hud.fillText(CARD[dNorm], px, by+2);
    }
    hud.restore();
  }
  hud.restore();

  // Centre tick
  hud.save(); hud.strokeStyle=T.accent; hud.lineWidth=2; hud.globalAlpha=0.9;
  hud.beginPath(); hud.moveTo(cx,by+bh+1); hud.lineTo(cx-4,by+bh+7); hud.lineTo(cx+4,by+bh+7); hud.closePath(); hud.fill(); hud.restore();

  // Heading readout
  const hdgStr = S.headingSmooth!=null ? `${Math.round(S.headingSmooth).toString().padStart(3,'0')}°` : '---°';
  setFont(12,'900'); hud.textAlign='center';
  const tw = hud.measureText(hdgStr).width + 12;
  rect(cx-tw/2, by+bh+6, tw, 15, 'rgba(0,5,10,0.85)');
  strokeRect(cx-tw/2, by+bh+6, tw, 15, T.main, 0.25, 1);
  setFont(11,'900'); txt(hdgStr, cx, by+bh+17, T.accent, 0.95, 'center');
}

// ── 5. TOP-RIGHT: ZOOM INDICATOR ─────────────────────────────────
function drawZoom() {
  const pw=170, ph=72, ox=LW-pw-24, oy=20;
  panel(ox,oy,pw,ph);

  setFont(9,'900'); txt('ZOOM', ox+10, oy+20, T.dim, 0.7);
  const zStr = `${S.zoomFactor.toFixed(1)}×`;
  setFont(30,'900');
  hud.save(); hud.shadowColor=T.main; hud.shadowBlur=8;
  txt(zStr, ox+pw-10, oy+42, flashColor(T.main,'zoom'), 0.95, 'right');
  hud.restore();

  // Bar
  const bx=ox+10, bby=oy+54, bw=pw-20, bh=5;
  rect(bx,bby,bw,bh,'rgba(255,255,255,0.04)');
  strokeRect(bx,bby,bw,bh,T.main,0.2,1);
  const ratio = Math.log2(Math.max(S.zoomFactor,1)) / Math.log2(10);
  const filled = Math.min(1,ratio) * bw;
  rect(bx,bby,filled,bh,T.main,0.8);
  // Tick marks
  ZOOM_LEVELS.forEach(z=>{
    const tx = bx + Math.log2(Math.max(z,1))/Math.log2(10)*bw;
    line(tx,bby-3,tx,bby+bh+3,T.main,0.3,1);
  });

  // Level labels
  setFont(8,'700');
  ZOOM_LEVELS.forEach(z=>{
    const tx = bx + Math.log2(Math.max(z,1))/Math.log2(10)*bw;
    txt(`${z}×`, tx, oy+50, T.dim, 0.35, 'center');
  });
}

// ── 6. RETICLE (centre) ──────────────────────────────────────────
let reticleR = 14;
let lockAng = 0;

function drawReticle() {
  const hover  = S.hoverHit  != null;
  const locked = S.lockTarget != null;
  const col    = locked ? T.lock : hover ? T.warn : T.main;

  reticleR += ((hover ? 18 : 13) - reticleR) * 0.12;
  lockAng = (lockAng + 0.025) % (Math.PI*2);

  hud.save();

  // Centre dot
  hud.fillStyle = col; hud.globalAlpha = 0.9;
  hud.beginPath(); hud.arc(cx,cy,2.5,0,Math.PI*2); hud.fill();

  // Inner ring
  hud.strokeStyle = col; hud.lineWidth = 1.5; hud.globalAlpha = 0.7;
  hud.beginPath(); hud.arc(cx,cy,reticleR,0,Math.PI*2); hud.stroke();

  // Cross gaps
  const g=24, gap=reticleR+4;
  hud.strokeStyle=col; hud.lineWidth=1; hud.globalAlpha=0.5;
  hud.beginPath();
  hud.moveTo(cx-g,cy); hud.lineTo(cx-gap,cy);
  hud.moveTo(cx+gap,cy); hud.lineTo(cx+g,cy);
  hud.moveTo(cx,cy-g); hud.lineTo(cx,cy-gap);
  hud.moveTo(cx,cy+gap); hud.lineTo(cx,cy+g);
  hud.stroke();

  // Lock spinning arcs
  if (locked) {
    hud.globalAlpha = 0.9; hud.strokeStyle = T.lock; hud.lineWidth = 2;
    for (let i=0;i<4;i++) {
      const a = lockAng + i*(Math.PI/2);
      hud.beginPath(); hud.arc(cx,cy,reticleR+10,a,a+Math.PI/3); hud.stroke();
    }
    // Pulse ring
    const pa = (Math.sin(performance.now()*0.005)*0.5+0.5);
    hud.globalAlpha = pa*0.25; hud.lineWidth=1;
    hud.beginPath(); hud.arc(cx,cy,reticleR+18,0,Math.PI*2); hud.stroke();
  }

  hud.restore();
}

// ── 7. TARGET BRACKETS + OVERLAY ─────────────────────────────────
function drawTargetOverlay() {
  const target = S.lockTarget || S.hoverHit?.object;
  if (!target) return;

  const raw = projectBbox(target);
  if (!raw) return;

  const bbox  = S.lockTarget ? getSmoothBbox(raw) : raw;
  const isLocked = !!S.lockTarget;
  const col   = isLocked ? T.lock : T.warn;
  const thick = isLocked ? 2.5 : 1.8;
  const pad   = 10;
  const name  = target.userData.hudName;
  const dist  = camera.position.distanceTo(target.position);

  const bx=bbox.x-pad, by=bbox.y-pad, bw=bbox.w+pad*2, bh=bbox.h+pad*2;
  const margin=56;
  const centX=bx+bw/2, centY=by+bh/2;
  const offScreen = centX<margin||centX>LW-margin||centY<margin||centY>LH-margin;

  if (offScreen) {
    // Edge arrow
    const ang = Math.atan2(centY-cy, centX-cx);
    const ex = cx + Math.cos(ang)*(Math.min(cx,cy)-72);
    const ey = cy + Math.sin(ang)*(Math.min(cx,cy)-72);
    hud.save(); hud.translate(ex,ey); hud.rotate(ang);
    hud.strokeStyle=T.warn; hud.lineWidth=2; hud.globalAlpha=0.8;
    hud.beginPath(); hud.moveTo(-12,0); hud.lineTo(12,0); hud.moveTo(7,-6); hud.lineTo(12,0); hud.lineTo(7,6); hud.stroke();
    hud.restore();
    setFont(10,'900'); txt(name, ex+14, ey-4, T.warn, 0.7);
    return;
  }

  // Corner brackets
  const cs=18;
  hud.save(); hud.strokeStyle=col; hud.lineWidth=thick; hud.globalAlpha=isLocked?0.92:0.72;
  hud.lineCap='round';
  [[bx,by,1,1],[bx+bw,by,-1,1],[bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]].forEach(([x,y,sx,sy])=>{
    hud.beginPath(); hud.moveTo(x,y+sy*cs); hud.lineTo(x,y); hud.lineTo(x+sx*cs,y); hud.stroke();
  });
  hud.restore();

  // Labels
  setFont(12,'900');
  txt(name, bx, by-13, col, isLocked?1:0.85);
  txt(`${dist.toFixed(1)}m`, bx+bw, by-13, col, isLocked?0.9:0.7, 'right');

  if (isLocked) {
    setFont(10,'900');
    txt('◆ LOCKED', bx+bw/2, by-27, T.lock, 0.9, 'center');
    // Scan line
    const scanY = by + ((performance.now()*0.001*50)%(bh+0));
    hud.save();
    const sg=hud.createLinearGradient(bx,scanY-3,bx,scanY+3);
    sg.addColorStop(0,'rgba(255,68,68,0)');sg.addColorStop(.5,'rgba(255,68,68,0.28)');sg.addColorStop(1,'rgba(255,68,68,0)');
    hud.fillStyle=sg; hud.fillRect(bx,scanY-3,bw,6); hud.restore();
  }
}

// ── 10. BOTTOM-LEFT: MINIMAP ─────────────────────────────────────
function drawMinimap() {
  const R=72, mmCx=24+R, mmCy=LH-24-R;

  // Background circle
  hud.save();
  hud.beginPath(); hud.arc(mmCx,mmCy,R,0,Math.PI*2); hud.clip();
  rect(mmCx-R,mmCy-R,R*2,R*2,'rgba(0,5,10,0.88)');

  if (S.geoLat==null) {
    setFont(9,'900'); txt('NO SIGNAL',mmCx,mmCy+4,T.dim,0.4,'center'); hud.restore();
  } else {
    const hdg = S.headingSmooth??0;
    const headRad = hdg*Math.PI/180;
    const MM_RANGE=220;
    const pxPerM = R/MM_RANGE;
    const txf=lon2tf(S.geoLon,MAP_ZOOM), tyf=lat2tf(S.geoLat,MAP_ZOOM);
    const txi=Math.floor(txf), tyi=Math.floor(tyf);
    const fracX=txf-txi, fracY=tyf-tyi;
    const mpp=156543.03392*Math.cos(S.geoLat*Math.PI/180)/Math.pow(2,MAP_ZOOM);
    const tileSize=256*(mpp/pxPerM/256);  // tile display size in logical px

    hud.save(); hud.translate(mmCx,mmCy); hud.rotate(-headRad);
    hud.globalAlpha=0.35;
    for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
      const t=getTile(txi+dx,tyi+dy,MAP_ZOOM);
      if(t.loaded){
        const px=(dx-fracX)*tileSize,py=(dy-fracY)*tileSize;
        hud.drawImage(t.img,px-tileSize/2,py-tileSize/2,tileSize,tileSize);
      }
    }

    // Breadcrumbs
    if (S.crumbs.length>1) {
      hud.strokeStyle=T.accent; hud.lineWidth=2; hud.globalAlpha=0.55;
      hud.lineCap='round'; hud.lineJoin='round'; hud.beginPath();
      S.crumbs.forEach((c,i)=>{
        const p=llToPx(c.lat,c.lon,pxPerM);
        i===0 ? hud.moveTo(p.x,p.y) : hud.lineTo(p.x,p.y);
      });
      hud.stroke();
    }
    hud.restore();

    hud.restore(); // restore clip

    // Grid rings
    hud.save(); hud.strokeStyle=T.main; hud.lineWidth=0.6;
    [0.4,0.7,1.0].forEach(f=>{
      hud.globalAlpha=0.07; hud.beginPath(); hud.arc(mmCx,mmCy,R*f,0,Math.PI*2); hud.stroke();
    });
    // Cross
    hud.globalAlpha=0.08; hud.lineWidth=0.5;
    line(mmCx-R,mmCy,mmCx+R,mmCy,T.main,0.08,0.6);
    line(mmCx,mmCy-R,mmCx,mmCy+R,T.main,0.08,0.6);
    hud.restore();

    // Cardinal labels
    const CARD=[{l:'N',a:0,col:T.accent},{l:'E',a:90},{l:'S',a:180},{l:'W',a:270}];
    const hdg2=S.headingSmooth??0;
    setFont(8,'900'); hud.textAlign='center'; hud.textBaseline='middle';
    CARD.forEach(cd=>{
      const ang=(cd.a-hdg2)*Math.PI/180, r=R-9;
      hud.fillStyle=cd.col||T.main; hud.globalAlpha=cd.l==='N'?1:0.4;
      hud.fillText(cd.l, mmCx+Math.sin(ang)*r, mmCy-Math.cos(ang)*r);
    });

    // Player dot
    hud.fillStyle='#fff'; hud.globalAlpha=0.9; hud.beginPath(); hud.arc(mmCx,mmCy,3.5,0,Math.PI*2); hud.fill();
    hud.fillStyle=T.main; hud.globalAlpha=1; hud.beginPath(); hud.arc(mmCx,mmCy,2,0,Math.PI*2); hud.fill();
  }

  // Border ring
  hud.save(); hud.strokeStyle=T.main; hud.lineWidth=1.5; hud.globalAlpha=0.45;
  hud.beginPath(); hud.arc(mmCx,mmCy,R,0,Math.PI*2); hud.stroke(); hud.restore();

  // Heading label below
  const hdgLbl = S.headingSmooth!=null ? `HDG ${Math.round(S.headingSmooth).toString().padStart(3,'0')}°` : 'HDG ---°';
  setFont(9,'900'); txt(hdgLbl, mmCx, mmCy+R+14, T.main, 0.55, 'center');

  // Speed below minimap
  const spdStr = S.speedKmh.toFixed(1);
  setFont(18,'900');
  hud.save(); hud.shadowColor=T.main; hud.shadowBlur=6;
  txt(spdStr, mmCx, mmCy+R+30, T.main, 0.85, 'center');
  hud.restore();
  setFont(8,'700'); txt('KM/H', mmCx, mmCy+R+40, T.dim, 0.4, 'center');
}

// ── 11. CENTRE HUD STATUS BAR ────────────────────────────────────
function drawStatusBar() {
  const locked=S.lockTarget!=null, hover=S.hoverHit!=null;
  if (!locked && !hover) return;
  const label=locked ? `◆ LOCKED: ${S.lockTarget.userData.hudName}` :
                       `◉ HOVER: ${S.hoverHit.object.userData.hudName}`;
  const col=locked?T.lock:T.warn;
  setFont(11,'900'); hud.textAlign='center';
  const tw=hud.measureText(label).width+20;
  rect(cx-tw/2,LH-62,tw,18,'rgba(0,5,10,0.8)');
  strokeRect(cx-tw/2,LH-62,tw,18,col,0.3,1);
  txt(label,cx,LH-48,col,0.9,'center');
}

// ── FULL FRAME DRAW ──────────────────────────────────────────────
function drawHUD() {
  cls();
  drawScanlines();
  drawCorners();
  drawCompass();
  drawClock();
  drawZoom();
  drawMinimap();
  drawWeather();
  drawTargetOverlay();
  drawReticle();
  drawLockLost();
  drawStatusBar();
  hudTex.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════════════════
//  KEYBOARD INPUT (desktop testing)
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  if (e.key==='z'||e.key==='Z') cycleZoom();
  if (e.key==='l'||e.key==='L') tryLock();
});

// ═══════════════════════════════════════════════════════════════════
//  MAIN RENDER LOOP
// ═══════════════════════════════════════════════════════════════════
let frameN = 0;

renderer.setAnimationLoop((time, frame) => {
  frameN++;
  const now = performance.now();

  updateZoom(now);
  updateHeading();
  smoothPose();

  // Animate targets
  selectables.forEach((m,i) => {
    m.rotation.y += 0.004 * (i%2===0?1:-1);
    m.position.y  = targetDefs[i].pos[1] + Math.sin(time*.001+i*.9)*.035;
  });

  // Animate particles
  scene.children.forEach(obj => {
    if (obj.userData.floatSeed !== undefined) {
      obj.position.y += Math.sin(time*.0008 + obj.userData.floatSeed) * .0004;
      obj.rotation.y += .002;
    }
  });

  // Raycast every 2nd frame
  if (frameN % 2 === 0) doRaycast();

  // XR controller input
  if (S.inVR && frame) handleXRInput(frame);

  drawHUD();

  renderer.render(scene, camera);
});

// ═══════════════════════════════════════════════════════════════════
//  XR CONTROLLER INPUT
// ═══════════════════════════════════════════════════════════════════
function handleXRInput(frame) {
  const session = renderer.xr.getSession();
  if (!session) return;
  let trigger=false, btnA=false;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const gp = src.gamepad;
    if (gp.buttons[0]?.pressed) trigger=true;
    if (gp.buttons[4]?.pressed || gp.buttons[2]?.pressed) btnA=true;
  }
  if (trigger && !S.prevTrigger) tryLock();
  if (btnA   && !S.prevBtnA)   cycleZoom();
  S.prevTrigger = trigger;
  S.prevBtnA    = btnA;
}

// ═══════════════════════════════════════════════════════════════════
//  VR SESSION — IMMERSIVE-VR ONLY
// ═══════════════════════════════════════════════════════════════════
const enterBtn    = document.getElementById('enterBtn');
const statusMsg   = document.getElementById('statusMsg');
const launchScreen= document.getElementById('launchScreen');

// Check support
(async () => {
  if (!navigator.xr) {
    statusMsg.textContent='WebXR not available in this browser.'; return;
  }
  const vrOk = await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
  if (vrOk) {
    enterBtn.disabled = false;
    statusMsg.textContent='Quest 3 ready · trigger=lock · A=zoom · Z/L on keyboard';
  } else {
    enterBtn.disabled = true;
    statusMsg.textContent='immersive-vr not supported · running desktop preview';
  }
})();

window.enterVR = async function() {
  if (!navigator.xr) { statusMsg.textContent='WebXR unavailable'; return; }

  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor','bounded-floor','hand-tracking'],
    });

    // Make renderer XR-compatible
    await renderer.xr.setSession(session);
    S.inVR = true; S.xrSession = session;
    launchScreen.style.display = 'none';

    // Resize HUD canvas to match XR framebuffer
    session.addEventListener('visibilitychange', () => {});
    session.addEventListener('end', () => {
      S.inVR = false; S.xrSession = null;
      launchScreen.style.display = 'flex';
      enterBtn.textContent = '◈ ENTER VR';
    });

    // After first frame, query XR viewport resolution and upscale HUD canvas
    const origAnimLoop = renderer.xr.getSession;
    const firstFrameHook = () => {
      const gl = renderer.getContext();
      const baseLayer = session.renderState.baseLayer;
      if (baseLayer) {
        // Per-eye resolution — scale HUD canvas to match
        const vp = baseLayer.getViewport(session.renderState.layers?.[0]);
        // The WebGLLayer framebuffer is at XR resolution; our HUD needs to match
        // We use the framebuffer dimensions for physical pixel count
        const fbW = baseLayer.framebufferWidth;
        const fbH = baseLayer.framebufferHeight;
        if (fbW && fbH && (fbW !== hudCanvas.width || fbH !== hudCanvas.height)) {
          hudCanvas.width  = fbW;
          hudCanvas.height = fbH;
          hud.resetTransform();
          // Scale so logical coords (HUD_LW×HUD_LH) fill the framebuffer
          hud.scale(fbW/HUD_LW, fbH/HUD_LH);
          hudTex.needsUpdate = true;
        }
      }
    };
    // Hook into first animation frame
    session.requestAnimationFrame(() => { firstFrameHook(); });

    enterBtn.textContent = '◈ EXIT VR';

  } catch(err) {
    statusMsg.textContent = `VR Error: ${err.message}`;
    console.error('XR error:', err);
  }
};

// ═══════════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  resizeHudPlane();
});

</script>
