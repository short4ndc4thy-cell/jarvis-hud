<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest 3 HUD</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:monospace; }
  #overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.85); color:#00ff88; z-index:100;
  }
  #overlay h1 { font-size:1.4rem; letter-spacing:0.15em; margin-bottom:1rem; text-transform:uppercase; }
  #startBtn {
    padding:0.75rem 2rem; background:transparent; border:1px solid #00ff88;
    color:#00ff88; font-family:monospace; font-size:1rem; letter-spacing:0.1em;
    cursor:pointer; text-transform:uppercase; transition:all 0.2s;
  }
  #startBtn:hover { background:#00ff8820; box-shadow:0 0 16px #00ff8860; }
  #status { margin-top:0.75rem; font-size:0.75rem; color:#00ff8880; letter-spacing:0.08em; }
  canvas#c { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<div id="overlay">
  <h1>⬡ TACTICAL HUD v2.0</h1>
  <button id="startBtn">ENTER VR</button>
  <div id="status">Quest 3 · WebXR · Immersive-VR</div>
</div>
<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ─── STATE ────────────────────────────────────────────────────────────────────
const STATE = {
  // Zoom
  zoomLevels: [1,2,4,8,10],
  zoomIndex: 0,
  zoomFactor: 1,
  targetZoomFactor: 1,
  zoomStartTime: 0,
  zoomDuration: 200,
  baseFov: 75,

  // Smoothed pose
  smoothPos: new THREE.Vector3(),
  smoothQuat: new THREE.Quaternion(),
  poseInit: false,

  // Hover / Lock
  hoverTarget: null,
  lockTarget: null,
  lockLost: false,
  occlusionFrames: 0,
  maxOcclusionFrames: 30,
  maxLockDistance: 80,
  maxHoverDistance: 30,

  // Bbox smooth
  bboxSmooth: { x:0, y:0, w:0, h:0 },
  bboxPrev: null,

  // Reticle animation
  reticleScale: 1,
  lockRingAngle: 0,
  lockRingAnim: 0,

  // Flash state
  flashTargets: {},

  // ENV / Clock
  clock: { h:'--', m:'--', s:'--', date:'', loc:'' },
  weather: { temp:'--', cond:'--', wind:'--', hum:'--', sunrise:'--', sunset:'--' },
  airQ: { aqi:'--', aqiLabel:'UNKNOWN', aqiColor:'#888', pollen:'--', pollenLabel:'--', pollenColor:'#888' },
  geoLat: null, geoLon: null,
  lastWeatherFetch: 0,
  lastAQIFetch: 0,
  WEATHER_INTERVAL: 10*60*1000,
  AQI_INTERVAL: 30*60*1000,

  // XR
  xrSession: null,
  xrRefSpace: null,
  inXR: false,

  // Input
  triggerPressed: false,
  prevTriggerPressed: false,
};

// ─── THREE SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);

const camera = new THREE.PerspectiveCamera(STATE.baseFov, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0,1.6,0);

// Lighting
scene.add(new THREE.AmbientLight(0x334455, 1.5));
const dLight = new THREE.DirectionalLight(0x88ccff, 1.2);
dLight.position.set(5,10,5);
scene.add(dLight);

// ─── SCENE TARGETS ────────────────────────────────────────────────────────────
const selectableMeshes = [];
const targetDefs = [
  { name:'ALPHA-1', pos:[0,1.6,-8],  geo:new THREE.BoxGeometry(1.2,1.2,1.2),     color:0x224466 },
  { name:'BETA-2',  pos:[4,1.2,-12], geo:new THREE.SphereGeometry(0.8,16,16),     color:0x442244 },
  { name:'GAMMA-3', pos:[-5,2,-15],  geo:new THREE.CylinderGeometry(0.5,0.5,2,12),color:0x224422 },
  { name:'DELTA-4', pos:[2,0.8,-6],  geo:new THREE.BoxGeometry(0.8,0.8,0.8),      color:0x443300 },
  { name:'OMEGA-5', pos:[-3,1.8,-20],geo:new THREE.SphereGeometry(1.2,16,16),     color:0x003344 },
];
targetDefs.forEach(d => {
  const mat = new THREE.MeshStandardMaterial({ color:d.color, metalness:0.6, roughness:0.3 });
  const mesh = new THREE.Mesh(d.geo, mat);
  mesh.position.set(...d.pos);
  mesh.userData.name = d.name;
  mesh.userData.baseMat = mat;
  scene.add(mesh);
  selectableMeshes.push(mesh);
});

// Grid floor
const gridHelper = new THREE.GridHelper(60,30,0x112233,0x0a1520);
gridHelper.position.y = 0;
scene.add(gridHelper);

// Ambient particles (small floating cubes)
for(let i=0;i<80;i++){
  const s=0.04+Math.random()*0.06;
  const pm=new THREE.Mesh(
    new THREE.BoxGeometry(s,s,s),
    new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.3+Math.random()*0.3})
  );
  pm.position.set((Math.random()-0.5)*40,0.5+Math.random()*4,(Math.random()-0.5)*40);
  scene.add(pm);
}

// ─── HUD CANVAS ───────────────────────────────────────────────────────────────
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 2048; hudCanvas.height = 2048;
const hud = hudCanvas.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCanvas);

// HUD plane attached to camera
const hudGeo = new THREE.PlaneGeometry(1,1);
const hudMat = new THREE.MeshBasicMaterial({
  map: hudTex, transparent:true, depthTest:false, depthWrite:false, side:THREE.DoubleSide
});
const hudPlane = new THREE.Mesh(hudGeo, hudMat);
hudPlane.renderOrder = 999;
camera.add(hudPlane);
scene.add(camera);

// Scale HUD plane to match viewport
function resizeHudPlane(){
  const aspect = window.innerWidth/window.innerHeight;
  const fovRad = THREE.MathUtils.degToRad(STATE.zoomFactor>1 ? STATE.baseFov/STATE.zoomFactor : STATE.baseFov);
  const h = 2*Math.tan(fovRad/2)*1.2;
  const w = h*aspect;
  hudPlane.scale.set(w,h,1);
  hudPlane.position.set(0,0,-1.2);
}
resizeHudPlane();

// ─── RAYCASTER ────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.far = STATE.maxHoverDistance;

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
function cycleZoom(){
  STATE.zoomIndex = (STATE.zoomIndex+1) % STATE.zoomLevels.length;
  STATE.targetZoomFactor = STATE.zoomLevels[STATE.zoomIndex];
  STATE.zoomStartTime = performance.now();
  STATE.zoomFactor = STATE.zoomFactor; // starts from current
  flash('zoom');
}

function easeInOut(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

function updateZoom(){
  const now = performance.now();
  const t = Math.min(1,(now-STATE.zoomStartTime)/STATE.zoomDuration);
  const e = easeInOut(t);
  const prev = STATE.zoomFactor;
  STATE.zoomFactor = prev + (STATE.targetZoomFactor-prev)*e;
  if(t>=1) STATE.zoomFactor = STATE.targetZoomFactor;
  const newFov = STATE.baseFov/STATE.zoomFactor;
  camera.fov = THREE.MathUtils.clamp(newFov,10,95);
  camera.updateProjectionMatrix();
  resizeHudPlane();
}

// ─── POSE SMOOTHING ───────────────────────────────────────────────────────────
function smoothPose(renderCam){
  const alpha = STATE.zoomFactor>1 ? 0.10 : 1.0;
  const alphaP = STATE.zoomFactor>1 ? 0.07 : 1.0;
  if(!STATE.poseInit){
    STATE.smoothPos.copy(renderCam.position);
    STATE.smoothQuat.copy(renderCam.quaternion);
    STATE.poseInit=true;
    return;
  }
  STATE.smoothPos.lerp(renderCam.position,alphaP);
  STATE.smoothQuat.slerp(renderCam.quaternion,alpha);
}

// ─── HOVER / LOCK ─────────────────────────────────────────────────────────────
function doRaycast(){
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  raycaster.set(camera.position, dir);
  raycaster.far = STATE.maxHoverDistance;
  const hits = raycaster.intersectObjects(selectableMeshes,true);
  STATE.hoverTarget = hits.length>0 ? hits[0] : null;

  if(STATE.lockTarget){
    const ltd = STATE.lockTarget;
    const dist = camera.position.distanceTo(ltd.position);
    if(dist > STATE.maxLockDistance){ releaseLock('range'); return; }
    if(!scene.getObjectById(ltd.id)){ releaseLock('lost'); return; }
    // Occlusion
    const toTarget = new THREE.Vector3().subVectors(ltd.position, camera.position);
    const oRay = new THREE.Raycaster(camera.position, toTarget.normalize(), 0.1, dist-0.2);
    oRay.far = dist-0.2;
    const oHits = oRay.intersectObjects(selectableMeshes,true);
    const occluded = oHits.length>0 && oHits[0].object!==ltd && !ltd.getObjectById?.(oHits[0].object.id);
    if(occluded) STATE.occlusionFrames++;
    else STATE.occlusionFrames=0;
    if(STATE.occlusionFrames>STATE.maxOcclusionFrames){ releaseLock('occluded'); }
  }
}

function releaseLock(reason){
  STATE.lockTarget=null; STATE.occlusionFrames=0; STATE.lockLost=true;
  setTimeout(()=>STATE.lockLost=false,2000);
}

function tryLock(){
  if(STATE.hoverTarget){
    STATE.lockTarget = STATE.hoverTarget.object;
    STATE.occlusionFrames=0; STATE.lockLost=false;
    flash('lock');
  } else if(STATE.lockTarget){
    releaseLock('manual');
  }
}

// ─── PROJECT BBOX ─────────────────────────────────────────────────────────────
const _box3 = new THREE.Box3();
const _v3 = new THREE.Vector3();
function projectBbox(mesh, cam){
  _box3.setFromObject(mesh);
  const corners=[
    [_box3.min.x,_box3.min.y,_box3.min.z],[_box3.max.x,_box3.min.y,_box3.min.z],
    [_box3.min.x,_box3.max.y,_box3.min.z],[_box3.max.x,_box3.max.y,_box3.min.z],
    [_box3.min.x,_box3.min.y,_box3.max.z],[_box3.max.x,_box3.min.y,_box3.max.z],
    [_box3.min.x,_box3.max.y,_box3.max.z],[_box3.max.x,_box3.max.y,_box3.max.z],
  ];
  const W=hudCanvas.width, H=hudCanvas.height;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  let anyValid=false;
  for(const c of corners){
    _v3.set(c[0],c[1],c[2]);
    _v3.project(cam);
    if(_v3.z>1) continue; // behind camera
    const sx=((_v3.x+1)/2)*W;
    const sy=((-_v3.y+1)/2)*H;
    minX=Math.min(minX,sx); maxX=Math.max(maxX,sx);
    minY=Math.min(minY,sy); maxY=Math.max(maxY,sy);
    anyValid=true;
  }
  if(!anyValid) return null;
  return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}

function smoothBbox(raw){
  const s = STATE.bboxSmooth;
  if(!STATE.bboxPrev){ STATE.bboxSmooth={...raw}; STATE.bboxPrev=raw; return {...raw}; }
  const a=0.2;
  s.x = s.x+(raw.x-s.x)*a;
  s.y = s.y+(raw.y-s.y)*a;
  s.w = s.w+(raw.w-s.w)*a;
  s.h = s.h+(raw.h-s.h)*a;
  STATE.bboxPrev=raw;
  return {...s};
}

// ─── FLASH ────────────────────────────────────────────────────────────────────
function flash(key){ STATE.flashTargets[key]=performance.now(); }
function flashAlpha(key,dur=300){
  const t=STATE.flashTargets[key];
  if(!t) return 0;
  const elapsed=performance.now()-t;
  if(elapsed>dur){ delete STATE.flashTargets[key]; return 0; }
  return 1-elapsed/dur;
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  STATE.clock.h=h; STATE.clock.m=m; STATE.clock.s=s;
  STATE.clock.date=`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock,500); updateClock();

// ─── GEOLOCATION ──────────────────────────────────────────────────────────────
function initGeo(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    const moved = STATE.geoLat===null || Math.abs(lat-STATE.geoLat)>0.005||Math.abs(lon-STATE.geoLon)>0.005;
    STATE.geoLat=lat; STATE.geoLon=lon;
    if(moved||performance.now()-STATE.lastWeatherFetch>STATE.WEATHER_INTERVAL) fetchWeather();
    if(moved||performance.now()-STATE.lastAQIFetch>STATE.AQI_INTERVAL) fetchAQI();
  },null,{enableHighAccuracy:true,maximumAge:30000});
}
initGeo();
// Periodic refresh
setInterval(()=>{ if(STATE.geoLat&&performance.now()-STATE.lastWeatherFetch>STATE.WEATHER_INTERVAL) fetchWeather(); },60000);
setInterval(()=>{ if(STATE.geoLat&&performance.now()-STATE.lastAQIFetch>STATE.AQI_INTERVAL) fetchAQI(); },60000);

// ─── WEATHER ──────────────────────────────────────────────────────────────────
const WMO={
  0:'CLEAR',1:'MOSTLY CLR',2:'PARTLY CLD',3:'OVERCAST',
  45:'FOG',48:'ICING FOG',
  51:'LIGHT DZL',53:'DRIZZLE',55:'HVY DZL',
  61:'LIGHT RAIN',63:'RAIN',65:'HVY RAIN',
  71:'LIGHT SNOW',73:'SNOW',75:'HVY SNOW',77:'SNOW GRAINS',
  80:'SHOWERS',81:'SHOWERS',82:'HVY SHOWERS',
  85:'SNOW SHOWERS',86:'HVY SNOW SHW',
  95:'STORM',96:'STORM/HAIL',99:'STORM/HAIL',
};
async function fetchWeather(){
  if(!STATE.geoLat) return;
  STATE.lastWeatherFetch=performance.now();
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${STATE.geoLat.toFixed(4)}&longitude=${STATE.geoLon.toFixed(4)}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=sunrise,sunset&timezone=auto&forecast_days=1`;
    const r=await fetch(url); const d=await r.json();
    const c=d.current;
    const prev=STATE.weather.temp;
    STATE.weather.temp=`${Math.round(c.temperature_2m)}°C`;
    STATE.weather.cond=WMO[c.weather_code]||`CODE${c.weather_code}`;
    STATE.weather.wind=`${Math.round(c.wind_speed_10m)} KM/H`;
    STATE.weather.hum=`${c.relative_humidity_2m}%`;
    const sr=new Date(d.daily.sunrise[0]); const ss=new Date(d.daily.sunset[0]);
    STATE.weather.sunrise=`${String(sr.getHours()).padStart(2,'0')}:${String(sr.getMinutes()).padStart(2,'0')}`;
    STATE.weather.sunset=`${String(ss.getHours()).padStart(2,'0')}:${String(ss.getMinutes()).padStart(2,'0')}`;
    if(prev!==STATE.weather.temp) flash('weather');
  }catch(e){ console.warn('weather err',e); }
}

// ─── AQI / POLLEN ─────────────────────────────────────────────────────────────
function aqiLabel(v){
  if(v===null||v==='--') return {label:'UNKNOWN',color:'#888'};
  if(v<=25) return {label:'GOOD',color:'#00ff88'};
  if(v<=50) return {label:'FAIR',color:'#88ff44'};
  if(v<=75) return {label:'MODERATE',color:'#ffcc00'};
  if(v<=100) return {label:'POOR',color:'#ff8800'};
  if(v<=150) return {label:'VERY POOR',color:'#ff4400'};
  return {label:'HAZARDOUS',color:'#ff0044'};
}
function pollenLevel(v){
  if(!v||v<10) return {label:'LOW',color:'#00ff88'};
  if(v<50) return {label:'MODERATE',color:'#ffcc00'};
  if(v<100) return {label:'HIGH',color:'#ff8800'};
  return {label:'VERY HIGH',color:'#ff0044'};
}
async function fetchAQI(){
  if(!STATE.geoLat) return;
  STATE.lastAQIFetch=performance.now();
  try{
    const url=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${STATE.geoLat.toFixed(4)}&longitude=${STATE.geoLon.toFixed(4)}&current=european_aqi,us_aqi,grass_pollen,birch_pollen,mugwort_pollen`;
    const r=await fetch(url); const d=await r.json();
    const c=d.current;
    const aqi=c.european_aqi??c.us_aqi??null;
    const al=aqiLabel(aqi);
    STATE.airQ.aqi=aqi!==null?String(Math.round(aqi)):'--';
    STATE.airQ.aqiLabel=al.label; STATE.airQ.aqiColor=al.color;
    // Pollen
    const pollens=[
      {v:c.grass_pollen,name:'GRASS'},
      {v:c.birch_pollen,name:'BIRCH'},
      {v:c.mugwort_pollen,name:'MUGWORT'}
    ].filter(p=>p.v!=null);
    if(pollens.length){
      const best=pollens.reduce((a,b)=>(b.v>a.v?b:a));
      const pl=pollenLevel(best.v);
      STATE.airQ.pollen=String(Math.round(best.v));
      STATE.airQ.pollenLabel=`${pl.label} ${best.name}`;
      STATE.airQ.pollenColor=pl.color;
    }
    flash('aqi');
  }catch(e){ console.warn('aqi err',e); }
}

// ─── HUD DRAW ─────────────────────────────────────────────────────────────────
const W=hudCanvas.width, H=hudCanvas.height;

function drawLine(x1,y1,x2,y2,color='#00ff88',lw=2){
  hud.save(); hud.strokeStyle=color; hud.lineWidth=lw;
  hud.beginPath(); hud.moveTo(x1,y1); hud.lineTo(x2,y2); hud.stroke();
  hud.restore();
}
function drawText(txt,x,y,color='#00ff88',size=28,align='left',alpha=1){
  hud.save(); hud.globalAlpha=alpha;
  hud.fillStyle=color; hud.font=`${size}px 'Courier New', monospace`;
  hud.textAlign=align; hud.fillText(txt,x,y); hud.restore();
}
function drawTextWithFlash(txt,x,y,baseColor,size,align,flashKey){
  const fa=flashAlpha(flashKey);
  const col=fa>0 ? lerpColor(baseColor,'#ffffff',fa) : baseColor;
  drawText(txt,x,y,col,size,align);
}

function lerpColor(c1,c2,t){
  const p=(s)=>parseInt(s,16);
  const r1=p(c1.slice(1,3)),g1=p(c1.slice(3,5)),b1=p(c1.slice(5,7));
  const r2=p(c2.slice(1,3)),g2=p(c2.slice(3,5)),b2=p(c2.slice(5,7));
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function drawReticle(){
  const cx=W/2, cy=H/2;
  const hover=STATE.hoverTarget!==null;
  const locked=STATE.lockTarget!==null;

  STATE.lockRingAngle=(STATE.lockRingAngle+0.025)%(Math.PI*2);
  STATE.reticleScale=STATE.reticleScale+(( hover?1.4:1.0)-STATE.reticleScale)*0.12;

  const baseR=12*STATE.reticleScale;
  const outerR=locked?36*STATE.reticleScale:22*STATE.reticleScale;
  const col=locked?'#ff4444':hover?'#ffcc00':'#00ff88';

  // Center dot
  hud.save();
  hud.fillStyle=col; hud.beginPath();
  hud.arc(cx,cy,3,0,Math.PI*2); hud.fill();
  hud.restore();

  // Inner ring
  hud.save();
  hud.strokeStyle=col+'cc'; hud.lineWidth=1.5;
  hud.beginPath(); hud.arc(cx,cy,baseR,0,Math.PI*2); hud.stroke();
  hud.restore();

  // Cross hairs
  const g=22; const gap=8;
  hud.save(); hud.strokeStyle=col+'88'; hud.lineWidth=1;
  hud.beginPath();
  hud.moveTo(cx-g,cy); hud.lineTo(cx-gap,cy);
  hud.moveTo(cx+gap,cy); hud.lineTo(cx+g,cy);
  hud.moveTo(cx,cy-g); hud.lineTo(cx,cy-gap);
  hud.moveTo(cx,cy+gap); hud.lineTo(cx,cy+g);
  hud.stroke(); hud.restore();

  // Lock ring
  if(locked){
    STATE.lockRingAnim=(STATE.lockRingAnim+0.02)%(Math.PI*2);
    hud.save();
    hud.strokeStyle='#ff4444'; hud.lineWidth=2;
    for(let i=0;i<4;i++){
      const a=STATE.lockRingAnim+i*(Math.PI/2);
      hud.beginPath();
      hud.arc(cx,cy,outerR,a,a+Math.PI/3);
      hud.stroke();
    }
    hud.restore();
  }
}

function drawBrackets(bbox, col, thick, corner=16){
  const {x,y,w,h}=bbox;
  const pad=12;
  const bx=x-pad, by=y-pad, bw=w+pad*2, bh=h+pad*2;
  hud.save(); hud.strokeStyle=col; hud.lineWidth=thick;
  const c=corner;
  // TL
  hud.beginPath(); hud.moveTo(bx,by+c); hud.lineTo(bx,by); hud.lineTo(bx+c,by); hud.stroke();
  // TR
  hud.beginPath(); hud.moveTo(bx+bw-c,by); hud.lineTo(bx+bw,by); hud.lineTo(bx+bw,by+c); hud.stroke();
  // BL
  hud.beginPath(); hud.moveTo(bx,by+bh-c); hud.lineTo(bx,by+bh); hud.lineTo(bx+c,by+bh); hud.stroke();
  // BR
  hud.beginPath(); hud.moveTo(bx+bw-c,by+bh); hud.lineTo(bx+bw,by+bh); hud.lineTo(bx+bw,by+bh-c); hud.stroke();
  hud.restore();
  return {bx,by,bw,bh};
}

function drawTargetOverlay(){
  const target=STATE.lockTarget||STATE.hoverTarget?.object;
  if(!target) return;
  const raw=projectBbox(target, camera);
  if(!raw) return;
  const bbox=STATE.lockTarget?smoothBbox(raw):raw;

  const dist=camera.position.distanceTo(target.position);
  const isLocked=!!STATE.lockTarget;

  // Off-screen indicator
  const cx=W/2, cy=H/2;
  const bcx=bbox.x+bbox.w/2, bcy=bbox.y+bbox.h/2;
  const margin=60;
  const offScreen=bcx<margin||bcx>W-margin||bcy<margin||bcy>H-margin;

  if(offScreen){
    // Draw edge arrow
    const dx=bcx-cx, dy=bcy-cy;
    const ang=Math.atan2(dy,dx);
    const ex=cx+Math.cos(ang)*(Math.min(cx,cy)-80);
    const ey=cy+Math.sin(ang)*(Math.min(cx,cy)-80);
    hud.save();
    hud.translate(ex,ey); hud.rotate(ang);
    hud.strokeStyle='#ffcc00'; hud.lineWidth=2;
    hud.beginPath(); hud.moveTo(-14,0); hud.lineTo(14,0); hud.lineTo(8,-8); hud.moveTo(14,0); hud.lineTo(8,8);
    hud.stroke(); hud.restore();
    drawText(target.userData.name,ex+18*Math.cos(ang),ey+18*Math.sin(ang),'#ffcc00',22);
    return;
  }

  const col=isLocked?'#ff4444':'#ffcc00';
  const thick=isLocked?3:2;
  const {bx,by,bw,bh}=drawBrackets(bbox,col,thick,isLocked?20:14);

  // Label
  const labelY=by-12;
  drawText(target.userData.name,bx,labelY,col,24);
  drawText(`${dist.toFixed(1)}m`,bx+bw,labelY,col,22,'right');
  if(isLocked) drawText('◆ LOCKED',bx+bw/2,labelY-26,'#ff4444',20,'center');

  // Scan line animation on locked
  if(isLocked){
    const scanY=by+(performance.now()%1200)/1200*bh;
    hud.save();
    const grad=hud.createLinearGradient(bx,scanY-4,bx,scanY+4);
    grad.addColorStop(0,'rgba(255,68,68,0)');
    grad.addColorStop(0.5,'rgba(255,68,68,0.35)');
    grad.addColorStop(1,'rgba(255,68,68,0)');
    hud.fillStyle=grad;
    hud.fillRect(bx,scanY-4,bw,8);
    hud.restore();
  }
}

function drawZoomHUD(){
  const zf=STATE.zoomFactor;
  const px=96, py=H-140;
  // Panel bg
  hud.save();
  hud.fillStyle='rgba(0,20,10,0.55)';
  hud.fillRect(px-12,py-32,200,90);
  hud.strokeStyle='#00ff8840'; hud.lineWidth=1;
  hud.strokeRect(px-12,py-32,200,90);
  hud.restore();

  drawText('ZOOM',px,py,'#00ff8888',20);
  drawTextWithFlash(`${zf.toFixed(1)}x`,px+80,py,'#00ff88',32,'left','zoom');

  // Bar
  const bw=160, bh=6;
  hud.save();
  hud.fillStyle='#00ff8820'; hud.fillRect(px,py+14,bw,bh);
  const ratio=(Math.log2(zf||1))/(Math.log2(10));
  const filled=THREE.MathUtils.clamp(ratio,0,1)*bw;
  hud.fillStyle='#00ff88';
  hud.fillRect(px,py+14,filled,bh);
  // tick marks
  hud.strokeStyle='#00ff8840'; hud.lineWidth=1;
  [1,2,4,8,10].forEach(z=>{
    const r=(Math.log2(z||1))/(Math.log2(10));
    const tx=px+r*bw;
    hud.beginPath(); hud.moveTo(tx,py+10); hud.lineTo(tx,py+24); hud.stroke();
  });
  hud.restore();
}

function drawClockHUD(){
  const px=90, py=90;
  const {h,m,s,date,loc}=STATE.clock;
  const fa=flashAlpha('weather');

  // Panel bg
  hud.save();
  hud.fillStyle='rgba(0,10,20,0.55)';
  hud.fillRect(px-12,py-52,420,160);
  hud.strokeStyle='#0088ff30'; hud.lineWidth=1;
  hud.strokeRect(px-12,py-52,420,160);
  hud.restore();

  // Big time
  const timeStr=`${h}:${m}:${s}`;
  const tcol=fa>0?lerpColor('#00aaff','#ffffff',fa):'#00aaff';
  drawText(timeStr,px,py,tcol,52);

  // Date
  drawText(date,px,py+42,'#0066aa',22);
  if(loc) drawText(loc,px,py+68,'#004488',20);

  // Corner decorators
  hud.save();
  hud.strokeStyle='#0088ff40'; hud.lineWidth=1;
  hud.beginPath(); hud.moveTo(px-12,py-52); hud.lineTo(px-12,py-52+14); hud.stroke();
  hud.beginPath(); hud.moveTo(px-12,py-52); hud.lineTo(px-12+14,py-52); hud.stroke();
  hud.restore();
}

function drawWeatherHUD(){
  const W2=W, H2=H;
  const px=W2-400, py=H2-480;
  const {temp,cond,wind,hum,sunrise,sunset}=STATE.weather;
  const {aqi,aqiLabel,aqiColor,pollen,pollenLabel,pollenColor}=STATE.airQ;

  // Panel bg
  hud.save();
  hud.fillStyle='rgba(0,10,20,0.6)';
  hud.fillRect(px-12,py-12,376,420);
  hud.strokeStyle='#0088ff30'; hud.lineWidth=1;
  hud.strokeRect(px-12,py-12,376,420);
  hud.restore();

  const fa=flashAlpha('weather');
  const tcol=(k)=>fa>0?lerpColor(k,'#ffffff',fa):k;

  let y=py;
  const row=(label,val,col='#00aaff',sz=24)=>{
    drawText(label,px,y,'#0055aa',19);
    drawText(val,px+200,y,col,sz);
    y+=38;
  };

  drawText('ENVIRONMENT',px,y,'#0066aa88',18); y+=28;
  row('TEMP',temp,tcol('#00aaff'));
  row('COND',cond,tcol('#88ccff'));
  row('WIND',wind,tcol('#00aaff'));
  row('HUMIDITY',hum,tcol('#00aaff'));
  row('SUNRISE',sunrise,'#ffcc44');
  row('SUNSET',sunset,'#ff8844');

  // Divider
  hud.save();
  hud.strokeStyle='#0088ff40'; hud.lineWidth=1;
  hud.beginPath(); hud.moveTo(px-8,y); hud.lineTo(px+360,y); hud.stroke();
  hud.restore();
  y+=14;

  const faq=flashAlpha('aqi');
  const aqiC=faq>0?lerpColor(aqiColor,'#ffffff',faq):aqiColor;
  const polC=faq>0?lerpColor(pollenColor,'#ffffff',faq):pollenColor;

  drawText('AQI',px,y,'#0055aa',19);
  drawText(`${aqi}`,px+140,y,aqiC,28);
  drawText(aqiLabel,px+200,y,aqiC,20);
  y+=38;

  drawText('POLLEN',px,y,'#0055aa',19);
  drawText(`${pollen}`,px+140,y,polC,24);
  drawText(pollenLabel,px+200,y,polC,20);
  y+=30;

  // Geo coords small
  if(STATE.geoLat!==null){
    drawText(`${STATE.geoLat.toFixed(3)}°N ${STATE.geoLon.toFixed(3)}°E`,px,y,'#003366',17);
  }
}

function drawLockLostNotice(){
  if(!STATE.lockLost) return;
  const cx=W/2, cy=H/2;
  drawText('TARGET LOST',cx,cy-100,'#ff4444cc',30,'center');
}

function drawFrameCorners(){
  const m=48; const c=28;
  const col='#00ff8830';
  hud.save(); hud.strokeStyle=col; hud.lineWidth=1.5;
  [[m,m],[W-m,m],[m,H-m],[W-m,H-m]].forEach(([x,y])=>{
    const sx=x===m?1:-1, sy=y===m?1:-1;
    hud.beginPath();
    hud.moveTo(x,y+sy*c); hud.lineTo(x,y); hud.lineTo(x+sx*c,y);
    hud.stroke();
  });
  hud.restore();
}

function drawScanline(){
  const y=(performance.now()*0.04)%(H+40)-20;
  hud.save();
  hud.fillStyle='rgba(0,255,136,0.03)';
  hud.fillRect(0,y,W,6);
  hud.restore();
}

function drawHUD(){
  hud.clearRect(0,0,W,H);
  drawScanline();
  drawFrameCorners();
  drawClockHUD();
  drawWeatherHUD();
  drawZoomHUD();
  drawTargetOverlay();
  drawReticle();
  drawLockLostNotice();
  hudTex.needsUpdate=true;
}

// ─── INPUT: KEYBOARD (desktop testing) ────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.key==='z'||e.key==='Z') cycleZoom();
  if(e.key==='l'||e.key==='L') tryLock();
});

// ─── INPUT: XR CONTROLLERS ────────────────────────────────────────────────────
function handleXRInput(frame, refSpace){
  const session=renderer.xr.getSession();
  if(!session) return;
  for(const src of session.inputSources){
    if(src.gamepad){
      const trig=src.gamepad.buttons[0]?.pressed||false;
      if(trig && !STATE.prevTriggerPressed) tryLock();
      if(src.gamepad.buttons[2]?.pressed) cycleZoom();
      STATE.prevTriggerPressed=trig;
    }
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let frameCount=0;

renderer.setAnimationLoop((time, frame)=>{
  frameCount++;

  updateZoom();

  if(frameCount%2===0){
    doRaycast();
  }

  // Animate targets
  selectableMeshes.forEach((m,i)=>{
    m.rotation.y+=0.003*(i%2===0?1:-1);
    m.position.y+=Math.sin(time*0.001+i)*0.0008;
  });

  drawHUD();

  if(STATE.inXR && frame){
    handleXRInput(frame);
  }

  renderer.render(scene, camera);
});

// ─── XR START ─────────────────────────────────────────────────────────────────
const startBtn=document.getElementById('startBtn');
const overlay=document.getElementById('overlay');
const statusEl=document.getElementById('status');

startBtn.addEventListener('click', async()=>{
  if(!navigator.xr){ statusEl.textContent='WebXR not available'; return; }

  // Try VR first, fallback AR
  let mode='immersive-vr';
  const vrOk=await navigator.xr.isSessionSupported('immersive-vr').catch(()=>false);
  if(!vrOk){
    const arOk=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
    if(!arOk){ statusEl.textContent='No XR support'; return; }
    mode='immersive-ar';
  }

  try{
    const session=await navigator.xr.requestSession(mode,{
      optionalFeatures:['hand-tracking','local-floor','bounded-floor']
    });
    renderer.xr.setSession(session);
    STATE.inXR=true; STATE.xrSession=session;
    overlay.style.display='none';
    session.addEventListener('end',()=>{ STATE.inXR=false; overlay.style.display='flex'; });
  }catch(err){
    statusEl.textContent='XR error: '+err.message;
  }
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  resizeHudPlane();
});
</script>
