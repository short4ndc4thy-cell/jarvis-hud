
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');
:root{
  --c:#00e5ff;--c2:#ff2d6b;--ok:#39ff14;--warn:#ff9500;--danger:#ff2d6b;
  --cg:rgba(0,229,255,.7);--cdim:rgba(0,229,255,.08);--cmid:rgba(0,229,255,.4);
  --gs:0 0 6px var(--cg);--gm:0 0 10px var(--cg),0 0 30px rgba(0,229,255,.15);
  --gl:0 0 16px var(--cg),0 0 50px rgba(0,229,255,.12),0 0 80px rgba(0,229,255,.05);
  --panel:rgba(0,4,12,.65);
  --mono:'Share Tech Mono',monospace;--display:'Bebas Neue',sans-serif;--ui:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:var(--mono);color:var(--c);user-select:none;-webkit-user-select:none;}

/* ── FULL-SCREEN CANVASES ── */
#cv-bg,#cv-rain,#cv-fx{position:fixed;inset:0;pointer-events:none;}
#cv-bg{z-index:10;}
#cv-rain{z-index:11;}
#cv-fx{z-index:12;}

/* ── ATMOSPHERE ── */
#atm-noise{
  position:fixed;inset:0;pointer-events:none;z-index:13;opacity:.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:noiseAnim .12s steps(1) infinite;
}
@keyframes noiseAnim{0%{transform:translate(0,0)}25%{transform:translate(-2%,-1%)}50%{transform:translate(1%,2%)}75%{transform:translate(-1%,1%)}100%{transform:translate(2%,-2%)}}
#atm-vignette{
  position:fixed;inset:0;pointer-events:none;z-index:14;
  background:radial-gradient(ellipse 85% 75% at 50% 50%,transparent 35%,rgba(0,0,10,.75) 100%);
}

/* ── FRAME ── */
.corner{position:fixed;width:52px;height:52px;border-color:var(--c);border-style:solid;z-index:500;}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;box-shadow:var(--gs),-4px -4px 20px rgba(0,229,255,.1);}
.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;box-shadow:var(--gs),4px -4px 20px rgba(0,229,255,.1);}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;box-shadow:var(--gs),-4px 4px 20px rgba(0,229,255,.1);}
.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;box-shadow:var(--gs),4px 4px 20px rgba(0,229,255,.1);}
.corner::before,.corner::after{content:'';position:absolute;background:var(--c);opacity:.35;}
.corner.tl::before{width:20px;height:1px;top:10px;left:2px;}.corner.tl::after{width:1px;height:20px;left:10px;top:2px;}
.corner.tr::before{width:20px;height:1px;top:10px;right:2px;}.corner.tr::after{width:1px;height:20px;right:10px;top:2px;}
.corner.bl::before{width:20px;height:1px;bottom:10px;left:2px;}.corner.bl::after{width:1px;height:20px;left:10px;bottom:2px;}
.corner.br::before{width:20px;height:1px;bottom:10px;right:2px;}.corner.br::after{width:1px;height:20px;right:10px;bottom:2px;}
.edge-h{position:fixed;left:65px;right:65px;height:1px;z-index:400;background:linear-gradient(90deg,transparent,var(--cmid) 20%,var(--cmid) 80%,transparent);}
.edge-h.top{top:12px;}.edge-h.bot{bottom:12px;}
.edge-v{position:fixed;top:65px;bottom:65px;width:1px;z-index:400;background:linear-gradient(180deg,transparent,var(--cmid) 20%,var(--cmid) 80%,transparent);}
.edge-v.lft{left:12px;}.edge-v.rgt{right:12px;}

/* ── TOP LEFT ── */
#panelTL{position:fixed;top:20px;left:20px;z-index:600;display:flex;flex-direction:column;}
#clock{font-family:var(--display);font-size:3.4rem;line-height:.92;letter-spacing:.04em;color:var(--c);text-shadow:var(--gl);animation:glitch1 9s ease-in-out infinite;}
@keyframes glitch1{
  0%,94%,100%{clip-path:none;transform:none;filter:none;}
  95%{clip-path:inset(22% 0 52% 0);transform:translate(-4px,0);filter:hue-rotate(40deg);}
  96%{clip-path:inset(52% 0 18% 0);transform:translate(4px,0);filter:hue-rotate(-40deg);}
  97%{clip-path:inset(38% 0 32% 0);transform:translate(0,2px);filter:none;}
  98%{clip-path:none;transform:translate(2px,-1px);}
}
#clock-sub{font-size:.5rem;letter-spacing:.28em;color:var(--cmid);margin-top:3px;}
.tl-div{width:130px;height:1px;background:linear-gradient(90deg,var(--cmid),transparent);margin:7px 0;}
#areaLine{font-family:var(--display);font-size:1.15rem;letter-spacing:.12em;color:var(--c);text-shadow:var(--gs);}
#streetLine{font-size:.5rem;letter-spacing:.1em;color:var(--cmid);margin-top:1px;}

/* ── TOP RIGHT ── */
#panelTR{position:fixed;top:20px;right:20px;z-index:600;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.stat{display:flex;align-items:center;gap:7px;}
.slbl{font-size:.46rem;font-family:var(--ui);font-weight:700;letter-spacing:.22em;color:var(--cmid);}
.sbar{width:80px;height:2px;position:relative;overflow:hidden;background:rgba(0,229,255,.05);}
.sbar::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,var(--cdim) 0,var(--cdim) 1px,transparent 1px,transparent 5px);}
.sfill{position:relative;height:100%;background:var(--c);box-shadow:0 0 8px var(--cg);transition:width .8s ease;z-index:1;}
.sfill.ok{background:var(--ok);box-shadow:0 0 8px rgba(57,255,20,.6);}
.sfill.warn{background:var(--warn);box-shadow:0 0 8px rgba(255,149,0,.6);}
.sfill.danger{background:var(--danger);}
.sval{font-size:.5rem;font-family:var(--ui);font-weight:700;color:var(--c);min-width:36px;text-align:right;letter-spacing:.05em;}
.tr-div{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--cmid));margin:1px 0;}
.sys-row{font-size:.46rem;font-family:var(--ui);font-weight:500;color:var(--c);display:flex;gap:6px;align-items:center;}
.sys-lbl{color:var(--cmid);letter-spacing:.18em;}

/* ── BOTTOM LEFT ── */
#panelBL{position:fixed;bottom:20px;left:20px;z-index:600;display:flex;flex-direction:column;gap:2px;}
.coord-row{display:flex;gap:8px;align-items:baseline;}
.clbl{font-size:.42rem;font-family:var(--ui);font-weight:700;letter-spacing:.22em;color:var(--cmid);width:24px;}
.cval{font-size:.56rem;letter-spacing:.04em;color:var(--c);}
#gpsStatus{font-size:.44rem;font-family:var(--ui);font-weight:700;letter-spacing:.2em;margin-top:4px;}
#gpsStatus.acquiring{color:var(--warn);animation:blink 1s ease-in-out infinite;}
#gpsStatus.locked{color:var(--ok);}
#gpsStatus.denied{color:var(--danger);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── BOTTOM RIGHT ── */
#panelBR{position:fixed;bottom:20px;right:20px;z-index:600;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
#wTemp{font-family:var(--display);font-size:3rem;line-height:.92;color:var(--c);text-shadow:var(--gl);}
#wCond{font-family:var(--ui);font-size:.72rem;font-weight:700;letter-spacing:.2em;color:var(--c);opacity:.85;}
.wrow{font-size:.48rem;font-family:var(--ui);font-weight:500;letter-spacing:.14em;color:var(--c);opacity:.7;display:flex;gap:5px;align-items:center;}
.wval{opacity:1;}
.br-div{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--cmid));margin:2px 0;}

/* ── POI ── */
#poiPanel{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:600;display:flex;flex-direction:column;gap:4px;max-width:200px;}
.poi-hdr{font-size:.4rem;font-family:var(--ui);font-weight:700;letter-spacing:.28em;color:var(--cmid);margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.poi-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--cmid),transparent);}
.poi-row{font-size:.52rem;color:var(--c);letter-spacing:.04em;display:flex;gap:6px;align-items:baseline;opacity:.9;line-height:1.5;}
.poi-dist{opacity:.55;min-width:42px;font-family:var(--ui);font-weight:700;font-size:.48rem;}

/* ── HDG ── */
#hdgPanel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;align-items:center;gap:2px;}
#hdgBig{font-family:var(--display);font-size:2.8rem;line-height:1;letter-spacing:.1em;color:var(--c);text-shadow:var(--gl);}
#hdgDeg{font-size:.46rem;font-family:var(--ui);font-weight:500;letter-spacing:.32em;color:var(--cmid);}

/* ── RADAR (right center) ── */
#radarWrap{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:600;display:flex;flex-direction:column;align-items:center;gap:4px;}
#radarCanvas{display:block;}
#radarLbl{font-size:.4rem;font-family:var(--ui);font-weight:700;letter-spacing:.25em;color:var(--cmid);}

/* ── HORIZON ── */
#horizon{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;display:flex;align-items:center;gap:12px;pointer-events:none;z-index:400;opacity:.4;}
.h-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--c));}
.h-line.r{background:linear-gradient(90deg,var(--c),transparent);}
.h-center{width:6px;height:6px;border:1px solid var(--c);transform:rotate(45deg);box-shadow:var(--gs);}

/* ── ZOOM ── */
#zoomWrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:700;display:none;flex-direction:column;align-items:center;gap:6px;}
#zoomOuter{width:280px;height:210px;border:1px solid var(--cmid);background:rgba(0,0,0,.8);overflow:hidden;position:relative;box-shadow:var(--gm);}
#zoomCanvas{width:100%;height:100%;display:block;}
#zoomVideo{display:none;}
.zc{position:absolute;width:10px;height:10px;border-color:var(--c);border-style:solid;}
.zc.tl{top:5px;left:5px;border-width:1.5px 0 0 1.5px;}.zc.tr{top:5px;right:5px;border-width:1.5px 1.5px 0 0;}
.zc.bl{bottom:5px;left:5px;border-width:0 0 1.5px 1.5px;}.zc.br{bottom:5px;right:5px;border-width:0 1.5px 1.5px 0;}
.zcx{position:absolute;left:15%;right:15%;top:50%;height:1px;background:rgba(0,229,255,.2);transform:translateY(-50%);}
.zcy{position:absolute;top:15%;bottom:15%;left:50%;width:1px;background:rgba(0,229,255,.2);transform:translateX(-50%);}
.zcdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border:1px solid var(--c);box-shadow:var(--gs);}
#zoomNoFeed{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:.48rem;letter-spacing:.2em;color:var(--cmid);}
#zoomLabel{font-family:var(--display);font-size:.9rem;letter-spacing:.3em;color:var(--c);text-shadow:var(--gs);}

/* ── ALERTS ── */
#alerts{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9500;display:flex;flex-direction:column;gap:3px;align-items:center;pointer-events:none;}
.alert{font-size:.46rem;font-family:var(--ui);font-weight:700;letter-spacing:.22em;padding:.15rem .6rem;border-left:2px solid;text-transform:uppercase;background:var(--panel);backdrop-filter:blur(8px);animation:alertIn .2s ease both;}
.alert.ok{border-color:var(--ok);color:var(--ok);}
.alert.warn{border-color:var(--warn);color:var(--warn);}
.alert.info{border-color:var(--c);color:var(--c);}
.alert.danger{border-color:var(--danger);color:var(--danger);}
@keyframes alertIn{from{opacity:0;transform:translateY(-6px) scaleX(.95)}to{opacity:1;transform:none}}

/* ── CONTROLS ── */
#controls{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:8px;}
.hud-btn{background:var(--panel);border:1px solid var(--cmid);color:var(--c);font-family:var(--ui);font-size:.48rem;font-weight:700;letter-spacing:.22em;padding:.32rem .85rem;cursor:pointer;text-transform:uppercase;text-shadow:var(--gs);transition:all .12s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.hud-btn:hover{background:rgba(0,229,255,.1);border-color:var(--c);box-shadow:var(--gs);}
.hud-btn.active{border-color:var(--c);box-shadow:var(--gm);background:rgba(0,229,255,.08);}

/* ── THEME ── */
#themePicker{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:8px;}
.tpBtn{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;}
.tpBtn:hover,.tpBtn.active{transform:scale(1.55);border-color:rgba(255,255,255,.7);}
.tpBtn.active{box-shadow:0 0 8px currentColor;}
</style>
</head>
<body>

<!-- CANVAS LAYERS -->
<canvas id="cv-bg"></canvas>
<canvas id="cv-rain"></canvas>
<canvas id="cv-fx"></canvas>

<div id="atm-noise"></div>
<div id="atm-vignette"></div>

<!-- FRAME -->
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="edge-h top"></div><div class="edge-h bot"></div>
<div class="edge-v lft"></div><div class="edge-v rgt"></div>

<!-- HORIZON -->
<div id="horizon">
  <div class="h-line"></div><div class="h-center"></div><div class="h-line r"></div>
</div>

<!-- PANELS -->
<div id="panelTL">
  <div id="clock">00:00:00</div>
  <div id="clock-sub">-- --- ----</div>
  <div class="tl-div"></div>
  <div id="areaLine">LOCATING...</div>
  <div id="streetLine"></div>
</div>

<div id="panelTR">
  <div class="stat"><div class="slbl">BAT</div><div class="sbar"><div class="sfill ok" id="batFill" style="width:85%"></div></div><div class="sval" id="batVal">85%</div></div>
  <div class="stat"><div class="slbl">NET</div><div class="sbar"><div class="sfill" id="netFill" style="width:0%"></div></div><div class="sval" id="netVal">--</div></div>
  <div class="tr-div"></div>
  <div class="sys-row"><span class="sys-lbl">CPU</span><span id="cpuVal">--%</span></div>
  <div class="sys-row"><span class="sys-lbl">MEM</span><span id="memVal">--</span></div>
</div>

<div id="panelBL">
  <div class="coord-row"><div class="clbl">LAT</div><div class="cval" id="latVal">--</div></div>
  <div class="coord-row"><div class="clbl">LON</div><div class="cval" id="lonVal">--</div></div>
  <div class="coord-row"><div class="clbl">ALT</div><div class="cval" id="altVal">--</div></div>
  <div id="gpsStatus" class="acquiring">● GPS ACQUIRING</div>
</div>

<div id="panelBR">
  <div id="wTemp">--°</div>
  <div id="wCond">--</div>
  <div class="wrow"><span>WIND</span><span class="wval" id="wWind">--</span><span>km/h</span></div>
  <div class="wrow"><span>HUM</span><span class="wval" id="wHum">--%</span></div>
  <div class="wrow"><span>FEELS</span><span class="wval" id="wFeel">--°</span></div>
  <div class="br-div" id="envDiv" style="display:none"></div>
  <div class="wrow" id="aqiRow" style="display:none"><span>AQI</span><span class="wval" id="wAqi">--</span><span id="wAqiLbl"></span></div>
</div>

<div id="poiPanel"></div>

<!-- RADAR -->
<div id="radarWrap">
  <canvas id="radarCanvas" width="130" height="130"></canvas>
  <div id="radarLbl">TACTICAL · 500m</div>
</div>

<div id="hdgPanel">
  <div id="hdgBig">N</div>
  <div id="hdgDeg">000°</div>
</div>

<!-- ZOOM -->
<div id="zoomWrap">
  <div id="zoomOuter">
    <canvas id="zoomCanvas" width="560" height="420"></canvas>
    <video id="zoomVideo" autoplay playsinline muted></video>
    <div class="zc tl"></div><div class="zc tr"></div><div class="zc bl"></div><div class="zc br"></div>
    <div class="zcx"></div><div class="zcy"></div><div class="zcdot"></div>
    <div id="zoomNoFeed">FEED UNAVAILABLE</div>
  </div>
  <div id="zoomLabel">ZOOM 20×</div>
</div>

<div id="alerts"></div>

<div id="controls">
  <button class="hud-btn" id="zoomBtn" onclick="toggleZoom()">◈ ZOOM</button>
  <button class="hud-btn" id="xrBtn" onclick="enterXR()">◈ AR MODE</button>
</div>

<div id="themePicker">
  <div class="tpBtn active" style="background:#00e5ff;color:#00e5ff" onclick="setTheme('cyan',this)"></div>
  <div class="tpBtn" style="background:#39ff14;color:#39ff14" onclick="setTheme('green',this)"></div>
  <div class="tpBtn" style="background:#ffb300;color:#ffb300" onclick="setTheme('amber',this)"></div>
  <div class="tpBtn" style="background:#ff2d6b;color:#ff2d6b" onclick="setTheme('red',this)"></div>
  <div class="tpBtn" style="background:#e0e0e0;color:#e0e0e0" onclick="setTheme('white',this)"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════════════════════
var THEMES={
  cyan: {c:'#00e5ff',cg:'rgba(0,229,255,.7)',cdim:'rgba(0,229,255,.08)',cmid:'rgba(0,229,255,.4)',rgb:[0,229,255]},
  green:{c:'#39ff14',cg:'rgba(57,255,20,.7)',cdim:'rgba(57,255,20,.08)',cmid:'rgba(57,255,20,.4)',rgb:[57,255,20]},
  amber:{c:'#ffb300',cg:'rgba(255,179,0,.7)',cdim:'rgba(255,179,0,.08)',cmid:'rgba(255,179,0,.4)',rgb:[255,179,0]},
  red:  {c:'#ff2d6b',cg:'rgba(255,45,107,.7)',cdim:'rgba(255,45,107,.08)',cmid:'rgba(255,45,107,.4)',rgb:[255,45,107]},
  white:{c:'#e0e0e0',cg:'rgba(220,220,220,.6)',cdim:'rgba(220,220,220,.08)',cmid:'rgba(220,220,220,.35)',rgb:[220,220,220]},
};
var activeRGB=[0,229,255];
function setTheme(name,el){
  var t=THEMES[name];if(!t)return;
  activeRGB=t.rgb;
  var r=document.documentElement.style;
  r.setProperty('--c',t.c);r.setProperty('--cg',t.cg);
  r.setProperty('--cdim',t.cdim);r.setProperty('--cmid',t.cmid);
  r.setProperty('--gs','0 0 6px '+t.cg);
  r.setProperty('--gm','0 0 10px '+t.cg+', 0 0 30px '+t.cg.replace('.7','.15'));
  r.setProperty('--gl','0 0 16px '+t.cg+', 0 0 50px '+t.cg.replace('.7','.12')+', 0 0 80px '+t.cg.replace('.7','.05'));
  document.querySelectorAll('.tpBtn').forEach(function(b){b.classList.remove('active');});
  if(el)el.classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════════════════
var W=window.innerWidth, H=window.innerHeight;
var cvBg=document.getElementById('cv-bg');
var cvRain=document.getElementById('cv-rain');
var cvFx=document.getElementById('cv-fx');
[cvBg,cvRain,cvFx].forEach(function(c){c.width=W;c.height=H;});
var ctxBg=cvBg.getContext('2d');
var ctxRain=cvRain.getContext('2d');
var ctxFx=cvFx.getContext('2d');

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  [cvBg,cvRain,cvFx].forEach(function(c){c.width=W;c.height=H;});
  initRain();
});

// ═══════════════════════════════════════════════════════════════════════════════
// BG LAYER: GRID + PULSE RINGS
// ═══════════════════════════════════════════════════════════════════════════════
var rings=[];
function spawnRing(){
  rings.push({r:0,maxR:Math.min(W,H)*.45,alpha:.6,speed:1.2+Math.random()*.8});
}
spawnRing();
setInterval(spawnRing,3200);

function drawBg(t){
  ctxBg.clearRect(0,0,W,H);
  var R=activeRGB;

  // subtle grid
  ctxBg.strokeStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.028)';
  ctxBg.lineWidth=1;
  var gs=60;
  for(var x=0;x<W;x+=gs){ctxBg.beginPath();ctxBg.moveTo(x,0);ctxBg.lineTo(x,H);ctxBg.stroke();}
  for(var y=0;y<H;y+=gs){ctxBg.beginPath();ctxBg.moveTo(0,y);ctxBg.lineTo(W,y);ctxBg.stroke();}

  // pulse rings from center
  rings.forEach(function(ring,i){
    ring.r+=ring.speed;
    ring.alpha=.6*(1-ring.r/ring.maxR);
    ctxBg.beginPath();
    ctxBg.arc(W/2,H/2,ring.r,0,Math.PI*2);
    ctxBg.strokeStyle='rgba('+R[0]+','+R[1]+','+R[2]+','+Math.max(0,ring.alpha*.3)+')';
    ctxBg.lineWidth=1.5;
    ctxBg.stroke();
    if(ring.r>=ring.maxR) rings.splice(i,1);
  });

  // center reticle
  var cx=W/2,cy=H/2;
  ctxBg.save();
  ctxBg.translate(cx,cy);
  // outer dashed ring
  ctxBg.beginPath();
  ctxBg.arc(0,0,36,0,Math.PI*2);
  ctxBg.strokeStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.22)';
  ctxBg.lineWidth=.8;
  ctxBg.setLineDash([3,6]);
  ctxBg.stroke();
  ctxBg.setLineDash([]);
  // inner ring
  ctxBg.beginPath();
  ctxBg.arc(0,0,18,0,Math.PI*2);
  ctxBg.strokeStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.35)';
  ctxBg.lineWidth=1;
  ctxBg.stroke();
  // center dot
  ctxBg.beginPath();
  ctxBg.arc(0,0,2.5,0,Math.PI*2);
  ctxBg.fillStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.6)';
  ctxBg.fill();
  // tick lines
  [[0,-36,0,-26],[0,26,0,36],[-36,0,-26,0],[26,0,36,0]].forEach(function(l){
    ctxBg.beginPath();ctxBg.moveTo(l[0],l[1]);ctxBg.lineTo(l[2],l[3]);
    ctxBg.strokeStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.5)';
    ctxBg.lineWidth=1.2;ctxBg.stroke();
  });
  ctxBg.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
// RAIN LAYER: MATRIX-STYLE DATA STREAMS
// ═══════════════════════════════════════════════════════════════════════════════
var CHARS='01アイウエオカキクケコサシスセソタチツテト∆∇∞≈≡∑∏';
var cols=[];
function initRain(){
  cols=[];
  var spacing=22;
  // only on the sides, avoid center
  var margin=W*.3;
  for(var x=0;x<W;x+=spacing){
    if(x>margin && x<W-margin) continue; // skip center
    cols.push({
      x:x,y:Math.random()*-H,
      speed:60+Math.random()*80,
      len:6+Math.floor(Math.random()*12),
      chars:[],
      opacity:.15+Math.random()*.2,
      mutateTimer:0,
    });
  }
  // init chars
  cols.forEach(function(col){
    for(var i=0;i<col.len;i++) col.chars.push(CHARS[Math.floor(Math.random()*CHARS.length)]);
  });
}
initRain();

function drawRain(dt){
  ctxRain.clearRect(0,0,W,H);
  var R=activeRGB;
  var fontSize=13;
  ctxRain.font=fontSize+'px '+getComputedStyle(document.documentElement).getPropertyValue('--mono').trim().split(',')[0].replace(/'/g,'');

  cols.forEach(function(col){
    col.y+=col.speed*dt;
    col.mutateTimer+=dt;
    if(col.mutateTimer>0.08){
      col.mutateTimer=0;
      var idx=Math.floor(Math.random()*col.chars.length);
      col.chars[idx]=CHARS[Math.floor(Math.random()*CHARS.length)];
    }
    if(col.y-col.len*fontSize>H) col.y=-Math.random()*H*.5;

    col.chars.forEach(function(ch,i){
      var cy=col.y-i*fontSize;
      if(cy<0||cy>H) return;
      var frac=1-(i/col.len);
      // head character brighter
      var a=i===0?col.opacity*3.5:col.opacity*frac;
      ctxRain.fillStyle='rgba('+R[0]+','+R[1]+','+R[2]+','+Math.min(1,a)+')';
      ctxRain.fillText(ch,col.x,cy);
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// FX LAYER: SCAN LINE SWEEP + EDGE FLICKER + GLITCH SLICES
// ═══════════════════════════════════════════════════════════════════════════════
var scanY=0;
var glitchSlices=[];
var glitchTimer=0;

function spawnGlitch(){
  var count=2+Math.floor(Math.random()*4);
  for(var i=0;i<count;i++){
    var y=Math.random()*H;
    glitchSlices.push({y:y,h:2+Math.random()*14,dx:(Math.random()-.5)*40,life:1,maxLife:.08+Math.random()*.12});
  }
}

function drawFx(dt,t){
  ctxFx.clearRect(0,0,W,H);
  var R=activeRGB;

  // moving horizontal scan line
  scanY=(scanY+H*dt*.08)%H;
  var sg=ctxFx.createLinearGradient(0,scanY-30,0,scanY+30);
  sg.addColorStop(0,'rgba('+R[0]+','+R[1]+','+R[2]+',0)');
  sg.addColorStop(0.5,'rgba('+R[0]+','+R[1]+','+R[2]+',.04)');
  sg.addColorStop(1,'rgba('+R[0]+','+R[1]+','+R[2]+',0)');
  ctxFx.fillStyle=sg;
  ctxFx.fillRect(0,scanY-30,W,60);

  // glitch slices
  glitchTimer-=dt;
  if(glitchTimer<0){glitchTimer=3+Math.random()*5;spawnGlitch();}
  glitchSlices.forEach(function(sl,i){
    sl.life-=dt/sl.maxLife;
    if(sl.life<=0){glitchSlices.splice(i,1);return;}
    var a=sl.life*.25;
    ctxFx.save();
    ctxFx.fillStyle='rgba('+R[0]+','+R[1]+','+R[2]+','+a+')';
    ctxFx.fillRect(sl.dx,sl.y,W*.3+Math.random()*W*.4,sl.h);
    ctxFx.restore();
  });

  // edge flicker lines (top & bottom)
  if(Math.random()<.04){
    var lx=Math.random()*W*.4;
    var lw=20+Math.random()*120;
    ctxFx.fillStyle='rgba('+R[0]+','+R[1]+','+R[2]+',.15)';
    ctxFx.fillRect(lx,0,lw,1);
    ctxFx.fillRect(W-lx-lw,H-1,lw,1);
  }

  // CRT scanlines (very subtle, full screen)
  ctxFx.fillStyle='rgba(0,0,0,.06)';
  for(var y=0;y<H;y+=4) ctxFx.fillRect(0,y,W,2);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RADAR CANVAS
// ═══════════════════════════════════════════════════════════════════════════════
var radarAngle=0;
var radarBlips=[];
var radarCanvas=document.getElementById('radarCanvas');
var rctx=radarCanvas.getContext('2d');
var RS=65; // radius

// generate some static blips (positions update with POI data if available)
function refreshRadarBlips(pois,lat,lon){
  radarBlips=[];
  if(pois&&pois.length){
    pois.slice(0,6).forEach(function(p){
      var maxDist=500;
      var norm=Math.min(p.dist/maxDist,1);
      var angleRad=(p.bear-90)*Math.PI/180;
      radarBlips.push({
        x:Math.cos(angleRad)*norm*(RS-8),
        y:Math.sin(angleRad)*norm*(RS-8),
        alpha:0,maxAlpha:.9,
        pulse:Math.random()*Math.PI*2,
      });
    });
  } else {
    // placeholder blips
    for(var i=0;i<4;i++){
      var a=Math.random()*Math.PI*2, r=15+Math.random()*(RS-18);
      radarBlips.push({x:Math.cos(a)*r,y:Math.sin(a)*r,alpha:0,maxAlpha:.7,pulse:Math.random()*Math.PI*2});
    }
  }
}
refreshRadarBlips(null,null,null);

function drawRadar(dt,t){
  var size=130,cx=65,cy=65;
  rctx.clearRect(0,0,size,size);
  var R=activeRGB;
  var rc=function(a){return 'rgba('+R[0]+','+R[1]+','+R[2]+','+a+')';};

  // background
  rctx.fillStyle='rgba(0,4,12,.75)';
  rctx.beginPath();rctx.arc(cx,cy,RS,0,Math.PI*2);rctx.fill();

  // rings
  [RS*.33,RS*.66,RS].forEach(function(r){
    rctx.beginPath();rctx.arc(cx,cy,r,0,Math.PI*2);
    rctx.strokeStyle=rc(.15);rctx.lineWidth=.8;rctx.stroke();
  });

  // cross hairs
  rctx.strokeStyle=rc(.12);rctx.lineWidth=.8;
  rctx.beginPath();rctx.moveTo(cx-RS,cy);rctx.lineTo(cx+RS,cy);rctx.stroke();
  rctx.beginPath();rctx.moveTo(cx,cy-RS);rctx.lineTo(cx,cy+RS);rctx.stroke();

  // sweep
  radarAngle=(radarAngle+dt*1.2)%(Math.PI*2);
  var grad=rctx.createConicalGradient?null:null;
  // sweep sector fill
  rctx.save();
  rctx.translate(cx,cy);
  var sweep=rctx.createLinearGradient(0,0,RS*Math.cos(radarAngle),RS*Math.sin(radarAngle));
  sweep.addColorStop(0,rc(.0));
  sweep.addColorStop(.6,rc(.0));
  sweep.addColorStop(1,rc(.25));
  // draw sweep arc
  rctx.beginPath();
  rctx.moveTo(0,0);
  rctx.arc(0,0,RS,radarAngle-1.4,radarAngle,false);
  rctx.closePath();
  rctx.fillStyle=rc(.18);
  rctx.fill();
  // sweep line
  rctx.beginPath();
  rctx.moveTo(0,0);
  rctx.lineTo(RS*Math.cos(radarAngle),RS*Math.sin(radarAngle));
  rctx.strokeStyle=rc(.8);
  rctx.lineWidth=1.5;
  rctx.stroke();
  rctx.restore();

  // blips
  radarBlips.forEach(function(b){
    // light up when sweep passes
    var blipAngle=Math.atan2(b.y,b.x);
    var diff=((radarAngle-blipAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    if(diff<.15) b.alpha=b.maxAlpha;
    else b.alpha=Math.max(0,b.alpha-.6*dt);

    if(b.alpha<.01) return;
    rctx.beginPath();
    rctx.arc(cx+b.x,cy+b.y,2.5,0,Math.PI*2);
    rctx.fillStyle=rc(b.alpha);
    rctx.fill();
    // halo
    rctx.beginPath();
    rctx.arc(cx+b.x,cy+b.y,5,0,Math.PI*2);
    rctx.strokeStyle=rc(b.alpha*.4);
    rctx.lineWidth=1;
    rctx.stroke();
  });

  // self dot
  rctx.beginPath();rctx.arc(cx,cy,3,0,Math.PI*2);
  rctx.fillStyle=rc(1);rctx.fill();
  rctx.beginPath();rctx.arc(cx,cy,6+Math.sin(t*3)*2,0,Math.PI*2);
  rctx.strokeStyle=rc(.4);rctx.lineWidth=1;rctx.stroke();

  // mask to circle
  rctx.save();
  rctx.globalCompositeOperation='destination-in';
  rctx.beginPath();rctx.arc(cx,cy,RS,0,Math.PI*2);rctx.fillStyle='#fff';rctx.fill();
  rctx.restore();

  // border
  rctx.beginPath();rctx.arc(cx,cy,RS,0,Math.PI*2);
  rctx.strokeStyle=rc(.4);rctx.lineWidth=1.2;rctx.stroke();
}

var heading=0,headingTarget=0,hasRealSensor=false;
var DIRS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
function dir(h){return DIRS[Math.round(h/22.5)%16];}
function updateCompass(hdg){headingTarget=hdg;}
(function animHdg(){
  var diff=headingTarget-heading;
  if(diff>180)diff-=360;if(diff<-180)diff+=360;
  heading+=diff*.1;if(Math.abs(diff)<.05)heading=headingTarget;
  document.getElementById('hdgBig').textContent=dir(heading);
  document.getElementById('hdgDeg').textContent=String(Math.round(heading)).padStart(3,'0')+'°';
  requestAnimationFrame(animHdg);
})();

function handleOrientation(e){
  hasRealSensor=true;
  var alpha=e.webkitCompassHeading||(e.alpha!==null?(360-e.alpha)%360:null);
  if(alpha!==null)updateCompass(alpha);
  var roll=e.gamma||0;
  document.getElementById('horizon').style.transform='translate(-50%,-50%) rotate('+(-roll)+'deg)';
}
if(window.DeviceOrientationEvent){
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    document.getElementById('xrBtn').addEventListener('click',function(){
      DeviceOrientationEvent.requestPermission().then(function(p){if(p==='granted')window.addEventListener('deviceorientation',handleOrientation);});
    },{once:true});
  } else window.addEventListener('deviceorientation',handleOrientation);
}

setInterval(function(){if(!hasRealSensor){demoHdg=(demoHdg+.4)%360;updateCompass(demoHdg);}},50);
window.addEventListener('keydown',function(e){

var lastGeoTime=0;
function fetchGeocode(lat,lon){
  var now=Date.now();if(now-lastGeoTime<30000)return;lastGeoTime=now;
  fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon,{headers:{'Accept-Language':'en'}})

// WEATHER
// ═══════════════════════════════════════════════════════════════════════════════
var lastWxTime=0;
function fetchWeather(lat,lon){
  var now=Date.now();if(now-lastWxTime<120000)return;lastWxTime=now;
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
    '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code'+
    '&wind_speed_unit=kmh&temperature_unit=celsius')
    .then(function(r){return r.json();}).then(function(d){
      var c=d.current;
      document.getElementById('wTemp').textContent=Math.round(c.temperature_2m)+'°';
      document.getElementById('wCond').textContent=wmoCode(c.weather_code);
      document.getElementById('wWind').textContent=Math.round(c.wind_speed_10m);
      document.getElementById('wHum').textContent=c.relative_humidity_2m+'%';
      document.getElementById('wFeel').textContent=Math.round(c.apparent_temperature)+'°';
    }).catch(function(){});
  fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+lat+'&longitude='+lon+'&current=us_aqi')
    .then(function(r){return r.json();}).then(function(d){
      if(!d.current||d.current.us_aqi==null)return;
      var aqi=Math.round(d.current.us_aqi);
      document.getElementById('wAqi').textContent=aqi;
      document.getElementById('wAqiLbl').textContent=' '+aqiLabel(aqi);
      document.getElementById('aqiRow').style.display='flex';
      document.getElementById('envDiv').style.display='block';
    }).catch(function(){});
}
function wmoCode(c){
  if(c===0)return'CLEAR';if(c<=2)return'PARTLY CLOUDY';if(c===3)return'OVERCAST';
  if(c<=9)return'FOG';if(c<=29)return'RAIN';if(c<=39)return'SNOW';
  if(c<=59)return'DRIZZLE';if(c<=69)return'RAIN';if(c<=79)return'SNOW';
  if(c<=84)return'SHOWERS';if(c<=94)return'THUNDERSTORM';return'STORM';
}
function aqiLabel(v){if(v<=50)return'GOOD';if(v<=100)return'MOD';if(v<=150)return'USG';if(v<=200)return'UNHEALTHY';return'HAZARDOUS';}

// POI
// ═══════════════════════════════════════════════════════════════════════════════
var lastPOITime=0;
var currentPOIs=[];
function fetchPOI(lat,lon){
  var now=Date.now();if(now-lastPOITime<60000)return;lastPOITime=now;
  var q='[out:json][timeout:10];(node["amenity"](around:500,'+lat+','+lon+');node["shop"](around:300,'+lat+','+lon+'););out 20;';
  fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q))
    .then(function(r){return r.json();}).then(function(d){
      var items=(d.elements||[]).map(function(el){
        return{name:el.tags&&(el.tags.name||el.tags.amenity||el.tags.shop)||'?',
               dist:haversine(lat,lon,el.lat,el.lon),bear:bearing(lat,lon,el.lat,el.lon)};
      });
      items.sort(function(a,b){return a.dist-b.dist;});items=items.slice(0,6);
      currentPOIs=items;
      refreshRadarBlips(items,lat,lon);
      var panel=document.getElementById('poiPanel');
      if(!items.length){panel.innerHTML='';return;}
      var html='<div class="poi-hdr">NEARBY</div>';
      items.forEach(function(p){
        var d=p.dist<1000?Math.round(p.dist)+'m':(p.dist/1000).toFixed(1)+'km';
        html+='<div class="poi-row"><span class="poi-dist">'+bearArrow(p.bear)+' '+d+'</span><span>'+p.name.toUpperCase().slice(0,22)+'</span></div>';
      });
      panel.innerHTML=html;
    }).catch(function(){});
}
function haversine(la1,lo1,la2,lo2){
  var R=6371000,r=Math.PI/180,dLa=(la2-la1)*r,dLo=(lo2-lo1)*r;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(la1,lo1,la2,lo2){
  var r=Math.PI/180,dLo=(lo2-lo1)*r;
  var y=Math.sin(dLo)*Math.cos(la2*r),x=Math.cos(la1*r)*Math.sin(la2*r)-Math.sin(la1*r)*Math.cos(la2*r)*Math.cos(dLo);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
function bearArrow(b){return['↑','↗','→','↘','↓','↙','←','↖'][Math.round(b/45)%8];}

// ═══════════════════════════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════════════════════════
var zoomActive=false,zoomStream=null,zoomAnimId=null,ZOOM=20;
function toggleZoom(){
  zoomActive=!zoomActive;
  var btn=document.getElementById('zoomBtn'),wrap=document.getElementById('zoomWrap');
  if(zoomActive){btn.classList.add('active');btn.textContent='◈ ZOOM ON';wrap.style.display='flex';startZoom();}
  else{btn.classList.remove('active');btn.textContent='◈ ZOOM';wrap.style.display='none';stopZoom();}
}
function startZoom(){
  var nf=document.getElementById('zoomNoFeed');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){nf.style.display='flex';return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
    .then(function(s){
      zoomStream=s;var v=document.getElementById('zoomVideo');v.srcObject=s;v.play();
      nf.style.display='none';drawZoom();
    }).catch(function(){document.getElementById('zoomNoFeed').style.display='flex';});
}
function stopZoom(){
  if(zoomStream){zoomStream.getTracks().forEach(function(t){t.stop();});zoomStream=null;}
  if(zoomAnimId){cancelAnimationFrame(zoomAnimId);zoomAnimId=null;}
  document.getElementById('zoomCanvas').getContext('2d').clearRect(0,0,560,420);
}
function drawZoom(){
  var v=document.getElementById('zoomVideo'),c=document.getElementById('zoomCanvas'),ctx=c.getContext('2d');
  if(v.readyState>=2){
    var vw=v.videoWidth,vh=v.videoHeight,sw=vw/ZOOM,sh=vh/ZOOM,sx=(vw-sw)/2,sy=(vh-sh)/2;
    ctx.drawImage(v,sx,sy,sw,sh,0,0,560,420);
    ctx.fillStyle='rgba(0,229,255,.022)';
    for(var y=0;y<420;y+=3){ctx.fillRect(0,y,560,1);}
  }
  if(zoomActive)zoomAnimId=requestAnimationFrame(drawZoom);
}

// ═══════════════════════════════════════════════════════════════════════════════
// WebXR
// ═══════════════════════════════════════════════════════════════════════════════
var xrSession=null;
async function enterXR(){
  var btn=document.getElementById('xrBtn');
  if(xrSession){xrSession.end();return;}
  if(!navigator.xr){addAlert('WEBXR NOT SUPPORTED','warn');return;}
  var arOk=await navigator.xr.isSessionSupported('immersive-ar').catch(function(){return false;});
  if(!arOk){addAlert('AR NOT SUPPORTED','warn');return;}
  try{
    xrSession=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.body}
    });
    btn.textContent='◈ EXIT AR';addAlert('AR MODE ACTIVE','ok');
    xrSession.addEventListener('end',function(){xrSession=null;btn.textContent='◈ AR MODE';addAlert('AR ENDED','info');});
    var gl=document.createElement('canvas').getContext('webgl',{xrCompatible:true});
    xrSession.updateRenderState({baseLayer:new XRWebGLLayer(xrSession,gl)});
    var refSpace=await xrSession.requestReferenceSpace('local');
    function xrFrame(t,frame){
      if(!xrSession)return;
      xrSession.requestAnimationFrame(xrFrame);
      var pose=frame.getViewerPose(refSpace);
      if(pose){
        var q=pose.transform.orientation;
        var yaw=Math.atan2(2*(q.w*q.y+q.x*q.z),1-2*(q.y*q.y+q.z*q.z));
        hasRealSensor=true;updateCompass(((yaw*180/Math.PI)+360)%360);
      }
    }
    xrSession.requestAnimationFrame(xrFrame);
  }catch(e){addAlert('XR: '+e.message,'warn');}
}
