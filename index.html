<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#c{z-index:1;}

/* only DOM we allow: theme picker + zoom overlay (needs video element) */
#themer{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;gap:10px;pointer-events:auto;
}
.dot{
  width:13px;height:13px;border-radius:50%;cursor:pointer;
  border:2px solid rgba(255,255,255,.15);transition:transform .15s,border-color .15s,box-shadow .15s;
}
.dot:hover,.dot.on{transform:scale(1.6);border-color:rgba(255,255,255,.8);}
.dot.on{box-shadow:0 0 10px currentColor;}

/* zoom overlay — hidden until active */
#zw{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:200;display:none;flex-direction:column;align-items:center;gap:5px;
  pointer-events:none;
}
#zo{
  width:300px;height:225px;overflow:hidden;position:relative;
  border:1px solid rgba(0,229,255,.5);background:#000;
}
#zc{display:block;width:100%;height:100%;}
#zv{display:none;}
/* zoom corner brackets */
#zo::before,#zo::after{
  content:'';position:absolute;width:14px;height:14px;border-color:currentColor;border-style:solid;
  color:var(--C,#00e5ff);
}
#zo::before{top:5px;left:5px;border-width:1.5px 0 0 1.5px;}
#zo::after{bottom:5px;right:5px;border-width:0 1.5px 1.5px 0;}
#zlbl{
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.3em;
  color:var(--C,#00e5ff);text-shadow:0 0 8px currentColor;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- theme picker (only DOM needed for pointer events) -->
<div id="themer">
  <div class="dot on"  style="background:#00e5ff;color:#00e5ff" data-t="cyan"   onclick="setTheme('cyan',this)"></div>
  <div class="dot"     style="background:#ff2d6b;color:#ff2d6b" data-t="red"    onclick="setTheme('red',this)"></div>
  <div class="dot"     style="background:#ff7700;color:#ff7700" data-t="orange" onclick="setTheme('orange',this)"></div>
  <div class="dot"     style="background:#39ff14;color:#39ff14" data-t="green"  onclick="setTheme('green',this)"></div>
  <div class="dot"     style="background:#bf5fff;color:#bf5fff" data-t="purple" onclick="setTheme('purple',this)"></div>
</div>

<!-- zoom overlay — video needed for getUserMedia -->
<div id="zw">
  <div id="zo">
    <canvas id="zc" width="600" height="450"></canvas>
    <video id="zv" autoplay playsinline muted></video>
  </div>
  <div id="zlbl">ZOOM 1×</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════
var THEMES={
  cyan:  {c:'#00e5ff',rgb:[0,229,255]},
  red:   {c:'#ff2d6b',rgb:[255,45,107]},
  orange:{c:'#ff7700',rgb:[255,119,0]},
  green: {c:'#39ff14',rgb:[57,255,20]},
  purple:{c:'#bf5fff',rgb:[191,95,255]},
};
var TH=THEMES.cyan;
function setTheme(n,el){
  TH=THEMES[n]||TH;
  document.documentElement.style.setProperty('--C',TH.c);
  document.querySelector('#zo').style.borderColor=TH.c+'88';
  document.querySelector('#zlbl').style.color=TH.c;
  document.querySelectorAll('.dot').forEach(function(d){d.classList.remove('on');});
  if(el)el.classList.add('on');
}
function C(){return TH.c;}
function R(){return TH.rgb;}
function rc(a){var r=R();return 'rgba('+r[0]+','+r[1]+','+r[2]+','+a+')';}
setTheme('cyan',null);

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');
var W,H,DPR=window.devicePixelRatio||1;
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
}
resize();window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var S={
  time:'--:--:--', date:'-- --- ----',
  street:'',area:'',
  wTemp:'--°',wCond:'--',wWind:'-- km/h',wHum:'--%',wFeel:'--°',
  wSun:'↑-- ↓--',
  aqi:null,aqiLabel:'--',aqiColor:'#aaa',
  pollen:null,pollenLabel:'--',pollenName:'--',pollenColor:'#aaa',
  gps:'ACQUIRING',
  lat:null,lon:null,
};

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
var MONS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
var DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
function tickClock(){
  var n=new Date();
  S.time=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());
  S.date=DAYS[n.getDay()]+' '+n.getDate()+' '+MONS[n.getMonth()]+' '+n.getFullYear();
}
function p2(n){return String(n).padStart(2,'0');}
setInterval(tickClock,500);tickClock();

// ═══════════════════════════════════════════════════════════
// GPS + GEOCODE + WEATHER
// ═══════════════════════════════════════════════════════════
var geoTimer,wxTimer;
navigator.geolocation&&navigator.geolocation.watchPosition(function(p){
  S.lat=p.coords.latitude;S.lon=p.coords.longitude;
  S.gps='LOCKED';
  fetchWeather();fetchGeo();
},function(){S.gps='DENIED';},{enableHighAccuracy:true,maximumAge:0,timeout:20000});

function fetchGeo(){
  clearTimeout(geoTimer);
  geoTimer=setTimeout(function(){
    if(!S.lat)return;
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+S.lat.toFixed(5)+'&lon='+S.lon.toFixed(5)+'&format=json&zoom=16',{headers:{'Accept-Language':'en'}})
    .then(function(r){return r.json();}).then(function(d){
      var a=d.address||{};
      S.street=(a.road||a.pedestrian||a.path||a.footway||'').toUpperCase();
      var city=a.city||a.town||a.village||'';
      var area=a.neighbourhood||a.suburb||a.city_district||city||a.state||'';
      S.area=(area&&city&&area!==city?area+', '+city:area||city||'').toUpperCase();
    }).catch(function(){});
  },2500);
}

var wxFetched=0,aqiFetched=0;
function fetchWeather(){
  if(!S.lat)return;
  var now=Date.now();
  if(now-wxFetched<600000)return;wxFetched=now;
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+S.lat+'&longitude='+S.lon+
    '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&daily=sunrise,sunset&timezone=auto&forecast_days=1')
  .then(function(r){return r.json();}).then(function(d){
    var c=d.current,dd=d.daily;
    S.wTemp=Math.round(c.temperature_2m)+'°';
    S.wCond=wmoCode(c.weather_code);
    S.wWind=Math.round(c.wind_speed_10m)+' km/h';
    S.wHum=Math.round(c.relative_humidity_2m)+'%';
    S.wFeel=Math.round(c.apparent_temperature)+'°';
    if(dd)S.wSun='↑'+dd.sunrise[0].split('T')[1].slice(0,5)+' ↓'+dd.sunset[0].split('T')[1].slice(0,5);
  }).catch(function(){});
  if(now-aqiFetched<1800000)return;aqiFetched=now;
  fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+S.lat+'&longitude='+S.lon+
    '&current=european_aqi,us_aqi,grass_pollen,birch_pollen,mugwort_pollen')
  .then(function(r){return r.json();}).then(function(d){
    var c=d.current;
    var aqi=c.european_aqi!=null?c.european_aqi:c.us_aqi;
    if(aqi!=null){var ai=aqiInfo(aqi);S.aqi=Math.round(aqi);S.aqiLabel=ai.l;S.aqiColor=ai.c;}
    var pvs=[{n:'GRASS',v:c.grass_pollen},{n:'BIRCH',v:c.birch_pollen},{n:'MUGWORT',v:c.mugwort_pollen}].filter(function(x){return x.v!=null;});
    if(pvs.length){var top=pvs.reduce(function(a,b){return b.v>a.v?b:a;});var pi=pollenInfo(top.v);S.pollen=Math.round(top.v);S.pollenLabel=pi.l;S.pollenName=top.n;S.pollenColor=pi.c;}
  }).catch(function(){});
}
function wmoCode(c){if(c===0)return'CLEAR';if(c<=2)return'PARTLY CLD';if(c<=3)return'OVERCAST';if(c<=49)return'FOG';if(c<=59)return'DRIZZLE';if(c<=69)return'RAIN';if(c<=79)return'SNOW';if(c<=82)return'SHOWERS';if(c<=99)return'STORM';return'--';}
function aqiInfo(v){if(v<=25)return{l:'GOOD',c:'#39ff14'};if(v<=50)return{l:'FAIR',c:'#39ff14'};if(v<=75)return{l:'MODERATE',c:'#ff9500'};if(v<=100)return{l:'POOR',c:'#ff9500'};if(v<=150)return{l:'VERY POOR',c:'#ff2d6b'};return{l:'HAZARDOUS',c:'#ff2d6b'};}
function pollenInfo(v){if(v<=10)return{l:'LOW',c:'#39ff14'};if(v<=30)return{l:'MODERATE',c:'#ff9500'};if(v<=50)return{l:'HIGH',c:'#ff9500'};return{l:'VERY HIGH',c:'#ff2d6b'};}

// ═══════════════════════════════════════════════════════════
// ZOOM  (camera-based, triggered by pressing Z or AR button)
// ═══════════════════════════════════════════════════════════
var ZOOM_LEVELS=[1,2,4,8,12,20];
var zoomIdx=0,zoomActive=false,zoomStream=null,zoomRAF=null;
var zcv=document.getElementById('zc');
var zctx=zcv.getContext('2d');
var zv=document.getElementById('zv');
var zw=document.getElementById('zw');
var zlbl=document.getElementById('zlbl');

function toggleZoom(){
  if(!zoomActive){
    zoomActive=true;zoomIdx=0;
    zw.style.display='flex';
    if(!zoomStream){
      navigator.mediaDevices&&navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}}})
      .then(function(s){zoomStream=s;zv.srcObject=s;zv.play();drawZoomFrame();})
      .catch(function(){drawZoomNoFeed();});
    }else{drawZoomFrame();}
  }else{
    zoomIdx=(zoomIdx+1)%ZOOM_LEVELS.length;
    if(zoomIdx===0){
      zoomActive=false;zw.style.display='none';
      if(zoomRAF){cancelAnimationFrame(zoomRAF);zoomRAF=null;}
    }
  }
  if(zoomActive)zlbl.textContent='ZOOM '+ZOOM_LEVELS[zoomIdx]+'×';
}
function drawZoomFrame(){
  if(!zoomActive){return;}
  if(zv.readyState>=2){
    var vw=zv.videoWidth,vh=zv.videoHeight,z=ZOOM_LEVELS[zoomIdx];
    var sw=vw/z,sh=vh/z,sx=(vw-sw)/2,sy=(vh-sh)/2;
    zctx.drawImage(zv,sx,sy,sw,sh,0,0,600,450);
    // scanlines on zoom
    zctx.fillStyle='rgba(0,0,0,.18)';for(var y=0;y<450;y+=3)zctx.fillRect(0,y,600,1);
    // colour tint
    var r=R();zctx.fillStyle='rgba('+r[0]+','+r[1]+','+r[2]+',.04)';zctx.fillRect(0,0,600,450);
  }
  zoomRAF=requestAnimationFrame(drawZoomFrame);
}
function drawZoomNoFeed(){
  zctx.fillStyle='#000';zctx.fillRect(0,0,600,450);
  zctx.font='700 11px Share Tech Mono,monospace';
  zctx.fillStyle=rc(.4);zctx.textAlign='center';zctx.textBaseline='middle';
  zctx.fillText('NO CAMERA FEED',300,225);
}
window.addEventListener('keydown',function(e){if(e.key==='z'||e.key==='Z')toggleZoom();});

// ═══════════════════════════════════════════════════════════
// VISUAL EFFECT STATE
// ═══════════════════════════════════════════════════════════

// digital rain columns (sides only)
var rainCols=[];
var RCHARS='01アイウカキサシスタチツテト∆∇∞≈≡▓▒░⌬⌁⌖⊕⊗';
function initRain(){
  rainCols=[];
  var spacing=18,margin=W*.32;
  for(var x=0;x<W;x+=spacing){
    if(x>margin&&x<W-margin)continue;
    var col={x:x,y:-(Math.random()*H),speed:40+Math.random()*70,len:5+Math.floor(Math.random()*14),chars:[],opacity:.08+Math.random()*.14,mut:0};
    for(var i=0;i<col.len;i++)col.chars.push(RCHARS[Math.floor(Math.random()*RCHARS.length)]);
    rainCols.push(col);
  }
}
initRain();window.addEventListener('resize',initRain);

// scan line
var scanY=0;

// glitch slices
var glitches=[];
var glitchTimer=0;
function spawnGlitch(){
  for(var i=0;i<1+Math.floor(Math.random()*3);i++)
    glitches.push({y:Math.random()*H,h:1+Math.random()*10,dx:(Math.random()-.5)*30,life:1,dur:.06+Math.random()*.1});
}

// pulse rings from center
var pulses=[];
var pulseTimer=0;

// hex grid flicker (static — pre-built array of positions)
var hexes=[];
function buildHexes(){
  hexes=[];
  var sz=28,rows=Math.ceil(H/sz)+2,cols2=Math.ceil(W/sz)+2;
  for(var row=0;row<rows;row++){
    for(var col2=0;col2<cols2;col2++){
      var hx=col2*sz*1.732+(row%2)*sz*.866,hy=row*sz*1.5;
      // only show hexes near edges — fade toward center
      var dx=Math.abs(hx-W/2)/(W/2),dy=Math.abs(hy-H/2)/(H/2);
      var edge=Math.max(dx,dy);
      if(edge>.55)hexes.push({x:hx,y:hy,alpha:0,target:(edge-.55)*.18,r:sz*.45});
    }
  }
}
buildHexes();window.addEventListener('resize',buildHexes);

// data stream text (scrolling right side margin)
var streams=[];
function initStreams(){
  streams=[];
  var y=60;
  while(y<H-80){
    streams.push({y:y,x:W-18,speed:12+Math.random()*20,chars:[],len:3+Math.floor(Math.random()*6),mut:0,opacity:.06+Math.random()*.08});
    y+=14+Math.random()*20;
  }
  streams.forEach(function(s){for(var i=0;i<s.len;i++)s.chars.push(RCHARS[Math.floor(Math.random()*RCHARS.length)]);});
}
initStreams();

// ═══════════════════════════════════════════════════════════
// MAIN DRAW
// ═══════════════════════════════════════════════════════════
var lastT=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  if(!W||!H)return;
  var dt=Math.min((now-lastT)/1000,.05);lastT=now;var t=now*.001;

  ctx.save();ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);

  var cx=W/2,cy=H/2;

  // ── background ──
  ctx.fillStyle='#000305';ctx.fillRect(0,0,W,H);

  // ── hex grid (edge atmosphere) ──
  ctx.save();
  for(var hi=0;hi<hexes.length;hi++){
    var hx=hexes[hi];
    hx.alpha+=(hx.target*(0.6+0.4*Math.sin(t*.7+hi*.13))-hx.alpha)*.04;
    if(hx.alpha<.001)continue;
    ctx.strokeStyle=rc(hx.alpha);ctx.lineWidth=.6;
    hexPath(ctx,hx.x,hx.y,hx.r);ctx.stroke();
  }
  ctx.restore();

  // ── digital rain ──
  ctx.save();
  ctx.font='11px "Share Tech Mono",monospace';
  for(var ri=0;ri<rainCols.length;ri++){
    var col=rainCols[ri];
    col.y+=col.speed*dt;col.mut+=dt;
    if(col.mut>.075){col.mut=0;col.chars[Math.floor(Math.random()*col.chars.length)]=RCHARS[Math.floor(Math.random()*RCHARS.length)];}
    if(col.y-col.len*13>H)col.y=-Math.random()*H*.6;
    for(var ci=0;ci<col.chars.length;ci++){
      var cy2=col.y-ci*13;if(cy2<-13||cy2>H+13)continue;
      var a=ci===0?col.opacity*4:col.opacity*(1-ci/col.len);
      ctx.fillStyle=rc(Math.min(1,a));ctx.fillText(col.chars[ci],col.x,cy2);
    }
  }
  ctx.restore();

  // ── side data streams (right margin) ──
  ctx.save();
  ctx.font='9px "Share Tech Mono",monospace';ctx.textAlign='right';
  for(var si=0;si<streams.length;si++){
    var st=streams[si];
    st.x-=st.speed*dt;st.mut+=dt;
    if(st.mut>.1){st.mut=0;st.chars[Math.floor(Math.random()*st.chars.length)]=RCHARS[Math.floor(Math.random()*RCHARS.length)];}
    if(st.x<-100)st.x=W+Math.random()*80;
    for(var sj=0;sj<st.chars.length;sj++){
      ctx.fillStyle=rc(sj===0?st.opacity*3:st.opacity*(1-sj/st.len));
      ctx.fillText(st.chars[sj],st.x-sj*9,st.y);
    }
  }
  ctx.restore();

  // ── pulse rings ──
  pulseTimer-=dt;if(pulseTimer<0){pulseTimer=2.8+Math.random()*1.8;pulses.push({r:0,maxR:Math.min(W,H)*.42,a:.5});}
  ctx.save();
  for(var pi=pulses.length-1;pi>=0;pi--){
    var p=pulses[pi];p.r+=80*dt;p.a=.5*(1-p.r/p.maxR);
    if(p.a<=0){pulses.splice(pi,1);continue;}
    ctx.beginPath();ctx.arc(cx,cy,p.r,0,Math.PI*2);
    ctx.strokeStyle=rc(p.a*.25);ctx.lineWidth=1.2;ctx.stroke();
  }
  ctx.restore();

  // ── scan line sweep ──
  scanY=(scanY+H*dt*.07)%H;
  ctx.save();
  var sy0=scanY-40,sy1=scanY+40;
  if(isFinite(sy0)&&isFinite(sy1)&&sy1>sy0){
    var sg=ctx.createLinearGradient(0,sy0,0,sy1);
    sg.addColorStop(0,rc(0));sg.addColorStop(.4,rc(.028));sg.addColorStop(.5,rc(.055));sg.addColorStop(.6,rc(.028));sg.addColorStop(1,rc(0));
    ctx.fillStyle=sg;ctx.fillRect(0,sy0,W,80);
  }
  ctx.restore();

  // ── CRT scanlines ──
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.055)';
  for(var y=0;y<H;y+=4)ctx.fillRect(0,y,W,2);
  ctx.restore();

  // ── glitch slices ──
  glitchTimer-=dt;if(glitchTimer<0){glitchTimer=2.5+Math.random()*4;spawnGlitch();}
  ctx.save();
  for(var gi=glitches.length-1;gi>=0;gi--){
    var g=glitches[gi];g.life-=dt/g.dur;
    if(g.life<=0){glitches.splice(gi,1);continue;}
    ctx.fillStyle=rc(g.life*.18);ctx.fillRect(g.dx,g.y,W*.25+Math.random()*W*.4,g.h);
  }
  ctx.restore();

  // ── vignette ──
  var vigR0=Math.max(1,H*.2),vigR1=Math.max(vigR0+1,H*.75);
  var vg=ctx.createRadialGradient(cx,cy,vigR0,cx,cy,vigR1);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.72)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // ── chromatic aberration edge hint ──
  ctx.save();
  ctx.globalCompositeOperation='screen';
  var edR0=Math.max(1,H*.35),edR1=Math.max(edR0+1,H*.55);
  var edgeG=ctx.createRadialGradient(cx,cy,edR0,cx,cy,edR1);
  var r2=R();
  edgeG.addColorStop(0,'transparent');
  edgeG.addColorStop(1,'rgba('+r2[0]+','+r2[1]+','+r2[2]+',.04)');
  ctx.fillStyle=edgeG;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  ctx.restore();

  // ── frame corners ──
  drawCorners(ctx);

  // ── center reticle dot ──
  drawReticle(ctx,cx,cy,t);

  // ── panels ──
  drawTL(ctx,t);   // clock + date + street
  drawBR(ctx,t);   // weather
  drawBL(ctx,t);   // AQI + pollen

  ctx.restore();
}
requestAnimationFrame(frame);

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function hexPath(ctx,x,y,r){
  ctx.beginPath();
  for(var i=0;i<6;i++){var a=i*Math.PI/3-Math.PI/6;ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}
  ctx.closePath();
}

function glow(b){ctx.shadowColor=C();ctx.shadowBlur=b;}
function noglow(){ctx.shadowColor='transparent';ctx.shadowBlur=0;}

function drawCorners(ctx){
  var M=14,S2=44;
  ctx.save();
  ctx.strokeStyle=C();ctx.lineWidth=1.8;glow(8);
  // TL
  ctx.beginPath();ctx.moveTo(M,M+S2);ctx.lineTo(M,M);ctx.lineTo(M+S2,M);ctx.stroke();
  // TR
  ctx.beginPath();ctx.moveTo(W-M-S2,M);ctx.lineTo(W-M,M);ctx.lineTo(W-M,M+S2);ctx.stroke();
  // BL
  ctx.beginPath();ctx.moveTo(M,H-M-S2);ctx.lineTo(M,H-M);ctx.lineTo(M+S2,H-M);ctx.stroke();
  // BR
  ctx.beginPath();ctx.moveTo(W-M-S2,H-M);ctx.lineTo(W-M,H-M);ctx.lineTo(W-M,H-M-S2);ctx.stroke();
  // inner tick marks
  ctx.lineWidth=.8;ctx.globalAlpha=.35;noglow();
  function tck(x,y,dx,dy){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+dx*16,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+dy*16);ctx.stroke();}
  tck(M+2,M+8,1,1);tck(W-M-2,M+8,-1,1);tck(M+2,H-M-8,1,-1);tck(W-M-2,H-M-8,-1,-1);
  // edge gradient lines
  ctx.globalAlpha=1;
  function edgeH(y2){if(W<=120)return;var g=ctx.createLinearGradient(60,0,W-60,0);g.addColorStop(0,'transparent');g.addColorStop(.1,rc(.35));g.addColorStop(.9,rc(.35));g.addColorStop(1,'transparent');ctx.strokeStyle=g;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(60,y2);ctx.lineTo(W-60,y2);ctx.stroke();}
  edgeH(M);edgeH(H-M);
  ctx.restore();
}

function drawReticle(ctx,cx,cy,t){
  ctx.save();
  // outer ring — slow pulse
  var pr=22+Math.sin(t*.8)*.5;
  ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);
  ctx.strokeStyle=rc(.18);ctx.lineWidth=.8;ctx.stroke();
  // dashed rotation ring
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*.15);
  ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);
  ctx.strokeStyle=rc(.22);ctx.lineWidth=.7;ctx.setLineDash([3,8]);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
  // 4 gap cross lines
  ctx.strokeStyle=rc(.3);ctx.lineWidth=.8;
  var inner=8,outer=22;
  [[0,-outer,0,-inner],[0,inner,0,outer],[-outer,0,-inner,0],[inner,0,outer,0]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(cx+l[0],cy+l[1]);ctx.lineTo(cx+l[2],cy+l[3]);ctx.stroke();
  });
  // center dot — small and sharp
  glow(6);
  ctx.beginPath();ctx.arc(cx,cy,2.2,0,Math.PI*2);
  ctx.fillStyle=C();ctx.fill();
  noglow();
  ctx.restore();
}

// ─── PANEL TL: time + date + street ─────────────────────
function drawTL(ctx,t){
  var x=22,y=22;
  ctx.save();ctx.textBaseline='top';

  // time — Bebas Neue large
  glow(18);
  ctx.font='bold 52px "Bebas Neue",sans-serif';
  ctx.fillStyle=C();ctx.fillText(S.time,x,y);
  noglow();
  y+=52+2;

  // date — small mono
  ctx.font='700 8px "Share Tech Mono",monospace';
  ctx.fillStyle=rc(.45);ctx.fillText(S.date,x,y);
  y+=12+4;

  // divider
  if(W>60){
    var dg=ctx.createLinearGradient(x,0,x+140,0);
    dg.addColorStop(0,rc(.4));dg.addColorStop(1,'transparent');
    ctx.strokeStyle=dg;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+140,y);ctx.stroke();
  }
  y+=6;

  // street
  if(S.street){
    ctx.font='700 10px "Share Tech Mono",monospace';
    glow(5);ctx.fillStyle=C();ctx.fillText(S.street,x,y);noglow();y+=13;
  }
  if(S.area){
    ctx.font='500 8px "Share Tech Mono",monospace';
    ctx.fillStyle=rc(.4);ctx.fillText(S.area,x,y);
  } else if(!S.street){
    ctx.font='700 8px "Share Tech Mono",monospace';
    var gpsCol=S.gps==='LOCKED'?'#39ff14':S.gps==='DENIED'?'#ff2d6b':'#ff9500';
    ctx.fillStyle=gpsCol;
    var blk=Math.floor(t*2)%2===0?'●':'○';
    ctx.fillText(blk+' GPS '+S.gps,x,y);
  }

  ctx.restore();
}

// ─── PANEL BR: weather ──────────────────────────────────
function drawBR(ctx,t){
  var right=W-22,base=H-22;
  ctx.save();ctx.textAlign='right';ctx.textBaseline='alphabetic';

  var y=base;

  // sun row
  ctx.font='500 7px "Share Tech Mono",monospace';ctx.fillStyle=rc(.38);
  ctx.fillText(S.wSun,right,y);y-=11;

  // humidity + wind
  ctx.font='500 8px "Share Tech Mono",monospace';ctx.fillStyle=rc(.6);
  ctx.fillText('HUM '+S.wHum+'   WIND '+S.wWind,right,y);y-=13;

  // feels like
  ctx.fillStyle=rc(.45);ctx.font='500 8px "Share Tech Mono",monospace';
  ctx.fillText('FEELS '+S.wFeel,right,y);y-=14;

  // condition
  ctx.font='700 12px "Share Tech Mono",monospace';ctx.fillStyle=rc(.85);
  ctx.fillText(S.wCond,right,y);y-=14;

  // divider
  var ddg=ctx.createLinearGradient(Math.max(0,right-190),0,right,0);
  ddg.addColorStop(0,'transparent');ddg.addColorStop(1,rc(.3));
  ctx.strokeStyle=ddg;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(right-190,y);ctx.lineTo(right,y);ctx.stroke();
  y-=14;

  // temp big
  glow(20);
  ctx.font='bold 56px "Bebas Neue",sans-serif';ctx.fillStyle=C();
  ctx.fillText(S.wTemp,right,y);
  noglow();

  ctx.restore();
}

// ─── PANEL BL: AQI + pollen ─────────────────────────────
function drawBL(ctx,t){
  var x=22,base=H-22;
  ctx.save();ctx.textBaseline='alphabetic';

  var y=base;
  var hasData=S.aqi!==null||S.pollen!==null;

  if(!hasData){
    ctx.font='700 7px "Share Tech Mono",monospace';ctx.fillStyle=rc(.22);
    ctx.fillText('ENV DATA PENDING',x,y);
    ctx.restore();return;
  }

  // pollen
  if(S.pollen!==null){
    ctx.font='700 8px "Share Tech Mono",monospace';
    ctx.fillStyle=rc(.35);ctx.fillText('POLLEN',x,y);
    ctx.fillStyle=S.pollenColor;glow(6);
    ctx.fillText(S.pollenLabel+' ('+S.pollenName+')',x+52,y);noglow();y-=13;
  }

  // AQI
  if(S.aqi!==null){
    ctx.font='700 8px "Share Tech Mono",monospace';
    ctx.fillStyle=rc(.35);ctx.fillText('AQI',x,y);
    ctx.fillStyle=S.aqiColor;glow(6);
    ctx.fillText(S.aqi+'  '+S.aqiLabel,x+28,y);noglow();y-=13;
  }

  // divider
  var ddg=ctx.createLinearGradient(x,0,x+180,0);
  ddg.addColorStop(0,rc(.35));ddg.addColorStop(1,'transparent');
  ctx.strokeStyle=ddg;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+180,y);ctx.stroke();

  ctx.restore();
}

</script>
