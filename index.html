<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
body.theme-cyan{ --c:#00e5ff; --glow:0 0 10px rgba(0,229,255,.6); }
body.theme-green{ --c:#76ff03; --glow:0 0 10px rgba(118,255,3,.6); }
body.theme-amber{ --c:#ffb300; --glow:0 0 10px rgba(255,179,0,.6); }
body.theme-red{   --c:#ff1744; --glow:0 0 10px rgba(255,23,68,.6); }
body.theme-white{ --c:#e0e0e0; --glow:0 0 8px rgba(220,220,220,.4); }
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;}
body{color:var(--c);font-family:'Share Tech Mono',monospace;}
.corner{position:fixed;width:32px;height:32px;border-color:var(--c);opacity:.4;border-style:solid;z-index:10;}
.corner.tl{top:14px;left:14px;border-width:1.5px 0 0 1.5px;}
.corner.tr{top:14px;right:14px;border-width:1.5px 1.5px 0 0;}
.corner.bl{bottom:14px;left:14px;border-width:0 0 1.5px 1.5px;}
.corner.br{bottom:14px;right:14px;border-width:0 1.5px 1.5px 0;}
.tl{position:fixed;top:18px;left:18px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.clock{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:.08em;line-height:1;}
.date{font-size:.7rem;font-weight:700;color:var(--c);opacity:.7;letter-spacing:.15em;}
.area{font-size:.72rem;font-weight:900;color:var(--c);letter-spacing:.12em;margin-top:2px;text-shadow:var(--glow);}
.street{font-size:.62rem;font-weight:700;color:var(--c);opacity:.7;letter-spacing:.08em;}
.area.updating{animation:pulse-text .6s ease;}
@keyframes pulse-text{0%{opacity:1;text-shadow:0 0 20px var(--c),0 0 40px var(--c);}50%{opacity:.4;}100%{opacity:1;text-shadow:var(--glow);}}
.tr{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;z-index:10;}
.stat{display:flex;align-items:center;gap:7px;}
.slbl{font-size:.62rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.85;letter-spacing:.15em;}
.sbar{width:64px;height:4px;background:rgba(255,255,255,.05);border:1px solid var(--c);overflow:hidden;}
.sf{height:100%;transition:width 1s ease;}
.sf.g{background:#76ff03;box-shadow:0 0 6px rgba(118,255,3,.5);}
.sf.c{background:var(--c);box-shadow:0 0 4px var(--c);}
.sf.o{background:#ff6d00;}.sf.r{background:#ff1744;}
.sval{font-size:.62rem;font-weight:900;color:var(--c);min-width:28px;text-align:right;font-family:'Orbitron',monospace;}
.sys-row{font-size:.6rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);display:flex;gap:5px;align-items:center;justify-content:flex-end;}
.sys-lbl{opacity:.7;}
.bl{position:fixed;bottom:18px;left:18px;display:flex;flex-direction:column;gap:3px;z-index:10;}
.loc-row{display:flex;gap:6px;align-items:baseline;}
.lloc{font-size:.62rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.8;letter-spacing:.14em;width:28px;}
.lval{font-size:.68rem;font-weight:700;color:var(--c);letter-spacing:.03em;}
.gps-status{font-size:.58rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.14em;margin-top:2px;}
.gps-status.acquiring{color:#ff6d00;animation:blink-acq 1.2s ease-in-out infinite;}
.gps-status.locked{color:#76ff03;}.gps-status.denied{color:#ff1744;}
@keyframes blink-acq{0%,100%{opacity:1;}50%{opacity:.3;}}
#poiPanel{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:3px;max-width:210px;}
.poi-hdr{font-size:.5rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.2em;color:var(--c);opacity:.6;margin-bottom:2px;}
.poi-row{font-size:.58rem;font-weight:700;color:var(--c);letter-spacing:.04em;display:flex;gap:5px;align-items:baseline;opacity:.95;}
.poi-dist{opacity:.65;min-width:40px;font-weight:900;}
.br{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;z-index:10;}
.temp{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:var(--c);text-shadow:var(--glow);}
.cond{font-size:.68rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.9;letter-spacing:.16em;}
.wrow{font-size:.64rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.85;display:flex;gap:6px;align-items:center;}
.wval{opacity:1;}
.sunrow{font-size:.56rem;font-weight:700;color:var(--c);opacity:.55;}
.divider{width:100%;height:1px;background:var(--c);opacity:.15;margin:2px 0;}
.flash{animation:flash-val .7s ease;}
@keyframes flash-val{0%{opacity:1;filter:brightness(3);}40%{opacity:.5;}100%{opacity:1;filter:brightness(1);}}
#scanLines{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:50;opacity:1;}
#themeSweep{position:fixed;top:0;left:-100vw;width:100vw;height:100vh;pointer-events:none;z-index:60;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);transition:none;}
#themeSweep.sweeping{animation:sweep-anim .45s ease-out forwards;}
@keyframes sweep-anim{0%{left:-100vw;}100%{left:100vw;}}
#gpsRipple{position:fixed;bottom:36px;left:18px;width:0;height:0;pointer-events:none;z-index:15;}
.ripple-ring{position:absolute;border-radius:50%;border:1.5px solid var(--c);animation:ripple-out .9s ease-out forwards;transform:translate(-50%,-50%);}
@keyframes ripple-out{0%{width:0;height:0;opacity:.9;}100%{width:120px;height:120px;opacity:0;}}
#threatPanel{margin-top:4px;}
.threat-hdr{font-size:.5rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.2em;color:var(--c);opacity:.5;}
.threat-val{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:900;letter-spacing:.1em;margin-top:1px;}
.threat-bar-wrap{width:90px;height:3px;background:rgba(255,255,255,.06);border:1px solid var(--c);overflow:hidden;margin-top:2px;opacity:.6;}
.threat-bar-fill{height:100%;transition:width .8s ease;}
.threat-sub{font-size:.48rem;font-weight:700;color:var(--c);opacity:.5;letter-spacing:.1em;margin-top:2px;}
.alerts{position:fixed;top:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;align-items:center;z-index:20;pointer-events:none;}
.alert{font-size:.52rem;font-weight:700;letter-spacing:.16em;padding:.15rem .55rem;border:1px solid;text-transform:uppercase;animation:alert-in .25s ease both;}
.alert.ok{border-color:rgba(118,255,3,.4);color:#76ff03;}
.alert.warn{border-color:rgba(255,109,0,.45);color:#ff6d00;}
.alert.info{border-color:var(--c);color:var(--c);opacity:.85;}
.alert.danger{border-color:rgba(255,23,68,.45);color:#ff1744;}
@keyframes alert-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
#minimapWrap{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:12;pointer-events:none;}
#minimapCanvas{display:block;}
.mm-heading-lbl{font-family:'Orbitron',monospace;font-size:.5rem;font-weight:900;color:var(--c);letter-spacing:.2em;text-align:center;margin-top:4px;opacity:.6;}
#compassWrap{position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;}
#compassCanvas{display:block;}
#horizonWrap{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:5;pointer-events:none;opacity:.7;}
#horizonCanvas{display:block;}
#edgeArrowCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:11;}
#speedPanel{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:2px;}
.spd-val{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:.05em;line-height:1;}
.spd-unit{font-family:'Orbitron',monospace;font-size:.42rem;font-weight:900;color:var(--c);opacity:.5;letter-spacing:.22em;}
.odo-row{display:flex;gap:10px;align-items:center;}
.odo-lbl{font-family:'Orbitron',monospace;font-size:.44rem;font-weight:900;color:var(--c);opacity:.5;letter-spacing:.18em;}
.odo-val{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--c);opacity:.8;letter-spacing:.08em;}
#themePicker{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100;align-items:center;}
.tpBtn{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.18);cursor:pointer;transition:transform .15s,border-color .15s;}
.tpBtn:hover,.tpBtn.active{transform:scale(1.4);border-color:rgba(255,255,255,.7);}
.tpBtn.tc{background:#00e5ff;}.tpBtn.tg{background:#76ff03;}.tpBtn.ta{background:#ffb300;}.tpBtn.tr2{background:#ff1744;}.tpBtn.tw{background:#ddd;}
#xrbtn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:transparent;border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.22em;padding:.4rem .9rem;cursor:pointer;text-transform:uppercase;z-index:100;text-shadow:var(--glow);transition:all .2s;opacity:.75;}
#xrbtn:hover{opacity:1;background:var(--c);color:#000;}
#permBtn{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.22em;padding:.7rem 1.5rem;cursor:pointer;text-transform:uppercase;z-index:9999;text-shadow:var(--glow);}
#hud2d{display:none;}
#hudMirror{position:fixed;right:10px;bottom:10px;width:180px;height:90px;border:1px solid rgba(0,229,255,.18);display:none;z-index:10000;}
#nvPanel{position:fixed;bottom:114px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:100;}
#nvBtn{background:transparent;border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.2em;padding:.3rem .8rem;cursor:pointer;text-transform:uppercase;text-shadow:var(--glow);transition:all .2s;opacity:.65;}
#nvBtn:hover{opacity:1;}
#nvBtn.active{opacity:1;background:rgba(255,255,255,.06);border-color:var(--c);box-shadow:0 0 12px var(--c),inset 0 0 8px rgba(255,255,255,.04);}
#nvSub{display:none;flex-direction:column;align-items:center;gap:5px;}
#nvSub.visible{display:flex;}
.nv-row{display:flex;align-items:center;gap:7px;}
.nv-lbl{font-family:'Orbitron',monospace;font-size:.42rem;font-weight:900;color:var(--c);opacity:.6;letter-spacing:.18em;width:32px;text-align:right;}
.nvDot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.18);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;}
.nvDot:hover,.nvDot.active{transform:scale(1.35);border-color:rgba(255,255,255,.8);box-shadow:0 0 6px currentColor;}
.nvDot.nv-red{background:#ff1744;color:#ff1744;}.nvDot.nv-amber{background:#ffb300;color:#ffb300;}
.nvDot.nv-cyan{background:#00e5ff;color:#00e5ff;}.nvDot.nv-green{background:#76ff03;color:#76ff03;}
#nvStatus{font-family:'Orbitron',monospace;font-size:.4rem;letter-spacing:.16em;color:var(--c);opacity:.45;margin-top:1px;}
</style>
</head>
<body class="theme-cyan">
<canvas id="hudMirror" width="180" height="90"></canvas>
<canvas id="hud2d" width="900" height="450"></canvas>
<canvas id="scanLines"></canvas>
<div id="themeSweep"></div>
<div id="gpsRipple"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="tl"><div class="clock" id="clock">00:00:00</div><div class="date" id="date">-- --- ----</div><div class="area" id="area">LOCATING...</div><div class="street" id="street"></div></div>
<div class="tr">
  <div class="stat"><div class="slbl">BAT</div><div class="sbar"><div class="sf g" id="batF" style="width:85%"></div></div><div class="sval" id="batV">85%</div></div>
  <div class="stat"><div class="slbl">NET</div><div class="sbar"><div class="sf c" id="netF" style="width:0%"></div></div><div class="sval" id="netV">--</div></div>
  <div class="sys-row"><span class="sys-lbl">CPU</span><span id="cpuV">--%</span></div>
  <div class="sys-row"><span class="sys-lbl">MEM</span><span id="memV">-- MB</span></div>
</div>
<div class="bl">
  <div class="loc-row"><div class="lloc">LAT</div><div class="lval" id="latV">--</div></div>
  <div class="loc-row"><div class="lloc">LON</div><div class="lval" id="lonV">--</div></div>
  <div class="gps-status acquiring" id="gpsS">● GPS ACQUIRING</div>
  <div id="threatPanel" style="display:none"><div class="threat-hdr">THREAT LEVEL</div><div class="threat-val" id="threatVal">--</div><div class="threat-bar-wrap"><div class="threat-bar-fill" id="threatBar" style="width:0%"></div></div><div class="threat-sub" id="threatSub">ACQUIRING DATA</div></div>
</div>
<div id="poiPanel"></div>
<div class="br"><div class="temp" id="wTemp">--°</div><div class="cond" id="wCond">--</div><div class="wrow"><span>WIND</span><span class="wval" id="wWind">--</span><span>km/h</span></div><div class="wrow"><span>HUM</span><span class="wval" id="wHum">--%</span></div><div class="sunrow" id="wSun">↑ -- · ↓ --</div><div class="divider" id="envDivider" style="display:none"></div><div class="wrow" id="aqiRow" style="display:none"><span>AQI</span><span class="wval" id="wAqi">--</span><span id="wAqiLbl"></span></div><div class="wrow" id="pollenRow" style="display:none"><span>POLLEN</span><span class="wval" id="wPollen">--</span><span id="wPollenLbl"></span></div></div>
<div class="alerts" id="alerts"></div>
<div id="compassWrap"><canvas id="compassCanvas" width="320" height="32"></canvas></div>
<div id="horizonWrap"><canvas id="horizonCanvas" width="200" height="120"></canvas></div>
<canvas id="edgeArrowCanvas"></canvas>
<div id="speedPanel"><div class="spd-val" id="spdVal">0.0</div><div class="spd-unit">KM/H</div><div class="odo-row"><span class="odo-lbl">ODO</span><span class="odo-val" id="odoVal">0.000 km</span></div></div>
<div id="minimapWrap"><canvas id="minimapCanvas" width="160" height="160"></canvas><div class="mm-heading-lbl" id="mmHeadingLbl">HDG ---°</div></div>
<div id="nvPanel"><div id="nvSub"><div class="nv-row"><span class="nv-lbl">DARK</span><div class="nvDot nv-red active" id="nvd-red" title="Red" onclick="setNvDark('red',this)"></div><div class="nvDot nv-amber" id="nvd-amber" title="Amber" onclick="setNvDark('amber',this)"></div></div><div class="nv-row"><span class="nv-lbl">LIGHT</span><div class="nvDot nv-cyan active" id="nvl-cyan" title="Cyan" onclick="setNvLight('cyan',this)"></div><div class="nvDot nv-green" id="nvl-green" title="Green" onclick="setNvLight('green',this)"></div></div><div id="nvStatus">● STANDBY</div></div><button id="nvBtn" onclick="toggleNV()">◈ AUTO NV</button></div>
<div id="themePicker"><div class="tpBtn tc active" onclick="setTheme('cyan',this)" title="Cyan"></div><div class="tpBtn tg" onclick="setTheme('green',this)" title="Green"></div><div class="tpBtn ta" onclick="setTheme('amber',this)" title="Amber"></div><div class="tpBtn tr2" onclick="setTheme('red',this)" title="Red"></div><div class="tpBtn tw" onclick="setTheme('white',this)" title="White"></div></div>
<button id="xrbtn" onclick="enterXR()">◈ ENTER AR MODE</button>
<button id="permBtn" onclick="requestPerms()">◈ ENABLE SENSORS</button>
<script>
var THEMES={cyan:{c:'#00e5ff',c2:'#ff6d00',c3:'#76ff03',cr:'#ff1744'},green:{c:'#76ff03',c2:'#ff6d00',c3:'#00e5ff',cr:'#ff1744'},amber:{c:'#ffb300',c2:'#ff6d00',c3:'#76ff03',cr:'#ff1744'},red:{c:'#ff1744',c2:'#ff6d00',c3:'#76ff03',cr:'#ff6d00'},white:{c:'#e0e0e0',c2:'#ff6d00',c3:'#76ff03',cr:'#ff1744'}};
var currentTheme='cyan';
function setTheme(name,btn){if(btn&&nvActive){nvActive=false;nvCurrentMode='';nvBrightSamples=[];clearInterval(nvLoopId);nvLoopId=null;if(nvStream){nvStream.getTracks().forEach(function(t){t.stop();});nvStream=null;}if(nvVideo){nvVideo.srcObject=null;nvVideo.remove();nvVideo=null;}document.getElementById('nvBtn').classList.remove('active');document.getElementById('nvSub').classList.remove('visible');document.getElementById('nvStatus').textContent='● STANDBY';document.getElementById('nvStatus').style.color='';}currentTheme=name;document.body.className='theme-'+name;document.querySelectorAll('.tpBtn').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');themeSweep();}
function TC(){return THEMES[currentTheme].c;}function TC2(){return THEMES[currentTheme].c2;}function TC3(){return THEMES[currentTheme].c3;}function TCR(){return THEMES[currentTheme].cr;}

/* STATE */
var lat=null,lon=null,geoWatchId=null,batPct=85,weatherFetched=false;
var lastArea='',lastStreet='',lastAqi=null,lastPollen=null,alertsState=[];
var isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
var DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
var MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
var GPS_TIMEOUT=60000,GPS_RETRY_DELAY=5000,gpsRetryTimer=null,gpsAttempts=0,GPS_MAX_ATTEMPTS=10;
var poiData=[],cpuSamples=[],lastGpsState='',threatFetched=false;
var GLITCH_CHARS='!@#$%^&*<>?/\\|[]{}01';
var c2dSweepY=0,c2dThemeSweepX=-9999,c2dThemeSweeping=false;
var mapHeading=0,mapHeadingRaw=null,mapTileCache={},MAP_ZOOM=17;
var MM_DOM_RADIUS=76,mmDomCanvas=null,mmDomCtx=null;
var lastTileCenterX=-1,lastTileCenterY=-1,MM_RANGE_METERS=250;
/* Speed/Odo/Breadcrumb */
var speedKmh=0,speedRaw=0,totalDistMeters=0,breadcrumbs=[],BREADCRUMB_MAX=400;
var lastSpeedLat=null,lastSpeedLon=null,lastSpeedTime=null,speedSamples=[],SPEED_SAMPLE_SIZE=4;
/* Horizon */
var ahPitch=0,ahRoll=0;
var xrHeadingOffset=0,xrInitialYaw=null;
/* NV */
var nvActive=false,nvStream=null,nvVideo=null,nvCanvas=null,nvCtx=null;
var nvDarkTheme='red',nvLightTheme='cyan',nvBrightSamples=[],NV_SAMPLE_SIZE=8;
var nvCurrentMode='',NV_DARK_THRESH=55,NV_LIGHT_THRESH=90;

window.addEventListener('DOMContentLoaded',function(){
  startClock();startBattery();startGPS();startSysStats();startNetwork();
  startScanLines();startHeading();startDOMWidgets();
  nvCanvas=document.createElement('canvas');nvCanvas.width=32;nvCanvas.height=32;
  nvCtx=nvCanvas.getContext('2d',{willReadFrequently:true});
  if(isIOS)document.getElementById('permBtn').style.display='block';
  addAlert('HUD ONLINE','ok');
});

function startClock(){function tick(){var n=new Date();document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());document.getElementById('date').textContent=DAYS[n.getDay()]+' '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();}tick();setInterval(tick,1000);}
function p(n){return String(n).padStart(2,'0');}

function flashEl(el){if(!el)return;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
var glitchTimers={};
function setVal(id,val){var el=document.getElementById(id);if(!el)return;var strVal=String(val);if(el.textContent===strVal)return;if(glitchTimers[id]){clearInterval(glitchTimers[id]);delete glitchTimers[id];}var target=strVal,len=Math.max(target.length,2),frames=0,maxFrames=8;glitchTimers[id]=setInterval(function(){frames++;if(frames>=maxFrames){clearInterval(glitchTimers[id]);delete glitchTimers[id];el.textContent=target;flashEl(el);return;}var revealed=Math.floor((frames/maxFrames)*len),out='';for(var i=0;i<len;i++){if(i<revealed)out+=target[i]||'';else out+=GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)];}el.textContent=out;},30);}

function startBattery(){if(!navigator.getBattery)return;navigator.getBattery().then(function(bat){function upd(){var prev=batPct;batPct=Math.round(bat.level*100);document.getElementById('batF').style.width=batPct+'%';document.getElementById('batV').textContent=batPct+'%';document.getElementById('batF').className='sf '+(batPct>50?'g':batPct>20?'o':'r');if(batPct!==prev)flashEl(document.getElementById('batV'));if(batPct<20)addAlert('LOW BATTERY '+batPct+'%','warn');}upd();bat.addEventListener('levelchange',upd);});}

function startNetwork(){function upd(){var conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;var label='--',pct=0;if(conn){label=(conn.effectiveType||conn.type||'--').toUpperCase();var map={'slow-2g':15,'2g':30,'3g':65,'4g':90,'wifi':100,'cellular':70};pct=map[conn.effectiveType]||map[conn.type]||50;}else if(navigator.onLine){label='ONLINE';pct=80;}else{label='OFFLINE';pct=0;}document.getElementById('netF').style.width=pct+'%';document.getElementById('netV').textContent=label;}upd();window.addEventListener('online',upd);window.addEventListener('offline',upd);if(navigator.connection)navigator.connection.addEventListener('change',upd);}

function setNvDark(name,btn){nvDarkTheme=name;document.querySelectorAll('[id^="nvd-"]').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');if(nvActive&&nvCurrentMode==='dark')applyThemeNV(nvDarkTheme);}

async function toggleNV(){var btn=document.getElementById('nvBtn'),sub=document.getElementById('nvSub'),statusEl=document.getElementById('nvStatus');if(nvActive){nvActive=false;nvCurrentMode='';nvBrightSamples=[];clearInterval(nvLoopId);nvLoopId=null;if(nvStream){nvStream.getTracks().forEach(function(t){t.stop();});nvStream=null;}if(nvVideo){nvVideo.srcObject=null;nvVideo.remove();nvVideo=null;}btn.classList.remove('active');sub.classList.remove('visible');statusEl.textContent='● STANDBY';statusEl.style.color='';addAlert('AUTO NV OFF','info');return;}try{nvStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:64},height:{ideal:64}}});}catch(e){addAlert('CAM DENIED','warn');return;}nvVideo=document.createElement('video');nvVideo.setAttribute('autoplay','');nvVideo.setAttribute('playsinline','');nvVideo.setAttribute('muted','');nvVideo.muted=true;nvVideo.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0;';document.body.appendChild(nvVideo);nvVideo.srcObject=nvStream;nvVideo.disablePictureInPicture=true;nvVideo.addEventListener('pause',function(){if(nvActive){var p2=nvVideo.play();if(p2&&p2.catch)p2.catch(function(){});}});var playResult=nvVideo.play();if(playResult&&playResult.catch)playResult.catch(function(){});nvActive=true;btn.classList.add('active');sub.classList.add('visible');statusEl.textContent='● WARMING UP';addAlert('AUTO NV ON','ok');var readyWait=0,readyCheck=setInterval(function(){readyWait+=100;if(nvVideo&&nvVideo.readyState>=2){clearInterval(readyCheck);statusEl.textContent='● SENSING';nvLoopId=setInterval(nvSample,900);nvSample();}else if(readyWait>3000){clearInterval(readyCheck);statusEl.textContent='● NO SIGNAL';}},100);}
var nvLoopId=null;
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'&&nvActive&&nvVideo){var p2=nvVideo.play();if(p2&&p2.catch)p2.catch(function(){});setTimeout(nvSample,200);}});
function nvSample(){if(!nvActive||!nvVideo||nvVideo.readyState<2)return;try{nvCtx.drawImage(nvVideo,0,0,32,32);var data=nvCtx.getImageData(0,0,32,32).data;var sum=0,n2=0;for(var i=0;i<data.length;i+=16){sum+=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;n2++;}var lum=n2>0?sum/n2:128;nvBrightSamples.push(lum);if(nvBrightSamples.length>NV_SAMPLE_SIZE)nvBrightSamples.shift();var avg=nvBrightSamples.reduce(function(a,b){return a+b;},0)/nvBrightSamples.length;var pct=Math.round(avg/255*100);var statusEl=document.getElementById('nvStatus');if(avg<NV_DARK_THRESH&&nvCurrentMode!=='dark'){nvCurrentMode='dark';applyThemeNV(nvDarkTheme);statusEl.style.color=THEMES[nvDarkTheme].c;addAlert('NV · NIGHT MODE','warn');}else if(avg>NV_LIGHT_THRESH&&nvCurrentMode!=='light'){nvCurrentMode='light';applyThemeNV(nvLightTheme);statusEl.style.color=THEMES[nvLightTheme].c;addAlert('NV · DAY MODE','info');}statusEl.textContent=(nvCurrentMode==='dark'?'● NIGHT ':nvCurrentMode==='light'?'● DAY ':'● SENSING ')+pct+'%';}catch(e){}}

/* WebGL */
function cSh(g,t,s){var sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
function cPr(g,vs,fs){var v=cSh(g,g.VERTEX_SHADER,vs),f=cSh(g,g.FRAGMENT_SHADER,fs),pr=g.createProgram();g.attachShader(pr,v);g.attachShader(pr,f);g.linkProgram(pr);return pr;}
function m4i(){var m=new Float32Array(16);m[0]=1;m[5]=1;m[10]=1;m[15]=1;return m;}
function m4mul(a,b){var o=new Float32Array(16);for(var i=0;i<4;i++)for(var j=0;j<4;j++){var s=0;for(var k=0;k<4;k++)s+=a[j+k*4]*b[i*4+k];o[i*4+j]=s;}return o;}
function m4t(x,y,z){var m=m4i();m[12]=x;m[13]=y;m[14]=z;return m;}
function m4s(x,y,z){var m=m4i();m[0]=x;m[5]=y;m[10]=z;return m;}
function initXRGL(){prog=cPr(gl,'attribute vec3 aPos;attribute vec2 aUV;uniform mat4 uMVP;varying vec2 vUV;void main(){vUV=aUV;gl_Position=uMVP*vec4(aPos,1.0);}','precision mediump float;varying vec2 vUV;uniform sampler2D uTex;void main(){gl_FragColor=texture2D(uTex,vUV);}');prog.aPos=gl.getAttribLocation(prog,'aPos');prog.aUV=gl.getAttribLocation(prog,'aUV');prog.uMVP=gl.getUniformLocation(prog,'uMVP');prog.uTex=gl.getUniformLocation(prog,'uTex');var verts=new Float32Array([-0.5,-0.5,0,0,1,0.5,-0.5,0,1,1,0.5,0.5,0,1,0,-0.5,0.5,0,0,0]);var inds=new Uint16Array([0,1,2,0,2,3]);vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,verts,gl.STATIC_DRAW);ibo=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,inds,gl.STATIC_DRAW);tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,hudC.width,hudC.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);gl.useProgram(prog);gl.uniform1i(prog.uTex,0);}
function uploadTex(t){if(t-lastUp<33)return;lastUp=t;drawHud2D();gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL,true);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,hudC);if(mirrorOn){mirCtx.clearRect(0,0,mirC.width,mirC.height);mirCtx.drawImage(hudC,0,0,mirC.width,mirC.height);}}
function xrFrame(t,frame){if(!xrSession)return;xrSession.requestAnimationFrame(xrFrame);var pose=frame.getViewerPose(xrRefSpace);if(!pose)return;
  /* Extract heading/pitch/roll from XR pose */
  var pm=pose.transform.matrix;
  var fwdX=-pm[8],fwdY=-pm[9],fwdZ=-pm[10];
  var xrYaw=Math.atan2(fwdX,fwdZ)*180/Math.PI;
  if(xrInitialYaw===null)xrInitialYaw=xrYaw;
  var yawDelta=xrYaw-xrInitialYaw;
  mapHeading=((xrHeadingOffset+yawDelta)%360+360)%360;
  mapHeadingRaw=mapHeading;
  ahPitch=Math.asin(clamp(-fwdY,-1,1))*180/Math.PI;
  ahRoll=Math.atan2(pm[1],pm[5])*180/Math.PI;
  uploadTex(t);gl.bindFramebuffer(gl.FRAMEBUFFER,xrLayer.framebuffer);gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);var stride=5*4;gl.enableVertexAttribArray(prog.aPos);gl.vertexAttribPointer(prog.aPos,3,gl.FLOAT,false,stride,0);gl.enableVertexAttribArray(prog.aUV);gl.vertexAttribPointer(prog.aUV,2,gl.FLOAT,false,stride,3*4);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);var om=m4mul(m4t(0,-0.10,-1.10),m4s(1.35,0.68,1.0));var mm2=m4mul(pose.transform.matrix,om);for(var i=0;i<pose.views.length;i++){var view=pose.views[i],vp=xrLayer.getViewport(view);gl.viewport(vp.x,vp.y,vp.width,vp.height);var mvp=m4mul(view.projectionMatrix,m4mul(view.transform.inverse.matrix,mm2));gl.uniformMatrix4fv(prog.uMVP,false,mvp);gl.drawElements(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0);}}
async function enterXR(){var btn=document.getElementById('xrbtn');if(xrSession){try{await xrSession.end();}catch(_){}return;}if(!navigator.xr){addAlert('WebXR N/A','warn');return;}try{if(!await navigator.xr.isSessionSupported('immersive-ar')){addAlert('AR NOT SUPPORTED','warn');return;}xrSession=await navigator.xr.requestSession('immersive-ar',{requiredFeatures:['local'],optionalFeatures:['local-floor']});btn.textContent='◈ EXIT AR';document.getElementById('themePicker').style.display='none';document.querySelectorAll('#minimapWrap,#compassWrap,#horizonWrap,#speedPanel,#edgeArrowCanvas,.tl,.tr,.bl,.br,.corner,.alerts,#poiPanel').forEach(function(e){e.style.display='none';});document.body.style.background='transparent';gl=document.createElement('canvas').getContext('webgl',{xrCompatible:true,alpha:true,antialias:true,premultipliedAlpha:true});xrLayer=new XRWebGLLayer(xrSession,gl,{alpha:true});xrSession.updateRenderState({baseLayer:xrLayer});try{xrRefSpace=await xrSession.requestReferenceSpace('local-floor');}catch(_){xrRefSpace=await xrSession.requestReferenceSpace('local');}xrHeadingOffset=mapHeading;xrInitialYaw=null;initXRGL();xrSession.addEventListener('end',function(){xrSession=null;xrRefSpace=null;xrLayer=null;document.getElementById('themePicker').style.display='flex';document.querySelectorAll('#minimapWrap,#compassWrap,#horizonWrap,#speedPanel,#edgeArrowCanvas,.tl,.tr,.bl,.br,.corner,.alerts,#poiPanel').forEach(function(e){e.style.display='';});btn.textContent='◈ ENTER AR MODE';});xrSession.requestAnimationFrame(xrFrame);}catch(e){addAlert('XR ERR','warn');}}
