<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quest 3 AR HUD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#000}
#ui h1{color:#00e5ff;font-size:.85rem;letter-spacing:.3em;text-transform:uppercase;margin-bottom:.3rem;text-shadow:0 0 14px #00e5ff88}
#ui p{color:#00e5ff44;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:2rem}
#enterBtn{background:none;border:1px solid #00e5ff55;color:#00e5ff;font-family:'Courier New',monospace;font-size:.65rem;letter-spacing:.2em;padding:.6rem 1.8rem;cursor:pointer;text-transform:uppercase;transition:.2s}
#enterBtn:hover{border-color:#00e5ff;background:#00e5ff14}
#enterBtn:disabled{opacity:.3;cursor:not-allowed}
#msg{margin-top:.8rem;font-size:.5rem;letter-spacing:.12em;color:#00e5ff44;text-transform:uppercase}
canvas#c{display:block;width:100%;height:100%}
</style>
</head>
<body>

<!-- ─── LAUNCH SCREEN ─────────────────────────────────────────── -->
<div id="ui">
  <h1>⬡ AR TACTICAL HUD</h1>
  <p>Quest 3 · immersive-ar · passthrough</p>
  <button id="enterBtn" disabled onclick="enterAR()">◈ ENTER AR</button>
  <div id="msg">checking webxr…</div>
</div>

<!-- Three.js canvas (opaque on desktop for preview, transparent in AR) -->
<canvas id="c"></canvas>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

/* ══════════════════════════════════════════════════════════════════
   ARCHITECTURE NOTE
   ══════════════════════════════════════════════════════════════════
   Mode: immersive-ar (Quest 3 passthrough).
   If immersive-ar is not supported this file says so clearly and
   falls back to a desktop 2-D preview mode — it does NOT silently
   run immersive-vr.

   HUD approach:
     • One offscreen 2-D canvas (hudCvs) sized to XR framebuffer px.
     • Drawn each frame with 2-D context; uploaded to THREE.CanvasTexture.
     • Attached to camera as a PlaneGeometry quad at z = -0.9 m.
     • depthTest:false, depthWrite:false, transparent:true.
     • Plane geometry size is set ONCE to fill the view at z=-0.9 m
       using the BASE fov — it never changes.

   Zoom:
     • Changes camera.fov ONLY (baseFov / zoomFactor).
     • The HUD plane scale / position / canvas size NEVER change.
     • Only the zoom-indicator widget inside the canvas changes.

   AR transparency:
     • renderer alpha:true, autoClear:false.
     • scene.background = null (no skybox, no clear colour).
     • XRWebGLLayer alpha:true.
     • The passthrough video is composited by the Quest OS underneath.
   ══════════════════════════════════════════════════════════════════ */

// ── TUNING ──────────────────────────────────────────────────────
const BASE_FOV          = 75;    // degrees
const HUD_DIST          = 0.9;   // metres from camera
const ZOOM_LEVELS       = [1,2,4,8,10];
const ZOOM_MS           = 220;   // transition duration
const FOV_MIN           = 8;
const FOV_MAX           = 90;
const MAX_HOVER_M       = 40;
const MAX_LOCK_M        = 80;
const OCCL_FRAMES       = 28;
const SMOOTH_Q          = 0.09;  // slerp alpha (zoom stabilisation)
const SMOOTH_P          = 0.06;  // lerp alpha
const BBOX_A            = 0.18;  // screen bbox smoothing
const WEATHER_TTL       = 10*60*1000;
const AQI_TTL           = 30*60*1000;

// HUD logical resolution — drawing uses these coords.
// Physical canvas is LW*DPR × LH*DPR.
const LW = 1024, LH = 576;
const DPR = Math.min(window.devicePixelRatio || 1, 3);

// Colour palette
const C   = '#00e5ff';
const CDM = '#00e5ff55';
const CDX = '#00e5ff28';
const CG  = '#76ff03';
const CW  = '#ff6d00';
const CR  = '#ff1744';

// ── THREE SETUP ─────────────────────────────────────────────────
const canvas3 = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas: canvas3,
  antialias: true,
  alpha: true,           // needed for AR passthrough
  premultipliedAlpha: false,
});
renderer.setPixelRatio(DPR);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.autoClear = false;        // we manually clear only depth
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = null;           // TRANSPARENT — passthrough shows through

const camera = new THREE.PerspectiveCamera(BASE_FOV,
  window.innerWidth/window.innerHeight, 0.05, 200);
camera.position.set(0, 1.6, 0);
scene.add(camera);

// Minimal desktop preview environment (invisible in AR — scene is transparent)
{
  const gridMat = new THREE.LineBasicMaterial({color:0x112233,transparent:true,opacity:0.5});
  scene.add(new THREE.GridHelper(60, 30, 0x0a1f2e, 0x060e16));
  scene.add(new THREE.AmbientLight(0x223344, 1.5));
  const dl = new THREE.DirectionalLight(0x7799bb, 1.2);
  dl.position.set(6,12,4); scene.add(dl);
}

// ── SELECTABLE TARGETS ──────────────────────────────────────────
const selectables = [];
const TDEFS = [
  {name:'ALPHA-1', p:[  0,1.6, -7], g:new THREE.BoxGeometry(1.1,1.1,1.1),       c:0x0d3555},
  {name:'BETA-2',  p:[  4,1.3,-11], g:new THREE.SphereGeometry(.8,18,18),        c:0x35103d},
  {name:'GAMMA-3', p:[ -4,1.9,-15], g:new THREE.CylinderGeometry(.5,.5,2,12),    c:0x0d3515},
  {name:'DELTA-4', p:[  2,.9, -5],  g:new THREE.BoxGeometry(.75,.75,.75),         c:0x2d1e00},
  {name:'OMEGA-5', p:[ -6,1.9,-20], g:new THREE.SphereGeometry(1.1,18,18),       c:0x003344},
];
TDEFS.forEach(d=>{
  const mat = new THREE.MeshStandardMaterial({
    color:d.c, metalness:.6, roughness:.3, emissive:new THREE.Color(0,0,0),
    transparent:true, opacity:.92
  });
  const m = new THREE.Mesh(d.g, mat);
  m.position.set(...d.p); m.userData.n = d.name;
  scene.add(m); selectables.push(m);
});

// ── HUD CANVAS ──────────────────────────────────────────────────
// Physical size = logical * DPR for crispness
const hudCvs = document.createElement('canvas');
hudCvs.width  = LW * DPR;
hudCvs.height = LH * DPR;
const H = hudCvs.getContext('2d', {alpha:true});
// Pre-scale so all draw calls use logical coords
H.scale(DPR, DPR);

const hudTex = new THREE.CanvasTexture(hudCvs);
hudTex.minFilter = THREE.LinearFilter;   // no mipmap blur
hudTex.magFilter = THREE.LinearFilter;
hudTex.generateMipmaps = false;

// HUD plane — parented to camera, FIXED size & position forever
const hudMat = new THREE.MeshBasicMaterial({
  map: hudTex, transparent:true,
  depthTest:false, depthWrite:false,
  side:THREE.DoubleSide,
  blending: THREE.NormalBlending,
});
const hudPlane = new THREE.Mesh(new THREE.PlaneGeometry(1,1), hudMat);
hudPlane.renderOrder = 9999;
camera.add(hudPlane);

// Size plane to exactly fill fov at HUD_DIST — computed ONCE from BASE_FOV
// Never changes when zoom changes. Zoom only touches camera.fov.
(function sizeHudPlane(){
  const aspect = window.innerWidth / window.innerHeight;
  const fovRad = THREE.MathUtils.degToRad(BASE_FOV);
  const h = 2 * HUD_DIST * Math.tan(fovRad/2);
  const w = h * aspect;
  hudPlane.scale.set(w, h, 1);
  hudPlane.position.set(0, 0, -HUD_DIST);
})();

// ── RESIZE ──────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  // Do NOT resize hudPlane — it's fixed
});

// ── RAYCASTER ───────────────────────────────────────────────────
const RC = new THREE.Raycaster();
const _fwd  = new THREE.Vector3();
const _bx   = new THREE.Box3();
const _v    = new THREE.Vector3();

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
const S = {
  // Zoom — ONLY changes camera.fov, nothing else
  zi:0, zf:1, zt:1, zStart:0,

  // Smoothed pose (only active when zoom>1)
  sPos: new THREE.Vector3(),
  sQuat: new THREE.Quaternion(),
  poseOk: false,

  // Targeting
  hover: null,         // THREE.Intersection
  lock:  null,         // THREE.Mesh
  occN:  0,
  bboxS: {x:0,y:0,w:0,h:0},
  bboxOk: false,
  lockLostUntil: 0,

  // Reticle anim
  retR: 13,
  lockAng: 0,

  // Flash
  flashes: {},

  // Env / clock
  lat:null, lon:null,
  area:'', street:'',
  gpsLabel:'● GPS ACQUIRING',
  heading: null,       // smoothed heading deg

  // Weather (all strings, '' = not loaded)
  wTemp:'--°', wCond:'-------', wWind:'-- km/h', wHum:'--%', wSun:'↑-- ↓--',
  wFetched:0,

  // AQI
  aqiVal:'--', aqiLabel:'------', aqiColor:CDM,
  pollenVal:'--', pollenLabel:'------', pollenColor:CDM,
  aqiFetched:0,

  // Speed
  spdKmh:0, odoM:0,
  _spdSamples:[], _lastLL:null, _lastT:null,

  // Breadcrumbs for minimap
  crumbs:[],

  // Input
  prevTrig:false, prevBtnA:false,

  // Scanline
  sweepY:0,

  // XR
  inAR: false,
};

// ══════════════════════════════════════════════════════════════════
//  ZOOM  ← changes ONLY camera.fov
// ══════════════════════════════════════════════════════════════════
function cycleZoom(){
  S.zi = (S.zi+1) % ZOOM_LEVELS.length;
  S.zt = ZOOM_LEVELS[S.zi];
  S.zStart = performance.now();
  flash('zoom');
}

function eio(t){ return t<.5?2*t*t:1-(-2*t+2)**2/2; }

function tickZoom(){
  const t = Math.min(1,(performance.now()-S.zStart)/ZOOM_MS);
  S.zf += (S.zt - S.zf) * eio(t);
  if(t>=1) S.zf = S.zt;
  // Only change FOV — HUD plane is never touched
  camera.fov = THREE.MathUtils.clamp(BASE_FOV/S.zf, FOV_MIN, FOV_MAX);
  camera.updateProjectionMatrix();
}

// ── POSE SMOOTHING (stabilise view at zoom > 1) ─────────────────
function tickSmooth(){
  if(!S.poseOk){
    S.sPos.copy(camera.position);
    S.sQuat.copy(camera.quaternion);
    S.poseOk = true; return;
  }
  if(S.zf > 1.05){
    S.sPos.lerp(camera.position, SMOOTH_P);
    S.sQuat.slerp(camera.quaternion, SMOOTH_Q);
  } else {
    S.sPos.copy(camera.position);
    S.sQuat.copy(camera.quaternion);
  }
}

// ── RAYCAST / HOVER / LOCK ──────────────────────────────────────
function tickRay(){
  _fwd.set(0,0,-1).applyQuaternion(camera.quaternion);
  RC.set(camera.position, _fwd);
  RC.far = MAX_HOVER_M;
  const hits = RC.intersectObjects(selectables,false);
  S.hover = hits.length ? hits[0] : null;

  // Emissive feedback
  selectables.forEach(m=>{
    const tgt = S.lock===m
      ? new THREE.Color(.28,0,0)
      : (S.hover?.object===m ? new THREE.Color(0,.1,.18) : new THREE.Color(0,0,0));
    m.material.emissive.lerp(tgt,.14);
  });

  if(!S.lock) return;

  // Lock validity
  const dist = camera.position.distanceTo(S.lock.position);
  if(dist>MAX_LOCK_M || !scene.getObjectById(S.lock.id)){ dropLock(); return; }

  // Occlusion
  const to = _v.subVectors(S.lock.position, camera.position);
  const len = to.length();
  const oRC = new THREE.Raycaster(camera.position, to.clone().normalize(), .1, len-.3);
  const oh = oRC.intersectObjects(selectables,false);
  const occ = oh.length>0 && oh[0].object!==S.lock;
  S.occN = occ ? S.occN+1 : 0;
  if(S.occN>OCCL_FRAMES) dropLock();
}

function dropLock(){
  S.lock=null; S.occN=0; S.bboxOk=false;
  S.lockLostUntil = performance.now()+2400;
  flash('lockLost',400);
}
function doLock(){
  if(S.lock){ dropLock(); return; }
  if(S.hover){ S.lock=S.hover.object; S.occN=0; S.bboxOk=false; flash('lock'); }
}

// ── BBOX PROJECTION (logical HUD pixels) ────────────────────────
function projectBbox(mesh){
  _bx.setFromObject(mesh);
  const min=_bx.min, max=_bx.max;
  const corners=[
    [min.x,min.y,min.z],[max.x,min.y,min.z],[min.x,max.y,min.z],[max.x,max.y,min.z],
    [min.x,min.y,max.z],[max.x,min.y,max.z],[min.x,max.y,max.z],[max.x,max.y,max.z],
  ];
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9,ok=false;
  corners.forEach(c=>{
    _v.set(c[0],c[1],c[2]).project(camera);
    if(_v.z>1) return;
    const px=(_v.x*.5+.5)*LW, py=(-_v.y*.5+.5)*LH;
    x0=Math.min(x0,px); x1=Math.max(x1,px);
    y0=Math.min(y0,py); y1=Math.max(y1,py);
    ok=true;
  });
  return ok ? {x:x0,y:y0,w:x1-x0,h:y1-y0} : null;
}

function smoothBbox(r){
  if(!S.bboxOk){ S.bboxS={...r}; S.bboxOk=true; return {...r}; }
  const s=S.bboxS;
  s.x+=(r.x-s.x)*BBOX_A; s.y+=(r.y-s.y)*BBOX_A;
  s.w+=(r.w-s.w)*BBOX_A; s.h+=(r.h-s.h)*BBOX_A;
  return {...s};
}

// ── FLASH SYSTEM ─────────────────────────────────────────────────
function flash(k,dur=320){ S.flashes[k]=performance.now()+dur; }
function fAlpha(k){ const e=S.flashes[k]; if(!e) return 0; const r=e-performance.now(); if(r<=0){delete S.flashes[k];return 0;} return r/320; }
function fCol(base,k){ const a=fAlpha(k); if(a<.01) return base; return lerpHex(base,'#ffffff',a*.75); }
function lerpHex(a,b,t){
  const p=s=>parseInt(s.slice(1),16);
  const [ar,ag,ab]=[p(a)>>16&255,p(a)>>8&255,p(a)&255];
  const [br,bg,bb]=[p(b)>>16&255,p(b)>>8&255,p(b)&255];
  const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bv=Math.round(ab+(bb-ab)*t);
  return '#'+[r,g,bv].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ══════════════════════════════════════════════════════════════════
//  DATA: CLOCK / GEO / WEATHER / AQI
//  Logic ported exactly from original hud__3_.html
// ══════════════════════════════════════════════════════════════════
const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function p2(n){return String(n).padStart(2,'0');}

let clockStr='--:--:--', dateStr='--- -- ----';
function tickClock(){
  const n=new Date();
  clockStr=`${p2(n.getHours())}:${p2(n.getMinutes())}:${p2(n.getSeconds())}`;
  dateStr=`${DAYS[n.getDay()]} ${n.getDate()} ${MONS[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(tickClock,500); tickClock();

// Geolocation — ported from original
let geoWatchId=null;
function haversineM(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function startGPS(){
  if(!navigator.geolocation){S.gpsLabel='● GPS UNAVAIL';return;}
  geoWatchId=navigator.geolocation.watchPosition(pos=>{
    const la=pos.coords.latitude,lo=pos.coords.longitude;
    const moved=S.lat==null||Math.abs(la-S.lat)>.0005||Math.abs(lo-S.lon)>.0005;
    const now=Date.now();

    if(S._lastLL){
      const dt=(now-S._lastT)/1000;
      if(dt>.3){
        const d=haversineM(S._lastLL.la,S._lastLL.lo,la,lo);
        const spd=pos.coords.speed!=null?pos.coords.speed*3.6:(d/dt)*3.6;
        S._spdSamples.push(spd); if(S._spdSamples.length>4)S._spdSamples.shift();
        S.spdKmh=S._spdSamples.reduce((a,b)=>a+b)/S._spdSamples.length;
        if(S.spdKmh<.5)S.spdKmh=0;
        if(d>2)S.odoM+=d;
      }
    }
    S._lastLL={la,lo}; S._lastT=now;
    if(!S.crumbs.length||haversineM(S.crumbs[S.crumbs.length-1].la,S.crumbs[S.crumbs.length-1].lo,la,lo)>4){
      S.crumbs.push({la,lo}); if(S.crumbs.length>300)S.crumbs.shift();
    }

    S.lat=la; S.lon=lo;
    S.gpsLabel='● GPS LOCKED';

    const now2=performance.now();
    if(moved||S.wFetched===0) fetchWeather();
    else if(now2-S.wFetched>WEATHER_TTL) fetchWeather();
    if(moved||S.aqiFetched===0) fetchAQI();
    else if(now2-S.aqiFetched>AQI_TTL) fetchAQI();
    if(moved) doReverseGeocode();
  },()=>{S.gpsLabel='● GPS ERROR';},{enableHighAccuracy:true,maximumAge:0,timeout:20000});
}
startGPS();

let _gcTimer;
function doReverseGeocode(){
  clearTimeout(_gcTimer);
  _gcTimer=setTimeout(async()=>{
    if(!S.lat)return;
    try{
      const d=await(await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S.lat.toFixed(4)}&lon=${S.lon.toFixed(4)}&format=json&zoom=16`,{headers:{'Accept-Language':'en'}})).json();
      const a=d.address||{};
      S.street=(a.road||a.pedestrian||a.path||a.footway||'').toUpperCase();
      const city=a.city||a.town||a.village||'';
      const area=a.neighbourhood||a.suburb||a.city_district||city||a.state||'';
      S.area=(area&&city&&area!==city?area+', '+city:area||city||'').toUpperCase();
      flash('geo');
    }catch(_){}
  },3000);
}

// wCode — identical to original
function wCode(c){
  if(c===0)return'CLEAR';if(c<=2)return'PARTLY CLD';if(c<=3)return'OVERCAST';
  if(c<=49)return'FOG';if(c<=59)return'DRIZZLE';if(c<=69)return'RAIN';
  if(c<=79)return'SNOW';if(c<=82)return'SHOWERS';if(c<=99)return'STORM';return'--';
}
function aqiInfo(v){
  if(v<=20)return{l:'GOOD',c:CG};if(v<=40)return{l:'FAIR',c:CG};
  if(v<=60)return{l:'MODERATE',c:CW};if(v<=80)return{l:'POOR',c:CW};
  if(v<=100)return{l:'VERY POOR',c:CR};return{l:'HAZARDOUS',c:CR};
}
function pollenInfo(v){
  if(v<=10)return{l:'LOW',c:CG};if(v<=30)return{l:'MODERATE',c:CW};
  if(v<=50)return{l:'HIGH',c:CW};return{l:'VERY HIGH',c:CR};
}

async function fetchWeather(){
  if(!S.lat)return;
  S.wFetched=performance.now();
  try{
    const d=await(await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${S.lat.toFixed(4)}&longitude=${S.lon.toFixed(4)}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=sunrise,sunset&timezone=auto&forecast_days=1`
    )).json();
    const c=d.current, dd=d.daily;
    S.wTemp=Math.round(c.temperature_2m)+'°C';
    S.wCond=wCode(c.weather_code);
    S.wWind=Math.round(c.wind_speed_10m)+' km/h';
    S.wHum=Math.round(c.relative_humidity_2m)+'%';
    if(dd) S.wSun='↑'+dd.sunrise[0].split('T')[1].slice(0,5)+' ↓'+dd.sunset[0].split('T')[1].slice(0,5);
    flash('weather');
  }catch(_){}
}

async function fetchAQI(){
  if(!S.lat)return;
  S.aqiFetched=performance.now();
  try{
    const d=await(await fetch(
      `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${S.lat.toFixed(4)}&longitude=${S.lon.toFixed(4)}&current=european_aqi,us_aqi,grass_pollen,birch_pollen,mugwort_pollen`
    )).json();
    const c=d.current;
    const aqiV=c.european_aqi!=null?c.european_aqi:c.us_aqi;
    if(aqiV!=null){
      const ai=aqiInfo(aqiV);
      S.aqiVal=Math.round(aqiV)+''; S.aqiLabel=ai.l; S.aqiColor=ai.c;
    }
    const pvs=[{n:'GRASS',v:c.grass_pollen},{n:'BIRCH',v:c.birch_pollen},{n:'MUGWORT',v:c.mugwort_pollen}].filter(x=>x.v!=null);
    if(pvs.length){
      const top=pvs.reduce((a,b)=>b.v>a.v?b:a);
      const pi=pollenInfo(top.v);
      S.pollenVal=Math.round(top.v)+''; S.pollenLabel=pi.l+' '+top.n; S.pollenColor=pi.c;
    }
    flash('aqi');
  }catch(_){}
}

// Heading — ported from original
(function(){
  function apply(e){
    let h=null;
    if(e.webkitCompassHeading!=null) h=e.webkitCompassHeading;
    else if(e.absolute&&e.alpha!=null) h=(360-e.alpha+360)%360;
    if(h==null) return;
    if(S.heading==null) S.heading=h;
    else{ let d=h-S.heading; if(d>180)d-=360; if(d<-180)d+=360; S.heading=(S.heading+d*.1+360)%360; }
  }
  if('ondeviceorientationabsolute' in window) window.addEventListener('deviceorientationabsolute',apply,true);
  window.addEventListener('deviceorientation',apply,true);
})();

// ══════════════════════════════════════════════════════════════════
//  MINIMAP TILES
// ══════════════════════════════════════════════════════════════════
const tileCache={};
const MZ=17;
function lon2tf(lo,z){return(lo+180)/360*(1<<z);}
function lat2tf(la,z){return(1-Math.log(Math.tan(la*Math.PI/180)+1/Math.cos(la*Math.PI/180))/Math.PI)/2*(1<<z);}
function getTile(tx,ty,z){
  const k=`${z}/${tx}/${ty}`;
  if(tileCache[k])return tileCache[k];
  const e={img:new Image(),ok:false};
  e.img.crossOrigin='anonymous';
  e.img.onload=()=>e.ok=true;
  e.img.src=`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`;
  return tileCache[k]=e;
}

// ══════════════════════════════════════════════════════════════════
//  HUD DRAW HELPERS  (all coords in LOGICAL LW×LH pixels)
// ══════════════════════════════════════════════════════════════════
function cls(){ H.clearRect(0,0,LW,LH); }

function ft(sz,w='700'){ H.font=`${w} ${sz}px 'Courier New',monospace`; }

function tx(str,x,y,col=C,al=1,align='left'){
  H.save(); H.globalAlpha=al; H.fillStyle=col;
  H.textAlign=align; H.textBaseline='alphabetic';
  H.fillText(str,x,y); H.restore();
}
function ln(x1,y1,x2,y2,col=C,al=.5,lw=1){
  H.save(); H.globalAlpha=al; H.strokeStyle=col; H.lineWidth=lw;
  H.beginPath(); H.moveTo(x1,y1); H.lineTo(x2,y2); H.stroke(); H.restore();
}
function bgrect(x,y,w,h,col=C){
  H.save();
  H.fillStyle='rgba(0,8,14,.72)';
  H.fillRect(x,y,w,h);
  H.strokeStyle=col; H.globalAlpha=.2; H.lineWidth=.8;
  H.strokeRect(x,y,w,h);
  H.restore();
}

// ── SCANLINES ───────────────────────────────────────────────────
function drawScanlines(){
  // Sparse horizontal lines — low alpha so they don't interfere with passthrough readability
  H.save();
  H.strokeStyle=C; H.lineWidth=.8;
  for(let y=0;y<LH;y+=5){ H.globalAlpha=.015; H.beginPath(); H.moveTo(0,y); H.lineTo(LW,y); H.stroke(); }
  // Sweep
  S.sweepY=(S.sweepY+.7)%(LH+30);
  const sg=H.createLinearGradient(0,S.sweepY-16,0,S.sweepY+16);
  sg.addColorStop(0,'transparent'); sg.addColorStop(.5,C); sg.addColorStop(1,'transparent');
  H.globalAlpha=.045; H.strokeStyle=sg; H.lineWidth=2;
  H.beginPath(); H.moveTo(0,S.sweepY); H.lineTo(LW,S.sweepY); H.stroke();
  H.restore();
}

// ── FRAME CORNERS ───────────────────────────────────────────────
function drawFrame(){
  const m=18,cs=16;
  H.save(); H.strokeStyle=C; H.lineWidth=1.2;
  [[m,m,1,1],[LW-m,m,-1,1],[m,LH-m,1,-1],[LW-m,LH-m,-1,-1]].forEach(([x,y,sx,sy])=>{
    H.globalAlpha=.35;
    H.beginPath(); H.moveTo(x,y+sy*cs); H.lineTo(x,y); H.lineTo(x+sx*cs,y); H.stroke();
  });
  H.restore();
}

// ── COMPASS BAR (top centre) ─────────────────────────────────────
function drawCompass(){
  const bw=320,bh=26,bx=LW/2-bw/2,by=12;
  bgrect(bx,by,bw,bh);
  const hdg=S.heading??0, ppd=bw/70;
  H.save();
  H.beginPath(); H.rect(bx+1,by+1,bw-2,bh-2); H.clip();
  const CARD={0:'N',45:'NE',90:'E',135:'SE',180:'S',225:'SW',270:'W',315:'NW'};
  for(let d=-90;d<=90+360;d+=5){
    let off=(d-hdg)*ppd; if(off<-bw)off+=360*ppd; if(off>bw)off-=360*ppd;
    const px=LW/2+off; if(px<bx-8||px>bx+bw+8) continue;
    const dn=((d%360)+360)%360;
    const isC=CARD[dn]!=null, isM=d%10===0;
    const tH=isC?bh*.55:isM?bh*.3:bh*.12;
    H.globalAlpha=isC?.85:isM?.3:.1;
    H.strokeStyle=dn===0?CG:C; H.lineWidth=isC?1.4:.7;
    H.beginPath(); H.moveTo(px,by+bh); H.lineTo(px,by+bh-tH); H.stroke();
    if(isC){
      ft(9,dn%90===0?'900':'700');
      H.fillStyle=dn===0?CG:C; H.globalAlpha=dn===0?1:.65;
      H.textAlign='center'; H.textBaseline='top'; H.fillText(CARD[dn],px,by+2);
    }
  }
  H.restore();
  // Centre tick + heading label
  H.save(); H.fillStyle=CG; H.globalAlpha=.9;
  H.beginPath(); H.moveTo(LW/2,by+bh+1); H.lineTo(LW/2-3,by+bh+6); H.lineTo(LW/2+3,by+bh+6); H.closePath(); H.fill();
  const hs=S.heading!=null?Math.round(S.heading).toString().padStart(3,'0')+'°':'---°';
  ft(9,'900'); H.textAlign='center';
  const tw=H.measureText(hs).width+8;
  H.fillStyle='rgba(0,8,14,.85)'; H.fillRect(LW/2-tw/2,by+bh+5,tw,13);
  H.strokeStyle=C; H.globalAlpha=.2; H.lineWidth=.8; H.strokeRect(LW/2-tw/2,by+bh+5,tw,13);
  H.globalAlpha=.95; H.fillStyle=CG; H.textBaseline='top'; H.fillText(hs,LW/2,by+bh+6);
  H.restore();
}

// ── TOP-LEFT: CLOCK + DATE + LOCATION ───────────────────────────
// Matches original layout: time big, date small, area, street
function drawClock(){
  const ox=16,oy=16,pw=238,ph=80;
  bgrect(ox,oy,pw,ph);

  // Time — big, same as original "1.6rem Orbitron"
  H.save();
  H.shadowColor=fCol(C,'weather'); H.shadowBlur=8;
  ft(30,'900'); tx(clockStr,ox+10,oy+34,fCol(C,'weather'));
  H.restore();

  ft(10,'700'); tx(dateStr,ox+10,oy+50,C,.62);

  if(S.area){
    H.save(); H.shadowColor=fCol(C,'geo'); H.shadowBlur=6;
    ft(11,'900'); tx(S.area.slice(0,22),ox+10,oy+66,fCol(C,'geo'),.9);
    H.restore();
  } else {
    ft(10,'700'); tx(S.gpsLabel,ox+10,oy+66,
      S.gpsLabel.includes('LOCKED')?CG:S.gpsLabel.includes('ERROR')?CR:CW,.75);
  }
  if(S.street){
    ft(9,'700'); tx(S.street.slice(0,28),ox+10,oy+78,C,.45);
  }

  // Lat/lon tiny

    ft(8,'700');

}

// ── TOP-RIGHT: ZOOM INDICATOR ────────────────────────────────────
// Only a readout — zoom changes camera FOV, not this panel's size
function drawZoom(){
  const pw=148,ph=62,ox=LW-pw-16,oy=16;
  bgrect(ox,oy,pw,ph);

  ft(8,'700'); tx('ZOOM',ox+8,oy+16,C,.55);
  H.save(); H.shadowColor=fCol(C,'zoom'); H.shadowBlur=6;
  ft(26,'900'); tx(`${S.zf.toFixed(1)}×`,ox+pw-8,oy+36,fCol(C,'zoom'),.95,'right');
  H.restore();

  // Log-scale bar
  const bx=ox+8,by=oy+46,bw=pw-16,bh=5;
  H.save();
  H.fillStyle='rgba(255,255,255,.04)'; H.fillRect(bx,by,bw,bh);
  H.strokeStyle=C; H.globalAlpha=.18; H.lineWidth=.8; H.strokeRect(bx,by,bw,bh);
  const ratio=Math.log2(Math.max(S.zf,1))/Math.log2(10);
  H.fillStyle=C; H.globalAlpha=.8; H.fillRect(bx,by,Math.min(ratio,1)*bw,bh);
  // Ticks for each zoom level
  ZOOM_LEVELS.forEach(z=>{
    const tx2=bx+Math.log2(Math.max(z,1))/Math.log2(10)*bw;
    H.strokeStyle=C; H.globalAlpha=.3; H.lineWidth=.7;
    H.beginPath(); H.moveTo(tx2,by-2); H.lineTo(tx2,by+bh+2); H.stroke();
  });
  H.restore();
}

// ── RETICLE (centre) ─────────────────────────────────────────────
function drawReticle(){
  const cx=LW/2, cy=LH/2;
  const hover=S.hover!=null, locked=S.lock!=null;
  const col=locked?CR:hover?CW:C;
  S.retR+=(( hover?18:13)-S.retR)*.1;
  S.lockAng=(S.lockAng+.022)%(Math.PI*2);

  H.save();
  // Dot
  H.fillStyle=col; H.globalAlpha=.92;
  H.beginPath(); H.arc(cx,cy,2,0,Math.PI*2); H.fill();
  // Ring
  H.strokeStyle=col; H.lineWidth=1.4; H.globalAlpha=.7;
  H.beginPath(); H.arc(cx,cy,S.retR,0,Math.PI*2); H.stroke();
  // Cross
  const g=22,gap=S.retR+4;
  H.strokeStyle=col; H.lineWidth=.9; H.globalAlpha=.45;
  H.beginPath();
  H.moveTo(cx-g,cy); H.lineTo(cx-gap,cy); H.moveTo(cx+gap,cy); H.lineTo(cx+g,cy);
  H.moveTo(cx,cy-g); H.lineTo(cx,cy-gap); H.moveTo(cx,cy+gap); H.lineTo(cx,cy+g);
  H.stroke();
  // Lock arcs
  if(locked){
    H.strokeStyle=CR; H.lineWidth=1.8; H.globalAlpha=.85;
    for(let i=0;i<4;i++){
      const a=S.lockAng+i*(Math.PI/2);
      H.beginPath(); H.arc(cx,cy,S.retR+9,a,a+Math.PI*.3); H.stroke();
    }
    // Pulse
    const p=(Math.sin(performance.now()*.005)*.5+.5);
    H.strokeStyle=CR; H.lineWidth=.8; H.globalAlpha=p*.2;
    H.beginPath(); H.arc(cx,cy,S.retR+17,0,Math.PI*2); H.stroke();
  }
  H.restore();
}

// ── TARGET BRACKETS ──────────────────────────────────────────────
function drawTarget(){
  const tgt=S.lock||S.hover?.object;
  if(!tgt) return;
  const raw=projectBbox(tgt);
  if(!raw) return;
  const bbox=S.lock?smoothBbox(raw):raw;
  const locked=!!S.lock;
  const col=locked?CR:CW;
  const dist=camera.position.distanceTo(tgt.position);
  const pad=10, cs=16;
  const bx=bbox.x-pad, by=bbox.y-pad, bw=bbox.w+pad*2, bh=bbox.h+pad*2;
  const bcx=bx+bw/2, bcy=by+bh/2;
  const margin=50;
  const off=bcx<margin||bcx>LW-margin||bcy<margin||bcy>LH-margin;

  if(off){
    // Off-screen edge arrow
    const ang=Math.atan2(bcy-LH/2,bcx-LW/2);
    const ex=LW/2+Math.cos(ang)*(Math.min(LW,LH)/2-54);
    const ey=LH/2+Math.sin(ang)*(Math.min(LW,LH)/2-54);
    H.save(); H.translate(ex,ey); H.rotate(ang);
    H.strokeStyle=CW; H.lineWidth=1.6; H.globalAlpha=.8; H.lineCap='round';
    H.beginPath(); H.moveTo(-10,0); H.lineTo(10,0); H.moveTo(6,-5); H.lineTo(10,0); H.lineTo(6,5); H.stroke();
    H.restore();
    ft(9,'900'); tx(tgt.userData.n,ex,ey-10,CW,.7,'center');
    return;
  }

  // Corner brackets
  H.save(); H.strokeStyle=col; H.lineWidth=locked?2:1.4; H.globalAlpha=locked?.92:.7; H.lineCap='round';
  [[bx,by,1,1],[bx+bw,by,-1,1],[bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]].forEach(([x,y,sx,sy])=>{
    H.beginPath(); H.moveTo(x,y+sy*cs); H.lineTo(x,y); H.lineTo(x+sx*cs,y); H.stroke();
  });
  H.restore();

  // Labels
  ft(11,'900');
  tx(tgt.userData.n,bx,by-11,col,locked?1:.85);
  tx(`${dist.toFixed(1)}m`,bx+bw,by-11,col,locked?.88:.7,'right');

  if(locked){
    ft(9,'900'); tx('◆ LOCKED',bx+bw/2,by-24,CR,.9,'center');
    // Scan line
    const sy2=by+((performance.now()*.0015*40)%bh);
    H.save();
    const sg=H.createLinearGradient(0,sy2-2,0,sy2+2);
    sg.addColorStop(0,'rgba(255,68,68,0)'); sg.addColorStop(.5,'rgba(255,68,68,.22)'); sg.addColorStop(1,'rgba(255,68,68,0)');
    H.fillStyle=sg; H.fillRect(bx,sy2-2,bw,4); H.restore();
  }
}

// ── LOCK LOST NOTICE ─────────────────────────────────────────────
function drawLockLost(){
  if(performance.now()>=S.lockLostUntil) return;
  const a=Math.min(1,(S.lockLostUntil-performance.now())/500);
  ft(13,'900'); tx('TARGET LOST',LW/2,LH/2-66,CR,a*.9,'center');
}

// ── BOTTOM-RIGHT: WEATHER / AQI / POLLEN ────────────────────────
// Layout identical to original hud__3_.html .br panel
function drawWeather(){
  const pw=198,ph=148,ox=LW-pw-16,oy=LH-ph-16;
  bgrect(ox,oy,pw,ph);
  let y=oy+18;
  const rr=(label,val,col2=C,sz=11,al=.88)=>{
    ft(8,'700'); tx(label,ox+8,y,C,.5);
    ft(sz,'900'); tx(val,ox+pw-8,y,fCol(col2,'weather'),al,'right');
    y+=16;
  };

  // Temp big — matches original "1.4rem"
  H.save(); H.shadowColor=fCol(C,'weather'); H.shadowBlur=7;
  ft(22,'900'); tx(S.wTemp,ox+pw-8,oy+24,fCol(C,'weather'),.95,'right');
  H.restore();
  ft(10,'900'); tx(S.wCond,ox+pw-8,oy+38,C,.8,'right');
  y=oy+56;
  rr('WIND',S.wWind);
  rr('HUM',S.wHum);
  ft(8,'700'); tx(S.wSun,ox+pw-8,y,C,.45,'right'); y+=14;

  // Divider + AQI + pollen  (same as original envDivider / aqiRow / pollenRow)
  const hasEnv=S.aqiVal!=='--'||S.pollenVal!=='--';
  if(hasEnv){
    ln(ox+6,y,ox+pw-6,y,C,.12); y+=10;
    if(S.aqiVal!=='--'){
      ft(8,'700'); tx('AQI',ox+8,y,C,.5);
      ft(11,'900');
      tx(S.aqiVal,ox+pw-8-H.measureText(S.aqiLabel).width-10,y,fCol(S.aqiColor,'aqi'),.95,'right');
      tx(S.aqiLabel,ox+pw-8,y,fCol(S.aqiColor,'aqi'),.85,'right');
      y+=16;
    }
    if(S.pollenVal!=='--'){
      ft(8,'700'); tx('POLLEN',ox+8,y,C,.5);
      ft(9,'900'); tx(S.pollenLabel,ox+pw-8,y,fCol(S.pollenColor,'aqi'),.9,'right');
    }
  }
}

// ── BOTTOM-LEFT: MINIMAP ─────────────────────────────────────────
function drawMinimap(){
  const R=58, mcx=16+R, mcy=LH-16-R;
  H.save();
  H.beginPath(); H.arc(mcx,mcy,R,0,Math.PI*2); H.clip();
  H.fillStyle='rgba(0,8,14,.82)'; H.fillRect(mcx-R,mcy-R,R*2,R*2);

  if(S.lat!=null){
    const hdg=S.heading??0, hr=hdg*Math.PI/180;
    const RANGE=200, ppm=R/RANGE;
    const txf=lon2tf(S.lon,MZ), tyf=lat2tf(S.lat,MZ);
    const txi=Math.floor(txf), tyi=Math.floor(tyf);
    const fx=txf-txi, fy=tyf-tyi;
    const mpp=156543.03392*Math.cos(S.lat*Math.PI/180)/(1<<MZ);
    const ts2=256*(mpp/ppm/256)*R/RANGE*256;

    H.save(); H.translate(mcx,mcy); H.rotate(-hr); H.globalAlpha=.3;
    for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
      const t=getTile(txi+dx,tyi+dy,MZ);
      if(t.ok) H.drawImage(t.img,(dx-fx)*ts2-ts2/2,(dy-fy)*ts2-ts2/2,ts2,ts2);
    }
    // Breadcrumbs
    if(S.crumbs.length>1){
      H.strokeStyle=CG; H.lineWidth=1.8; H.globalAlpha=.5; H.lineCap='round'; H.beginPath();
      S.crumbs.forEach((c,i)=>{
        const d=(c.lo-S.lon)*111320*Math.cos(S.lat*Math.PI/180)*ppm;
        const e=-(c.la-S.lat)*111320*ppm;
        i===0?H.moveTo(d,e):H.lineTo(d,e);
      });
      H.stroke();
    }
    H.restore();
  }

  H.restore(); // end clip

  // Grid rings
  H.save(); H.strokeStyle=C; H.lineWidth=.6;
  [.4,.7,1].forEach(f=>{ H.globalAlpha=.07; H.beginPath(); H.arc(mcx,mcy,R*f,0,Math.PI*2); H.stroke(); });
  // Cross hairs
  H.globalAlpha=.08; H.lineWidth=.5;
  H.beginPath(); H.moveTo(mcx-R,mcy); H.lineTo(mcx+R,mcy); H.stroke();
  H.beginPath(); H.moveTo(mcx,mcy-R); H.lineTo(mcx,mcy+R); H.stroke();
  H.restore();

  // Cardinals
  const hdg2=S.heading??0;
  const CARD2=[{l:'N',a:0,c:CG},{l:'E',a:90,c:C},{l:'S',a:180,c:C},{l:'W',a:270,c:C}];
  H.save(); ft(8,'900'); H.textAlign='center'; H.textBaseline='middle';
  CARD2.forEach(({l,a,c})=>{
    const ang=(a-hdg2)*Math.PI/180,r=R-8;
    H.fillStyle=c; H.globalAlpha=l==='N'?1:.4;
    H.fillText(l,mcx+Math.sin(ang)*r,mcy-Math.cos(ang)*r);
  });
  H.restore();

  // Player dot
  H.save(); H.fillStyle='#fff'; H.globalAlpha=.9; H.beginPath(); H.arc(mcx,mcy,3,0,Math.PI*2); H.fill();
  H.fillStyle=C; H.globalAlpha=1; H.beginPath(); H.arc(mcx,mcy,1.8,0,Math.PI*2); H.fill();
  H.restore();

  // Border
  H.save(); H.strokeStyle=C; H.lineWidth=1.2; H.globalAlpha=.4;
  H.beginPath(); H.arc(mcx,mcy,R,0,Math.PI*2); H.stroke(); H.restore();

  // HDG label + speed
  const hdgS=S.heading!=null?`HDG ${Math.round(S.heading).toString().padStart(3,'0')}°`:'HDG ---°';
  ft(8,'700'); tx(hdgS,mcx,mcy+R+11,C,.5,'center');
  H.save(); H.shadowColor=C; H.shadowBlur=5;
  ft(15,'900'); tx(S.spdKmh.toFixed(1),mcx,mcy+R+26,C,.8,'center');
  H.restore();
  ft(7,'700'); tx('KM/H',mcx,mcy+R+36,C,.35,'center');
}

// ── FULL FRAME ───────────────────────────────────────────────────
function drawHUD(){
  cls();
  drawScanlines();
  drawFrame();
  drawCompass();
  drawClock();
  drawZoom();
  drawMinimap();
  drawWeather();
  drawTarget();
  drawReticle();
  drawLockLost();
  hudTex.needsUpdate=true;
}

// ══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════════
let frameN=0;
renderer.setAnimationLoop((time,frame)=>{
  frameN++;
  tickZoom();
  tickSmooth();
  if(frameN%2===0) tickRay();

  // Animate targets (desktop/AR alike)
  TDEFS.forEach((d,i)=>{
    selectables[i].rotation.y+=.003*(i%2===0?1:-1);
    selectables[i].position.y=d.p[1]+Math.sin(time*.001+i*.8)*.025;
  });

  drawHUD();

  if(S.inAR && frame) handleXRInput(frame);

  // In AR: clear only depth, let passthrough composite background
  renderer.clear(false,true,false);
  renderer.render(scene,camera);
});

// ══════════════════════════════════════════════════════════════════
//  XR CONTROLLER INPUT
// ══════════════════════════════════════════════════════════════════
function handleXRInput(frame){
  const session=renderer.xr.getSession();
  if(!session) return;
  let trig=false,btnA=false;
  for(const src of session.inputSources){
    if(!src.gamepad) continue;
    if(src.gamepad.buttons[0]?.pressed) trig=true;
    if(src.gamepad.buttons[4]?.pressed||src.gamepad.buttons[2]?.pressed) btnA=true;
  }
  if(trig&&!S.prevTrig) doLock();
  if(btnA&&!S.prevBtnA) cycleZoom();
  S.prevTrig=trig; S.prevBtnA=btnA;
}

// ══════════════════════════════════════════════════════════════════
//  AR SESSION — immersive-ar ONLY
//  If not supported: says so clearly, does NOT fall back to VR.
// ══════════════════════════════════════════════════════════════════
const enterBtn=document.getElementById('enterBtn');
const msgEl=document.getElementById('msg');
const uiEl=document.getElementById('ui');

(async()=>{
  if(!navigator.xr){
    msgEl.textContent='webxr not available in this browser'; return;
  }
  const arOK=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(arOK){
    enterBtn.disabled=false;
    msgEl.textContent='quest 3 ready · right trigger=lock · a=zoom · z/l on keyboard';
  } else {
    enterBtn.disabled=true;
    msgEl.textContent=
      '⚠ immersive-ar not supported. running desktop 2-d preview only. '+
      'on quest 3: open in browser, enable passthrough in xr settings.';
  }
})();

window.enterAR=async function(){
  if(!navigator.xr||!await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false)){
    msgEl.textContent='⚠ immersive-ar not supported on this device/browser. NOT falling back to VR.';
    return;
  }
  try{
    const session=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local'],
      optionalFeatures:['local-floor','hand-tracking'],
    });

    // Resize HUD canvas to match XR framebuffer for max crispness
    session.addEventListener('visibilitychange',()=>{});
    session.requestAnimationFrame((_,fr)=>{
      if(!fr) return;
      const bl=session.renderState.baseLayer;
      if(bl){
        const fw=bl.framebufferWidth, fh=bl.framebufferHeight;
        if(fw&&fh){
          hudCvs.width=fw; hudCvs.height=fh;
          H.resetTransform();
          // Keep drawing in logical LW×LH coords
          H.scale(fw/LW, fh/LH);
          hudTex.needsUpdate=true;
        }
      }
    });

    await renderer.xr.setSession(session);
    S.inAR=true;
    uiEl.style.display='none';

    session.addEventListener('end',()=>{
      S.inAR=false;
      uiEl.style.display='flex';
      enterBtn.textContent='◈ ENTER AR';
    });
    enterBtn.textContent='◈ EXIT AR';

  }catch(err){
    msgEl.textContent='ar session error: '+err.message;
    console.error(err);
  }
};

// Keyboard (desktop preview)
window.addEventListener('keydown',e=>{
  if(e.key==='z'||e.key==='Z') cycleZoom();
  if(e.key==='l'||e.key==='L') doLock();
});

// Resize
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  // HUD plane and canvas do NOT resize on window resize — only on XR framebuffer
});

</script>
</body>
</html>
