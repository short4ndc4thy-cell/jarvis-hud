<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
body.theme-cyan{--c:#00e5ff;--glow:0 0 10px rgba(0,229,255,.6)}body.theme-green{--c:#76ff03;--glow:0 0 10px rgba(118,255,3,.6)}body.theme-amber{--c:#ffb300;--glow:0 0 10px rgba(255,179,0,.6)}body.theme-red{--c:#ff1744;--glow:0 0 10px rgba(255,23,68,.6)}body.theme-white{--c:#e0e0e0;--glow:0 0 8px rgba(220,220,220,.4)}
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100vw;height:100vh;overflow:hidden;background:transparent}body{color:var(--c);font-family:'Share Tech Mono',monospace}
.corner{position:fixed;width:32px;height:32px;border-color:var(--c);opacity:.4;border-style:solid;z-index:10}.corner.tl{top:14px;left:14px;border-width:1.5px 0 0 1.5px}.corner.tr{top:14px;right:14px;border-width:1.5px 1.5px 0 0}.corner.bl{bottom:14px;left:14px;border-width:0 0 1.5px 1.5px}.corner.br{bottom:14px;right:14px;border-width:0 1.5px 1.5px 0}
.tl{position:fixed;top:18px;left:18px;display:flex;flex-direction:column;gap:4px;z-index:10}.clock{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:.08em;line-height:1}.date{font-size:.7rem;font-weight:700;color:var(--c);opacity:.7;letter-spacing:.15em}.area{font-size:.72rem;font-weight:900;color:var(--c);letter-spacing:.12em;margin-top:2px;text-shadow:var(--glow)}.street{font-size:.62rem;font-weight:700;color:var(--c);opacity:.7;letter-spacing:.08em}.area.updating{animation:pulse-text .6s ease}@keyframes pulse-text{0%{opacity:1;text-shadow:0 0 20px var(--c),0 0 40px var(--c)}50%{opacity:.4}100%{opacity:1;text-shadow:var(--glow)}}
.tr{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;z-index:10}.stat{display:flex;align-items:center;gap:7px}.slbl{font-size:.62rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.85;letter-spacing:.15em}.sbar{width:64px;height:4px;background:rgba(255,255,255,.05);border:1px solid var(--c);overflow:hidden}.sf{height:100%;transition:width 1s ease}.sf.g{background:#76ff03;box-shadow:0 0 6px rgba(118,255,3,.5)}.sf.c{background:var(--c);box-shadow:0 0 4px var(--c)}.sf.o{background:#ff6d00}.sf.r{background:#ff1744}.sval{font-size:.62rem;font-weight:900;color:var(--c);min-width:28px;text-align:right;font-family:'Orbitron',monospace}
.sys-row{font-size:.6rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);display:flex;gap:5px;align-items:center;justify-content:flex-end}.sys-lbl{opacity:.7}
.bl{position:fixed;bottom:18px;left:18px;display:flex;flex-direction:column;gap:3px;z-index:10}.loc-row{display:flex;gap:6px;align-items:baseline}.lloc{font-size:.62rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.8;letter-spacing:.14em;width:28px}.lval{font-size:.68rem;font-weight:700;color:var(--c);letter-spacing:.03em}
.gps-status{font-size:.58rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.14em;margin-top:2px}.gps-status.acquiring{color:#ff6d00;animation:blink-acq 1.2s ease-in-out infinite}.gps-status.locked{color:#76ff03}.gps-status.denied{color:#ff1744}@keyframes blink-acq{0%,100%{opacity:1}50%{opacity:.3}}
#poiPanel{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:3px;max-width:210px}.poi-hdr{font-size:.5rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.2em;color:var(--c);opacity:.6;margin-bottom:2px}.poi-row{font-size:.58rem;font-weight:700;color:var(--c);letter-spacing:.04em;display:flex;gap:5px;align-items:baseline;opacity:.95}.poi-dist{opacity:.65;min-width:40px;font-weight:900}
.br{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;z-index:10}.temp{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:var(--c);text-shadow:var(--glow)}.cond{font-size:.68rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.9;letter-spacing:.16em}.wrow{font-size:.64rem;font-weight:900;font-family:'Orbitron',monospace;color:var(--c);opacity:.85;display:flex;gap:6px;align-items:center}.wval{opacity:1}.sunrow{font-size:.56rem;font-weight:700;color:var(--c);opacity:.55}.divider{width:100%;height:1px;background:var(--c);opacity:.15;margin:2px 0}
.flash{animation:flash-val .7s ease}@keyframes flash-val{0%{opacity:1;filter:brightness(3)}40%{opacity:.5}100%{opacity:1;filter:brightness(1)}}
#scanLines{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:50;opacity:1}#themeSweep{position:fixed;top:0;left:-100vw;width:100vw;height:100vh;pointer-events:none;z-index:60;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);transition:none}#themeSweep.sweeping{animation:sweep-anim .45s ease-out forwards}@keyframes sweep-anim{0%{left:-100vw}100%{left:100vw}}
#gpsRipple{position:fixed;bottom:36px;left:18px;width:0;height:0;pointer-events:none;z-index:15}.ripple-ring{position:absolute;border-radius:50%;border:1.5px solid var(--c);animation:ripple-out .9s ease-out forwards;transform:translate(-50%,-50%)}@keyframes ripple-out{0%{width:0;height:0;opacity:.9}100%{width:120px;height:120px;opacity:0}}
#threatPanel{margin-top:4px}.threat-hdr{font-size:.5rem;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:.2em;color:var(--c);opacity:.5}.threat-val{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:900;letter-spacing:.1em;margin-top:1px}.threat-bar-wrap{width:90px;height:3px;background:rgba(255,255,255,.06);border:1px solid var(--c);overflow:hidden;margin-top:2px;opacity:.6}.threat-bar-fill{height:100%;transition:width .8s ease}.threat-sub{font-size:.48rem;font-weight:700;color:var(--c);opacity:.5;letter-spacing:.1em;margin-top:2px}
.alerts{position:fixed;top:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;align-items:center;z-index:20;pointer-events:none}.alert{font-size:.52rem;font-weight:700;letter-spacing:.16em;padding:.15rem .55rem;border:1px solid;text-transform:uppercase;animation:alert-in .25s ease both}.alert.ok{border-color:rgba(118,255,3,.4);color:#76ff03}.alert.warn{border-color:rgba(255,109,0,.45);color:#ff6d00}.alert.info{border-color:var(--c);color:var(--c);opacity:.85}.alert.danger{border-color:rgba(255,23,68,.45);color:#ff1744}@keyframes alert-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
#minimapWrap{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:12;pointer-events:none}#minimapCanvas{display:block}.mm-heading-lbl{font-family:'Orbitron',monospace;font-size:.5rem;font-weight:900;color:var(--c);letter-spacing:.2em;text-align:center;margin-top:4px;opacity:.6}
#compassWrap{position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none}#compassCanvas{display:block}
#horizonWrap{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:5;pointer-events:none;opacity:.7}#horizonCanvas{display:block}
#edgeArrowCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:11}
#speedPanel{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:12;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:2px}.spd-val{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:.05em;line-height:1}.spd-unit{font-family:'Orbitron',monospace;font-size:.42rem;font-weight:900;color:var(--c);opacity:.5;letter-spacing:.22em}.odo-row{display:flex;gap:10px;align-items:center}.odo-lbl{font-family:'Orbitron',monospace;font-size:.44rem;font-weight:900;color:var(--c);opacity:.5;letter-spacing:.18em}.odo-val{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;color:var(--c);opacity:.8;letter-spacing:.08em}
#themePicker{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100;align-items:center}.tpBtn{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.18);cursor:pointer;transition:transform .15s,border-color .15s}.tpBtn:hover,.tpBtn.active{transform:scale(1.4);border-color:rgba(255,255,255,.7)}.tpBtn.tc{background:#00e5ff}.tpBtn.tg{background:#76ff03}.tpBtn.ta{background:#ffb300}.tpBtn.tr2{background:#ff1744}.tpBtn.tw{background:#ddd}
#xrbtn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:transparent;border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.22em;padding:.4rem .9rem;cursor:pointer;text-transform:uppercase;z-index:100;text-shadow:var(--glow);transition:all .2s;opacity:.75}#xrbtn:hover{opacity:1;background:var(--c);color:#000}
#permBtn{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.22em;padding:.7rem 1.5rem;cursor:pointer;text-transform:uppercase;z-index:9999;text-shadow:var(--glow)}
#hud2d{display:none}#hudMirror{position:fixed;right:10px;bottom:10px;width:180px;height:90px;border:1px solid rgba(0,229,255,.18);display:none;z-index:10000}
#nvPanel{position:fixed;bottom:114px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:100}#nvBtn{background:transparent;border:1px solid var(--c);color:var(--c);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.2em;padding:.3rem .8rem;cursor:pointer;text-transform:uppercase;text-shadow:var(--glow);transition:all .2s;opacity:.65}#nvBtn:hover{opacity:1}#nvBtn.active{opacity:1;background:rgba(255,255,255,.06);border-color:var(--c);box-shadow:0 0 12px var(--c),inset 0 0 8px rgba(255,255,255,.04)}#nvSub{display:none;flex-direction:column;align-items:center;gap:5px}#nvSub.visible{display:flex}.nv-row{display:flex;align-items:center;gap:7px}.nv-lbl{font-family:'Orbitron',monospace;font-size:.42rem;font-weight:900;color:var(--c);opacity:.6;letter-spacing:.18em;width:32px;text-align:right}.nvDot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.18);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}.nvDot:hover,.nvDot.active{transform:scale(1.35);border-color:rgba(255,255,255,.8);box-shadow:0 0 6px currentColor}.nvDot.nv-red{background:#ff1744;color:#ff1744}.nvDot.nv-amber{background:#ffb300;color:#ffb300}.nvDot.nv-cyan{background:#00e5ff;color:#00e5ff}.nvDot.nv-green{background:#76ff03;color:#76ff03}#nvStatus{font-family:'Orbitron',monospace;font-size:.4rem;letter-spacing:.16em;color:var(--c);opacity:.45;margin-top:1px}
</style>
</head>
<body class="theme-cyan">
<canvas id="hudMirror" width="180" height="90"></canvas><canvas id="hud2d" width="900" height="450"></canvas><canvas id="scanLines"></canvas><div id="themeSweep"></div><div id="gpsRipple"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="tl"><div class="clock" id="clock">00:00:00</div><div class="date" id="date">-- --- ----</div><div class="area" id="area">LOCATING...</div><div class="street" id="street"></div></div>
<div class="tr"><div class="stat"><div class="slbl">BAT</div><div class="sbar"><div class="sf g" id="batF" style="width:85%"></div></div><div class="sval" id="batV">85%</div></div><div class="stat"><div class="slbl">NET</div><div class="sbar"><div class="sf c" id="netF" style="width:0%"></div></div><div class="sval" id="netV">--</div></div><div class="sys-row"><span class="sys-lbl">CPU</span><span id="cpuV">--%</span></div><div class="sys-row"><span class="sys-lbl">MEM</span><span id="memV">-- MB</span></div></div>
<div class="bl"><div class="loc-row"><div class="lloc">LAT</div><div class="lval" id="latV">--</div></div><div class="loc-row"><div class="lloc">LON</div><div class="lval" id="lonV">--</div></div><div class="gps-status acquiring" id="gpsS">● GPS ACQUIRING</div><div id="threatPanel" style="display:none"><div class="threat-hdr">THREAT LEVEL</div><div class="threat-val" id="threatVal">--</div><div class="threat-bar-wrap"><div class="threat-bar-fill" id="threatBar" style="width:0%"></div></div><div class="threat-sub" id="threatSub">ACQUIRING DATA</div></div></div>
<div id="poiPanel"></div>
<div class="br"><div class="temp" id="wTemp">--°</div><div class="cond" id="wCond">--</div><div class="wrow"><span>WIND</span><span class="wval" id="wWind">--</span><span>km/h</span></div><div class="wrow"><span>HUM</span><span class="wval" id="wHum">--%</span></div><div class="sunrow" id="wSun">↑ -- · ↓ --</div><div class="divider" id="envDivider" style="display:none"></div><div class="wrow" id="aqiRow" style="display:none"><span>AQI</span><span class="wval" id="wAqi">--</span><span id="wAqiLbl"></span></div><div class="wrow" id="pollenRow" style="display:none"><span>POLLEN</span><span class="wval" id="wPollen">--</span><span id="wPollenLbl"></span></div></div>
<div class="alerts" id="alerts"></div>
<div id="compassWrap"><canvas id="compassCanvas" width="320" height="32"></canvas></div>
<div id="horizonWrap"><canvas id="horizonCanvas" width="200" height="120"></canvas></div>
<canvas id="edgeArrowCanvas"></canvas>
<div id="speedPanel"><div class="spd-val" id="spdVal">0.0</div><div class="spd-unit">KM/H</div><div class="odo-row"><span class="odo-lbl">ODO</span><span class="odo-val" id="odoVal">0.000 km</span></div></div>
<div id="minimapWrap"><canvas id="minimapCanvas" width="160" height="160"></canvas><div class="mm-heading-lbl" id="mmHeadingLbl">HDG ---°</div></div>
<div id="nvPanel"><div id="nvSub"><div class="nv-row"><span class="nv-lbl">DARK</span><div class="nvDot nv-red active" id="nvd-red" title="Red" onclick="setNvDark('red',this)"></div><div class="nvDot nv-amber" id="nvd-amber" title="Amber" onclick="setNvDark('amber',this)"></div></div><div class="nv-row"><span class="nv-lbl">LIGHT</span><div class="nvDot nv-cyan active" id="nvl-cyan" title="Cyan" onclick="setNvLight('cyan',this)"></div><div class="nvDot nv-green" id="nvl-green" title="Green" onclick="setNvLight('green',this)"></div></div><div id="nvStatus">● STANDBY</div></div><button id="nvBtn" onclick="toggleNV()">◈ AUTO NV</button></div>
<div id="themePicker"><div class="tpBtn tc active" onclick="setTheme('cyan',this)" title="Cyan"></div><div class="tpBtn tg" onclick="setTheme('green',this)" title="Green"></div><div class="tpBtn ta" onclick="setTheme('amber',this)" title="Amber"></div><div class="tpBtn tr2" onclick="setTheme('red',this)" title="Red"></div><div class="tpBtn tw" onclick="setTheme('white',this)" title="White"></div></div>
<button id="xrbtn" onclick="enterXR()">◈ ENTER AR MODE</button>
<button id="permBtn" onclick="requestPerms()">◈ ENABLE SENSORS</button>
<script src="hud.js"></script>
</body>
</html>
