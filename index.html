<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --c:#00e5ff;--c2:#ff6d00;--c3:#76ff03;--cr:#ff1744;
  --glow:0 0 10px rgba(0,229,255,.6);
  --glow3:0 0 8px rgba(118,255,3,.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;overflow:hidden;background:transparent;}
body{color:var(--c);font-family:'Share Tech Mono',monospace;}

/* ── CORNERS ── */
.corner{position:fixed;width:32px;height:32px;border-color:rgba(0,229,255,.4);border-style:solid;z-index:10;transition:opacity .4s;}
.corner.tl{top:14px;left:14px;border-width:1.5px 0 0 1.5px;}
.corner.tr{top:14px;right:14px;border-width:1.5px 1.5px 0 0;}
.corner.bl{bottom:14px;left:14px;border-width:0 0 1.5px 1.5px;}
.corner.br{bottom:14px;right:14px;border-width:0 1.5px 1.5px 0;}

/* ── TOP LEFT: time + location ── */
.tl{position:fixed;top:18px;left:18px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.clock{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:.08em;line-height:1;}
.date{font-size:.66rem;color:rgba(0,229,255,.5);letter-spacing:.15em;}
.area{font-size:.72rem;color:var(--c);letter-spacing:.12em;margin-top:2px;text-shadow:var(--glow);transition:color .4s;}
.street{font-size:.58rem;color:rgba(0,229,255,.6);letter-spacing:.08em;margin-top:1px;}
.area.updating{animation:pulse-text .6s ease;}
@keyframes pulse-text{
  0%{opacity:1;text-shadow:0 0 20px rgba(0,229,255,1),0 0 40px rgba(0,229,255,.6);}
  50%{opacity:.4;}
  100%{opacity:1;text-shadow:var(--glow);}
}

/* ── TOP RIGHT: battery + wifi ── */
.tr{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;z-index:10;}
.stat{display:flex;align-items:center;gap:7px;}
.slbl{font-size:.46rem;color:rgba(0,229,255,.4);letter-spacing:.15em;}
.sbar{width:64px;height:3px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15);overflow:hidden;position:relative;}
.sf{height:100%;transition:width 1s ease;}
.sf.g{background:var(--c3);box-shadow:0 0 6px rgba(118,255,3,.5);}
.sf.c{background:var(--c);box-shadow:0 0 6px rgba(0,229,255,.4);}
.sf.o{background:var(--c2);}
.sf.r{background:var(--cr);}
.sval{font-size:.5rem;color:rgba(0,229,255,.8);min-width:28px;text-align:right;transition:color .4s;}

/* ── BOTTOM LEFT: GPS ── */
.bl{position:fixed;bottom:18px;left:18px;display:flex;flex-direction:column;gap:3px;z-index:10;}
.loc-row{display:flex;gap:6px;align-items:baseline;}
.lloc{font-size:.5rem;color:rgba(0,229,255,.35);letter-spacing:.14em;width:20px;}
.lval{font-size:.66rem;color:var(--c);letter-spacing:.03em;transition:color .3s;}
.gps-status{font-size:.54rem;letter-spacing:.14em;margin-top:2px;transition:color .4s;}
.gps-status.acquiring{color:var(--c2);animation:blink-acq 1.2s ease-in-out infinite;}
.gps-status.locked{color:var(--c3);}
.gps-status.denied{color:var(--cr);}
@keyframes blink-acq{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ── BOTTOM RIGHT: weather ── */
.br{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;z-index:10;}
.temp{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:var(--c);text-shadow:var(--glow);transition:color .4s;}
.cond{font-size:.6rem;color:rgba(0,229,255,.5);letter-spacing:.16em;}
.wrow{font-size:.55rem;color:rgba(0,229,255,.4);display:flex;gap:6px;align-items:center;}
.wval{color:rgba(0,229,255,.85);transition:color .3s;}
.sunrow{font-size:.5rem;color:rgba(0,229,255,.3);}
.divider{width:100%;height:1px;background:rgba(0,229,255,.12);margin:2px 0;}

/* value-change pulse — applied via JS */
.flash{animation:flash-val .7s ease;}
@keyframes flash-val{
  0%{opacity:1;filter:brightness(3);}
  40%{opacity:.5;}
  100%{opacity:1;filter:brightness(1);}
}

/* AQI / pollen colour coding handled inline */

/* ── ALERTS ── */
.alerts{position:fixed;top:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;align-items:center;z-index:20;pointer-events:none;}
.alert{font-size:.48rem;letter-spacing:.16em;padding:.15rem .55rem;border:1px solid;text-transform:uppercase;animation:alert-in .25s ease both;}
.alert.ok  {border-color:rgba(118,255,3,.4);color:var(--c3);}
.alert.warn{border-color:rgba(255,109,0,.45);color:var(--c2);}
.alert.info{border-color:rgba(0,229,255,.35);color:var(--c);}
.alert.danger{border-color:rgba(255,23,68,.45);color:var(--cr);}
@keyframes alert-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

/* ── AR BUTTON ── */
#xrbtn{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:transparent;border:1px solid rgba(0,229,255,.4);color:var(--c);
  font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.22em;
  padding:.4rem .9rem;cursor:pointer;text-transform:uppercase;z-index:100;
  pointer-events:all;text-shadow:var(--glow);transition:background .2s;
}
#xrbtn:hover{background:rgba(0,229,255,.08);}

/* iOS perm */
#permBtn{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85);border:1px solid var(--c);color:var(--c);
  font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.22em;
  padding:.7rem 1.5rem;cursor:pointer;text-transform:uppercase;z-index:9999;text-shadow:var(--glow);
}

#hud2d{display:none;}
#hudMirror{position:fixed;right:10px;bottom:10px;width:180px;height:90px;border:1px solid rgba(0,229,255,.18);display:none;z-index:10000;}
</style>
</head>
<body>
<canvas id="hudMirror" width="180" height="90"></canvas>
<canvas id="hud2d" width="900" height="450"></canvas>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<!-- TOP LEFT -->
<div class="tl">
  <div class="clock" id="clock">00:00:00</div>
  <div class="date"  id="date">-- --- ----</div>
  <div class="area"   id="area">LOCATING...</div>
  <div class="street" id="street"></div>
</div>

<!-- TOP RIGHT -->
<div class="tr">
  <div class="stat">
    <div class="slbl">BAT</div>
    <div class="sbar"><div class="sf g" id="batF" style="width:85%"></div></div>
    <div class="sval" id="batV">85%</div>
  </div>
  <div class="stat">
    <div class="slbl">WIFI</div>
    <div class="sbar"><div class="sf c" id="wifiF" style="width:90%"></div></div>
    <div class="sval" id="wifiV">90%</div>
  </div>
</div>

<!-- BOTTOM LEFT -->
<div class="bl">
  <canvas id="compass" width="80" height="80"></canvas>
  <div class="loc-row"><div class="lloc">LAT</div><div class="lval" id="latV">--</div></div>
  <div class="loc-row"><div class="lloc">LON</div><div class="lval" id="lonV">--</div></div>
  <div class="loc-row"><div class="lloc">SPD</div><div class="lval" id="speedVal">0.0</div><div class="lloc" style="margin-left:2px">km/h</div></div>
  <div class="loc-row"><div class="lloc">G</div><div class="lval" id="gVal">1.00</div></div>
  <div class="gps-status acquiring" id="gpsS">● GPS ACQUIRING</div>
</div>

<!-- WAYPOINTS — left middle -->
<div id="wpPanel" style="position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:5px;"></div>

<!-- MINIMAP for waypoints -->
<div id="mapWrap" style="position:fixed;left:18px;top:50%;transform:translateY(-50%) translateY(-120px);z-index:10;display:flex;flex-direction:column;gap:3px;">
  <div style="font-size:.38rem;color:rgba(0,229,255,.28);letter-spacing:.2em;">TAP TO SET WAYPOINT</div>
  <div style="position:relative;width:110px;height:110px;border:1px solid rgba(0,229,255,.25);overflow:hidden;">
    <div id="minimap" style="width:110px;height:110px;"></div>
    <div style="position:absolute;inset:0;pointer-events:none;z-index:1000;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
        <div style="width:5px;height:5px;background:var(--c);box-shadow:0 0 8px var(--c);position:relative;z-index:2;"></div>
      </div>
      <div id="mapHdgLine" style="position:absolute;top:50%;left:50%;width:28px;height:1px;background:linear-gradient(to right,var(--c),transparent);transform-origin:left center;transition:transform .3s;"></div>
    </div>
  </div>
  <div id="wpDist" style="font-size:.4rem;color:var(--c2);letter-spacing:.1em;text-align:right;"></div>
</div>

<!-- BOTTOM RIGHT -->
<div class="br">
  <div class="temp" id="wTemp">--°</div>
  <div class="cond" id="wCond">--</div>
  <div class="wrow"><span>WIND</span><span class="wval" id="wWind">--</span><span>km/h</span></div>
  <div class="wrow"><span>HUM</span><span class="wval" id="wHum">--%</span></div>
  <div class="sunrow" id="wSun">↑ -- · ↓ --</div>
  <div class="divider" id="envDivider" style="display:none"></div>
  <div class="wrow" id="aqiRow"    style="display:none"><span>AQI</span><span class="wval" id="wAqi">--</span><span id="wAqiLbl"></span></div>
  <div class="wrow" id="pollenRow" style="display:none"><span>POLLEN</span><span class="wval" id="wPollen">--</span><span id="wPollenLbl" style="color:rgba(0,229,255,.4)"></span></div>
</div>

<div class="alerts" id="alerts"></div>
<button id="xrbtn"   onclick="enterXR()">◈ ENTER AR MODE</button>
<button id="permBtn" onclick="requestPerms()">◈ ENABLE SENSORS</button>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
var lat=null, lon=null, geoWatchId=null;
var batPct=85, wifiPct=90;
var weatherFetched=false;
var lastArea='', lastAqi=null, lastPollen=null;
var alertsState=[];
var isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
var DAYS   =['SUN','MON','TUE','WED','THU','FRI','SAT'];
var MONTHS =['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
window.addEventListener('DOMContentLoaded',function(){
  startClock();
  startBattery();
  startGPS();
  if(isIOS) document.getElementById('permBtn').style.display='block';
  addAlert('HUD ONLINE','ok');
});

/* ══════════════════════════════════════
   CLOCK
══════════════════════════════════════ */
function startClock(){
  function tick(){
    var n=new Date();
    document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
    document.getElementById('date').textContent=DAYS[n.getDay()]+' '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
  }
  tick(); setInterval(tick,1000);
}
function p(n){return String(n).padStart(2,'0');}
function p3(n){return String(Math.round(n)).padStart(3,'0');}

/* ══════════════════════════════════════
   FLASH ANIMATION HELPER
══════════════════════════════════════ */
function flashEl(el){
  if(!el) return;
  el.classList.remove('flash');
  void el.offsetWidth; // reflow to restart
  el.classList.add('flash');
}

/* ══════════════════════════════════════
   BATTERY
══════════════════════════════════════ */
function startBattery(){
  if(!navigator.getBattery) return;
  navigator.getBattery().then(function(bat){
    function upd(){
      var prev=batPct;
      batPct=Math.round(bat.level*100);
      document.getElementById('batF').style.width=batPct+'%';
      document.getElementById('batV').textContent=batPct+'%';
      document.getElementById('batF').className='sf '+(batPct>50?'g':batPct>20?'o':'r');
      if(batPct!==prev) flashEl(document.getElementById('batV'));
      if(batPct<20) addAlert('LOW BATTERY '+batPct+'%','warn');
    }
    upd(); bat.addEventListener('levelchange',upd);
  });
}

/* ══════════════════════════════════════
   GPS
══════════════════════════════════════ */
function startGPS(){
  if(!navigator.geolocation){setGPS('UNAVAILABLE','denied');return;}
  if(navigator.permissions){
    navigator.permissions.query({name:'geolocation'}).then(function(s){
      if(s.state==='denied') setGPS('DENIED','denied');
      else doWatch();
      s.onchange=function(){
        if(s.state==='granted'&&!geoWatchId) doWatch();
        if(s.state==='denied') setGPS('DENIED','denied');
      };
    }).catch(doWatch);
  } else doWatch();
}
function doWatch(){
  if(geoWatchId) return;
  setGPS('ACQUIRING','acquiring');
  geoWatchId=navigator.geolocation.watchPosition(function(pos){
    var newLat=pos.coords.latitude, newLon=pos.coords.longitude;
    var moved = lat==null || Math.abs(newLat-lat)>0.001 || Math.abs(newLon-lon)>0.001;
    lat=newLat; lon=newLon;
    currentSpeed=(pos.coords.speed||0)*3.6; // m/s → km/h
    document.getElementById('latV').textContent=lat.toFixed(5)+'°';
    document.getElementById('lonV').textContent=lon.toFixed(5)+'°';
    setVal('speedVal', currentSpeed.toFixed(1));
    setVal('gVal', currentG.toFixed(2));
    setGPS('LOCKED','locked');
    fetchWeather();
    if(moved) reverseGeocode();
  },function(e){
    var m={1:'DENIED',2:'UNAVAILABLE',3:'TIMEOUT'};
    setGPS(m[e.code]||'ERROR',e.code===1?'denied':'acquiring');
  },{enableHighAccuracy:true,maximumAge:0,timeout:20000});
}
function setGPS(msg,cls){
  var el=document.getElementById('gpsS');
  el.textContent='● GPS '+msg;
  el.className='gps-status '+cls;
}

/* ══════════════════════════════════════
   REVERSE GEOCODE — Nominatim (free, no key)
══════════════════════════════════════ */
var geocodeTimer=null;
function reverseGeocode(){
  // debounce — only fire if position hasn't changed for 3s
  clearTimeout(geocodeTimer);
  geocodeTimer=setTimeout(function(){
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&zoom=14',
      {headers:{'Accept-Language':'en'}})
    .then(function(r){return r.json();}).then(function(d){
      var addr=d.address||{};
      // pick best available label: neighbourhood > suburb > city_district > town > city > county
      var area = addr.neighbourhood||addr.suburb||addr.city_district||addr.village||addr.town||addr.city||addr.county||addr.state||'';
      var city = addr.city||addr.town||addr.village||'';
      var label = area && city && area!==city ? area+', '+city : area||city||d.display_name.split(',')[0];
      label = label.toUpperCase();
      if(label && label!==lastArea){
        lastArea=label;
        var el=document.getElementById('area');
        el.classList.remove('updating');
        void el.offsetWidth;
        el.textContent=label;
        el.classList.add('updating');
        addAlert('LOCATION UPDATED','info');
      }
    }).catch(function(){});
  },3000);
}

/* ══════════════════════════════════════
   iOS PERMS
══════════════════════════════════════ */
async function requestPerms(){
  document.getElementById('permBtn').style.display='none';
  if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission)
    try{await DeviceOrientationEvent.requestPermission();}catch(e){}
  if(typeof DeviceMotionEvent!=='undefined'&&DeviceMotionEvent.requestPermission)
    try{await DeviceMotionEvent.requestPermission();}catch(e){}
  if(!geoWatchId) doWatch();
}

/* ══════════════════════════════════════
   WEATHER + AQI + POLLEN
══════════════════════════════════════ */
function fetchWeather(){
  if(weatherFetched||lat==null) return;
  weatherFetched=true;

  fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code'
    +'&daily=sunrise,sunset&timezone=auto&forecast_days=1')
  .then(function(r){return r.json();}).then(function(d){
    var c=d.current,dd=d.daily;
    setVal('wTemp', Math.round(c.temperature_2m)+'°C');
    setVal('wCond', wCode(c.weather_code));
    setVal('wWind', Math.round(c.wind_speed_10m));
    setVal('wHum',  Math.round(c.relative_humidity_2m)+'%');
    if(dd) document.getElementById('wSun').textContent='↑ '+dd.sunrise[0].split('T')[1]+' · ↓ '+dd.sunset[0].split('T')[1];
    addAlert('WEATHER OK','ok');
  }).catch(function(){});

  fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+lat+'&longitude='+lon
    +'&current=european_aqi,us_aqi,grass_pollen,birch_pollen,mugwort_pollen')
  .then(function(r){return r.json();}).then(function(d){
    var c=d.current;

    // AQI
    var aqi=c.european_aqi!=null?c.european_aqi:c.us_aqi;
    if(aqi!=null){
      var ai=aqiInfo(aqi);
      var changed=lastAqi===null||Math.abs(aqi-lastAqi)>=5;
      lastAqi=aqi;
      var aqiEl=document.getElementById('wAqi');
      aqiEl.textContent=Math.round(aqi);
      aqiEl.style.color=ai.color;
      document.getElementById('wAqiLbl').textContent=ai.label;
      document.getElementById('wAqiLbl').style.color=ai.color;
      document.getElementById('aqiRow').style.display='flex';
      document.getElementById('envDivider').style.display='block';
      if(changed) flashEl(aqiEl);
    }

    // Pollen
    var pvs=[
      {n:'GRASS',v:c.grass_pollen},
      {n:'BIRCH',v:c.birch_pollen},
      {n:'MUGWORT',v:c.mugwort_pollen}
    ].filter(function(x){return x.v!=null;});
    if(pvs.length){
      var top=pvs.reduce(function(a,b){return a.v>b.v?a:b;});
      var pi=pollenInfo(top.v);
      var changed2=lastPollen===null||top.v!==lastPollen;
      lastPollen=top.v;
      var pel=document.getElementById('wPollen');
      pel.textContent=pi.label;
      pel.style.color=pi.color;
      document.getElementById('wPollenLbl').textContent=top.n;
      document.getElementById('pollenRow').style.display='flex';
      document.getElementById('envDivider').style.display='block';
      if(changed2) flashEl(pel);
      if(pi.label==='HIGH'||pi.label==='VERY HIGH') addAlert('HIGH POLLEN: '+top.n,'warn');
    }
  }).catch(function(){});
}

/* setVal — sets text and flashes if value actually changed */
function setVal(id, val){
  var el=document.getElementById(id);
  if(!el) return;
  if(el.textContent!==String(val)){
    el.textContent=val;
    flashEl(el);
  }
}

function aqiInfo(v){
  if(v<=20) return{label:'GOOD',     color:'#76ff03'};
  if(v<=40) return{label:'FAIR',     color:'#76ff03'};
  if(v<=60) return{label:'MODERATE', color:'#ff6d00'};
  if(v<=80) return{label:'POOR',     color:'#ff6d00'};
  if(v<=100)return{label:'VERY POOR',color:'#ff1744'};
  return         {label:'HAZARDOUS', color:'#ff1744'};
}
function pollenInfo(v){
  if(v<=10) return{label:'LOW',      color:'#76ff03'};
  if(v<=30) return{label:'MODERATE', color:'#ff6d00'};
  if(v<=50) return{label:'HIGH',     color:'#ff6d00'};
  return         {label:'VERY HIGH', color:'#ff1744'};
}
function wCode(c){
  if(c===0)return'CLEAR';if(c<=2)return'PARTLY CLOUDY';if(c<=3)return'OVERCAST';
  if(c<=49)return'FOG';if(c<=59)return'DRIZZLE';if(c<=69)return'RAIN';
  if(c<=79)return'SNOW';if(c<=82)return'SHOWERS';if(c<=99)return'STORM';return'UNKNOWN';
}

/* ══════════════════════════════════════
   SPEED + G-FORCE
══════════════════════════════════════ */
var currentSpeed=0, currentG=1.00;

window.addEventListener('devicemotion',function(e){
  if(!e.accelerationIncludingGravity) return;
  var a=e.accelerationIncludingGravity;
  currentG=Math.sqrt((a.x||0)*(a.x||0)+(a.y||0)*(a.y||0)+(a.z||0)*(a.z||0))/9.81;
  setVal('gVal', currentG.toFixed(2));
},true);

/* ══════════════════════════════════════
   COMPASS ROSE
══════════════════════════════════════ */
var compassHeading=0, hasRealHeading=false;
var compassCanvas=document.getElementById('compass');
var cctx=compassCanvas.getContext('2d');

function drawCompass(){
  requestAnimationFrame(drawCompass);
  var s=80, cx=s/2, cy=s/2, r=34;
  cctx.clearRect(0,0,s,s);

  // outer ring
  cctx.save();
  cctx.strokeStyle='rgba(0,229,255,0.25)';cctx.lineWidth=1;
  cctx.beginPath();cctx.arc(cx,cy,r,0,Math.PI*2);cctx.stroke();

  // tick marks
  for(var i=0;i<360;i+=45){
    var a=(i-90)*Math.PI/180;
    var inner=i%90===0?r-8:r-5;
    cctx.strokeStyle=i===0?'rgba(255,23,68,0.8)':'rgba(0,229,255,0.3)';
    cctx.lineWidth=i%90===0?1.5:1;
    cctx.beginPath();
    cctx.moveTo(cx+Math.cos(a)*inner,cy+Math.sin(a)*inner);
    cctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    cctx.stroke();
  }

  // cardinal labels
  var cards=['N','E','S','W'];
  cctx.font='bold 8px Orbitron,monospace';
  cards.forEach(function(c,i){
    var a=(i*90-compassHeading-90)*Math.PI/180;
    var lx=cx+Math.cos(a)*(r-13);
    var ly=cy+Math.sin(a)*(r-13)+3;
    cctx.fillStyle=c==='N'?'rgba(255,23,68,0.9)':'rgba(0,229,255,0.65)';
    if(c==='N') cctx.shadowColor='rgba(255,23,68,0.6)',cctx.shadowBlur=6;
    else cctx.shadowBlur=0;
    cctx.fillText(c,lx-cctx.measureText(c).width/2,ly);
  });
  cctx.shadowBlur=0;

  // heading pointer (fixed pointing up = current heading direction)
  cctx.save();
  cctx.translate(cx,cy);
  cctx.rotate(-compassHeading*Math.PI/180);
  cctx.fillStyle='rgba(0,229,255,0.85)';
  cctx.shadowColor='rgba(0,229,255,0.6)';cctx.shadowBlur=6;
  cctx.beginPath();cctx.moveTo(0,-(r-3));cctx.lineTo(-4,4);cctx.lineTo(4,4);cctx.closePath();cctx.fill();
  cctx.shadowBlur=0;
  cctx.restore();

  // centre dot
  cctx.fillStyle='rgba(0,229,255,0.5)';
  cctx.beginPath();cctx.arc(cx,cy,2.5,0,Math.PI*2);cctx.fill();
  cctx.restore();
}
drawCompass();

// hook real orientation
window.addEventListener('deviceorientation',function(e){
  var h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(e.alpha!=null?(360-e.alpha):null);
  if(h!=null){compassHeading=((h%360)+360)%360;hasRealHeading=true;}
},true);
function addAlert(msg,type){
  alertsState.unshift({msg:msg,type:type});
  alertsState=alertsState.slice(0,4);
  var el=document.createElement('div');
  el.className='alert '+(type||'info');el.textContent=msg;
  document.getElementById('alerts').appendChild(el);
  setTimeout(function(){
    el.style.transition='opacity .3s';el.style.opacity='0';
    setTimeout(function(){el.remove();},300);
  },3000);
}

/* ══════════════════════════════════════

══════════════════════════════════════ */
var xrSession=null,xrRefSpace=null,xrLayer=null,gl=null;
var prog=null,vbo=null,ibo=null,tex=null,lastUp=0,mirrorOn=false;
var hudC=document.getElementById('hud2d');
var hCtx=hudC.getContext('2d',{alpha:true});
var mirC=document.getElementById('hudMirror');
var mirCtx=mirC.getContext('2d');

function clamp(n,a,b){return Math.max(a,Math.min(b,n));}

function drawHud2D(){
  var w=hudC.width,h=hudC.height;
  var ctx=hCtx;
  ctx.clearRect(0,0,w,h);
  var C='#00e5ff',C2='#ff6d00',C3='#76ff03',CR='#ff1744';
  function glow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b;}
  function ng(){ctx.shadowBlur=0;ctx.shadowColor='transparent';}

  // corners
  ctx.save();ctx.strokeStyle='rgba(0,229,255,0.4)';ctx.lineWidth=2;
  [[20,20,1,1],[w-20,20,-1,1],[20,h-20,1,-1],[w-20,h-20,-1,-1]].forEach(function(c){
    ctx.beginPath();ctx.moveTo(c[0],c[1]+c[3]*40);ctx.lineTo(c[0],c[1]);ctx.lineTo(c[0]+c[2]*40,c[1]);ctx.stroke();
  });ctx.restore();

  var n=new Date();
  var ts=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());

  // TOP LEFT: clock + date + area
  ctx.save();
  glow(C,12);ctx.fillStyle=C;ctx.font='700 38px Orbitron,monospace';ctx.fillText(ts,22,52);ng();
  ctx.fillStyle='rgba(0,229,255,0.5)';ctx.font='12px "Share Tech Mono",monospace';
  ctx.fillText(DAYS[n.getDay()]+' '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear(),22,70);
  if(lastArea){
    glow(C,8);ctx.fillStyle=C;ctx.font='700 14px "Share Tech Mono",monospace';
    ctx.fillText(lastArea,22,90);ng();
  }
  ctx.restore();

  // TOP RIGHT: bars
  ctx.save();
  var bx=w-210,by=34;
  function bar(lbl,pct,col){
    ctx.fillStyle='rgba(0,229,255,0.4)';ctx.font='11px "Share Tech Mono",monospace';ctx.fillText(lbl,bx,by);
    ctx.fillStyle='rgba(0,229,255,0.08)';ctx.fillRect(bx+40,by-12,120,6);
    ctx.strokeStyle='rgba(0,229,255,0.18)';ctx.lineWidth=1;ctx.strokeRect(bx+40,by-12,120,6);
    ctx.fillStyle=col;ctx.fillRect(bx+40,by-12,120*clamp(pct,0,100)/100,6);
    ctx.fillStyle='rgba(0,229,255,0.85)';ctx.font='12px "Share Tech Mono",monospace';ctx.fillText(Math.round(pct)+'%',bx+168,by);
    by+=22;
  }
  bar('BAT',batPct,batPct>50?C3:batPct>20?C2:CR);
  bar('WIFI',wifiPct,C);
  ctx.restore();

  // BOTTOM LEFT: coords + GPS status
  ctx.save();
  ctx.fillStyle='rgba(0,229,255,0.35)';ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText('LAT',22,h-46);ctx.fillText('LON',22,h-29);
  ctx.fillStyle=C;ctx.font='13px "Share Tech Mono",monospace';
  ctx.fillText(lat!=null?lat.toFixed(5)+'°':'ACQUIRING',46,h-46);
  ctx.fillText(lon!=null?lon.toFixed(5)+'°':'ACQUIRING',46,h-29);
  var gs=document.getElementById('gpsS');
  var gc=gs?gs.className:'';
  ctx.fillStyle=gc.indexOf('locked')>-1?C3:gc.indexOf('denied')>-1?CR:C2;
  ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillText(gs?gs.textContent:'● GPS ACQUIRING',22,h-12);
  ctx.restore();

  // BOTTOM RIGHT: weather stack
  ctx.save();
  var wt=document.getElementById('wTemp').textContent;
  var wc=document.getElementById('wCond').textContent;
  var ww=document.getElementById('wWind').textContent;
  var wh=document.getElementById('wHum').textContent;
  var ws=document.getElementById('wSun').textContent;

  function rtext(str,y,col,font){
    ctx.fillStyle=col||'rgba(0,229,255,0.4)';
    ctx.font=font||'12px "Share Tech Mono",monospace';
    ctx.fillText(str,w-ctx.measureText(str).width-22,y);
  }

  glow(C,10);ctx.fillStyle=C;ctx.font='700 34px Orbitron,monospace';
  ctx.fillText(wt,w-ctx.measureText(wt).width-22,h-104);ng();
  rtext(wc,      h-84,'rgba(0,229,255,0.5)','12px "Share Tech Mono",monospace');
  rtext('WIND '+ww+' km/h', h-66);
  rtext('HUM '+wh,          h-50);
  rtext(ws,                 h-36,'rgba(0,229,255,0.28)','11px "Share Tech Mono",monospace');

  // divider
  var aqiEl=document.getElementById('wAqi');
  var polEl=document.getElementById('wPollen');
  var hasEnv=(aqiEl&&aqiEl.textContent!=='--')||(polEl&&polEl.textContent!=='--');
  if(hasEnv){
    ctx.strokeStyle='rgba(0,229,255,0.12)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(w-210,h-26);ctx.lineTo(w-22,h-26);ctx.stroke();
  }
  if(aqiEl&&aqiEl.textContent!=='--'){
    var al=document.getElementById('wAqiLbl').textContent;
    var ac=aqiEl.style.color||C;
    rtext('AQI '+aqiEl.textContent+' '+al, h-14, ac, '12px "Share Tech Mono",monospace');
  }

  var py=h-(hasEnv?2:2);
  if(polEl&&polEl.textContent!=='--'){
    var pl=document.getElementById('wPollenLbl').textContent;
    var pc=polEl.style.color||C;
    // shift up if AQI also showing
    var aqiShowing=aqiEl&&aqiEl.textContent!=='--';
    rtext('POLLEN '+polEl.textContent+' '+pl, aqiShowing?h-28:h-14, pc,'12px "Share Tech Mono",monospace');
  }

  // alerts
  if(alertsState.length){
    var ay=20;
    alertsState.slice(0,3).forEach(function(a){
      var col=a.type==='ok'?C3:a.type==='warn'?C2:a.type==='danger'?CR:C;
      var aw=280,ax=w/2-aw/2;
      ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(ax,ay,aw,18);
      ctx.fillStyle=col;ctx.font='bold 11px Orbitron,monospace';ctx.fillText(a.msg,ax+8,ay+13);
      ay+=24;
    });
  }
  ctx.restore();
}

/* WebGL */
function cSh(gl,t,s){var sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
function cPr(gl,vs,fs){var v=cSh(gl,gl.VERTEX_SHADER,vs),f=cSh(gl,gl.FRAGMENT_SHADER,fs),p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);return p;}
function m4i(){var m=new Float32Array(16);m[0]=1;m[5]=1;m[10]=1;m[15]=1;return m;}
function m4mul(a,b){var o=new Float32Array(16);for(var i=0;i<4;i++)for(var j=0;j<4;j++){var s=0;for(var k=0;k<4;k++)s+=a[j+k*4]*b[i*4+k];o[i*4+j]=s;}return o;}
function m4t(x,y,z){var m=m4i();m[12]=x;m[13]=y;m[14]=z;return m;}
function m4s(x,y,z){var m=m4i();m[0]=x;m[5]=y;m[10]=z;return m;}

function initXRGL(){
  prog=cPr(gl,
    'attribute vec3 aPos;attribute vec2 aUV;uniform mat4 uMVP;varying vec2 vUV;void main(){vUV=aUV;gl_Position=uMVP*vec4(aPos,1.0);}',
    'precision mediump float;varying vec2 vUV;uniform sampler2D uTex;void main(){gl_FragColor=texture2D(uTex,vUV);}');
  prog.aPos=gl.getAttribLocation(prog,'aPos');prog.aUV=gl.getAttribLocation(prog,'aUV');
  prog.uMVP=gl.getUniformLocation(prog,'uMVP');prog.uTex=gl.getUniformLocation(prog,'uTex');
  var verts=new Float32Array([-0.5,-0.5,0,0,1,0.5,-0.5,0,1,1,0.5,0.5,0,1,0,-0.5,0.5,0,0,0]);
  var inds=new Uint16Array([0,1,2,0,2,3]);
  vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,verts,gl.STATIC_DRAW);
  ibo=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,inds,gl.STATIC_DRAW);
  tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,hudC.width,hudC.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.useProgram(prog);gl.uniform1i(prog.uTex,0);
}
function uploadTex(t){
  if(t-lastUp<33)return;lastUp=t;drawHud2D();
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,hudC);
  if(mirrorOn){mirCtx.clearRect(0,0,mirC.width,mirC.height);mirCtx.drawImage(hudC,0,0,mirC.width,mirC.height);}
}
function xrFrame(t,frame){
  if(!xrSession)return;xrSession.requestAnimationFrame(xrFrame);
  var pose=frame.getViewerPose(xrRefSpace);if(!pose)return;
  uploadTex(t);
  gl.bindFramebuffer(gl.FRAMEBUFFER,xrLayer.framebuffer);
  gl.disable(gl.DEPTH_TEST);gl.disable(gl.CULL_FACE);gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ibo);
  var stride=5*4;
  gl.enableVertexAttribArray(prog.aPos);gl.vertexAttribPointer(prog.aPos,3,gl.FLOAT,false,stride,0);
  gl.enableVertexAttribArray(prog.aUV);gl.vertexAttribPointer(prog.aUV,2,gl.FLOAT,false,stride,3*4);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);
  var om=m4mul(m4t(0,-0.10,-1.10),m4s(1.35,0.68,1.0));
  var mm=m4mul(pose.transform.matrix,om);
  for(var i=0;i<pose.views.length;i++){
    var view=pose.views[i],vp=xrLayer.getViewport(view);
    gl.viewport(vp.x,vp.y,vp.width,vp.height);
    var mvp=m4mul(view.projectionMatrix,m4mul(view.transform.inverse.matrix,mm));
    gl.uniformMatrix4fv(prog.uMVP,false,mvp);
    gl.drawElements(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0);
  }
}
async function enterXR(){
  var btn=document.getElementById('xrbtn');
  if(xrSession){try{await xrSession.end();}catch(_){}return;}
  if(!navigator.xr){addAlert('WebXR N/A','warn');return;}
  try{
    if(!await navigator.xr.isSessionSupported('immersive-ar')){addAlert('AR NOT SUPPORTED','warn');return;}
    xrSession=await navigator.xr.requestSession('immersive-ar',{requiredFeatures:['local'],optionalFeatures:['local-floor']});
    btn.textContent='◈ EXIT AR';
    document.querySelectorAll('.tl,.tr,.bl,.br,.corner,.alerts').forEach(function(e){e.style.display='none';});
    document.body.style.background='transparent';
    gl=document.createElement('canvas').getContext('webgl',{xrCompatible:true,alpha:true,antialias:true,premultipliedAlpha:true});
    xrLayer=new XRWebGLLayer(xrSession,gl,{alpha:true});
    xrSession.updateRenderState({baseLayer:xrLayer});
    try{xrRefSpace=await xrSession.requestReferenceSpace('local-floor');}
    catch(_){xrRefSpace=await xrSession.requestReferenceSpace('local');}
    initXRGL();
    xrSession.addEventListener('end',function(){
      xrSession=null;xrRefSpace=null;xrLayer=null;
      document.querySelectorAll('.tl,.tr,.bl,.br,.corner,.alerts').forEach(function(e){e.style.display='';});
      btn.textContent='◈ ENTER AR MODE';
    });
    xrSession.requestAnimationFrame(xrFrame);
  }catch(e){addAlert('XR ERR','warn');}
}
(function(){
  var taps=0,t0=0;
  document.getElementById('xrbtn').addEventListener('click',function(){
    var now=Date.now();if(now-t0>900)taps=0;t0=now;taps++;
    if(taps>=5){taps=0;mirrorOn=!mirrorOn;mirC.style.display=mirrorOn?'block':'none';}
  });
})();
